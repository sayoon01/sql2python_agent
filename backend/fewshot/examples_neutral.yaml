- title: 01. SELECT 단건 조회
  sql: "CREATE PROCEDURE GetUserByID\n    @UserID   INT,\n    @IsActive BIT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\
    \ UserID, Name, Email, CreatedAt\n    FROM   Users\n    WHERE  UserID   = @UserID\n      AND  IsActive = @IsActive;\n\
    END"
  python_code: "from typing import Optional, Dict, Any\n\n\ndef get_user_by_id(\n    conn,\n    user_id: int,\n    is_active:\
    \ bool = True,\n) -> Optional[Dict[str, Any]]:\n    \"\"\"사용자 단건 조회. 원본 SP: GetUserByID\"\"\"\n    sql = \"\"\"\n    \
    \    SELECT UserID, Name, Email, CreatedAt\n        FROM   Users\n        WHERE  UserID   = ?\n          AND  IsActive\
    \ = ?\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (user_id, int(is_active)))\n    row = cursor.fetchone()\n\
    \    if row is None:\n        return None\n    cols = [col[0] for col in cursor.description]\n    return dict(zip(cols,\
    \ row))\n"
- title: 02. SELECT 다건 조회 (LIST 반환)
  sql: "CREATE PROCEDURE GetOrdersByCustomer\n    @CustomerID INT,\n    @StatusCode NVARCHAR(20) = NULL\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n    SELECT OrderID, TotalAmount, StatusCode, OrderDate\n    FROM   Orders\n    WHERE  CustomerID = @CustomerID\n\
    \      AND  (@StatusCode IS NULL OR StatusCode = @StatusCode)\n    ORDER  BY OrderDate DESC;\nEND"
  python_code: "from typing import List, Dict, Any, Optional\n\n\ndef get_orders_by_customer(\n    conn,\n    customer_id:\
    \ int,\n    status_code: Optional[str] = None,\n) -> List[Dict[str, Any]]:\n    \"\"\"고객별 주문 목록 조회. 원본 SP: GetOrdersByCustomer\"\
    \"\"\n    if status_code is None:\n        sql = \"\"\"\n            SELECT OrderID, TotalAmount, StatusCode, OrderDate\n\
    \            FROM   Orders\n            WHERE  CustomerID = ?\n            ORDER  BY OrderDate DESC\n        \"\"\"\n\
    \        params: tuple = (customer_id,)\n    else:\n        sql = \"\"\"\n            SELECT OrderID, TotalAmount, StatusCode,\
    \ OrderDate\n            FROM   Orders\n            WHERE  CustomerID = ?\n              AND  StatusCode = ?\n       \
    \     ORDER  BY OrderDate DESC\n        \"\"\"\n        params = (customer_id, status_code)\n\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, params)\n    rows = cursor.fetchall()\n    if not rows:\n        return []\n    cols = [col[0]\
    \ for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 03. INSERT + OUTPUT 파라미터
  sql: "CREATE PROCEDURE CreateOrder\n    @CustomerID  INT,\n    @TotalAmount DECIMAL(18,2),\n    @OrderID     INT OUTPUT\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    BEGIN TRY\n        INSERT INTO Orders (CustomerID, TotalAmount, OrderDate)\n     \
    \   VALUES (@CustomerID, @TotalAmount, GETDATE());\n        SET @OrderID = SCOPE_IDENTITY();\n    END TRY\n    BEGIN CATCH\n\
    \        RAISERROR('주문 생성 실패', 16, 1);\n    END CATCH\nEND"
  python_code: "from datetime import datetime\n\n\ndef create_order(\n    conn,\n    customer_id: int,\n    total_amount:\
    \ float,\n) -> int:\n    \"\"\"주문 생성 후 새 OrderID 반환. 원본 SP: CreateOrder\"\"\"\n    sql = \"\"\"\n        INSERT INTO Orders\
    \ (CustomerID, TotalAmount, OrderDate)\n        VALUES (?, ?, ?);\n        SELECT CAST(SCOPE_IDENTITY() AS INT) AS NewID;\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    try:\n        cursor.execute(sql, (customer_id, total_amount, datetime.now()))\n\
    \        row = cursor.fetchone()\n        conn.commit()\n        return int(row[0]) if row else -1\n    except Exception\
    \ as exc:\n        conn.rollback()\n        raise RuntimeError(f\"주문 생성 실패: {exc}\") from exc\n"
- title: 04. UPDATE + @@ROWCOUNT 반환
  sql: "CREATE PROCEDURE UpdateProductStock\n    @ProductID    INT,\n    @Delta        INT,\n    @RowsAffected INT OUTPUT\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    UPDATE Products\n    SET    StockQty  = StockQty + @Delta,\n           UpdatedAt =\
    \ GETDATE()\n    WHERE  ProductID = @ProductID\n      AND  StockQty + @Delta >= 0;\n    SET @RowsAffected = @@ROWCOUNT;\n\
    END"
  python_code: "from datetime import datetime\n\n\ndef update_product_stock(conn, product_id: int, delta: int) -> int:\n \
    \   \"\"\"재고 증감 후 변경된 행 수 반환. 원본 SP: UpdateProductStock\"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\n     \
    \   \"\"\"UPDATE Products SET StockQty=StockQty+?, UpdatedAt=?\n           WHERE ProductID=? AND StockQty+?>=0\"\"\",\n\
    \        (delta, datetime.now(), product_id, delta),\n    )\n    rows_affected = cursor.rowcount\n    conn.commit()\n\
    \    return rows_affected\n"
- title: 05. NULL 기본값 파라미터 + 다중 OUTPUT
  sql: "CREATE PROCEDURE RegisterMember\n    @Name       NVARCHAR(100),\n    @Email      NVARCHAR(200),\n    @Phone      NVARCHAR(20)\
    \  = NULL,\n    @Grade      NVARCHAR(10)  = 'BASIC',\n    @MemberID   INT           OUTPUT,\n    @MemberCode NVARCHAR(20)\
    \  OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO Members (Name, Email, Phone, Grade, CreatedAt)\n    VALUES\
    \ (@Name, @Email, @Phone, @Grade, GETDATE());\n    SET @MemberID   = SCOPE_IDENTITY();\n    SET @MemberCode = 'M' + RIGHT('000000'+CAST(@MemberID\
    \ AS NVARCHAR),6);\nEND"
  python_code: "from datetime import datetime\nfrom typing import Optional, Tuple\n\n\ndef register_member(\n    conn,\n \
    \   name: str,\n    email: str,\n    phone: Optional[str] = None,\n    grade: str = \"BASIC\",\n) -> Tuple[int, str]:\n\
    \    \"\"\"회원 등록 후 (member_id, member_code) 반환. 원본 SP: RegisterMember\"\"\"\n    sql = \"\"\"\n        INSERT INTO Members\
    \ (Name, Email, Phone, Grade, CreatedAt)\n        VALUES (?, ?, ?, ?, ?);\n        SELECT CAST(SCOPE_IDENTITY() AS INT);\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (name, email, phone, grade, datetime.now()))\n    row\
    \ = cursor.fetchone()\n    conn.commit()\n    member_id   = int(row[0]) if row else -1\n    member_code = f\"M{member_id:06d}\"\
    \n    return member_id, member_code\n"
- title: 06. 트랜잭션 (원자적 다중 DML)
  sql: "CREATE PROCEDURE TransferFunds\n    @FromAccountID INT,\n    @ToAccountID   INT,\n    @Amount        DECIMAL(18,2)\n\
    AS\nBEGIN\n    BEGIN TRANSACTION;\n    BEGIN TRY\n        UPDATE Accounts SET Balance=Balance-@Amount WHERE AccountID=@FromAccountID;\n\
    \        UPDATE Accounts SET Balance=Balance+@Amount WHERE AccountID=@ToAccountID;\n        COMMIT TRANSACTION;\n    END\
    \ TRY\n    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n        THROW;\n    END CATCH\nEND"
  python_code: "def transfer_funds(conn, from_account_id: int, to_account_id: int, amount: float) -> None:\n    \"\"\"계좌 간\
    \ 이체. 원본 SP: TransferFunds\"\"\"\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n            \"UPDATE\
    \ Accounts SET Balance=Balance-? WHERE AccountID=?\",\n            (amount, from_account_id),\n        )\n        cursor.execute(\n\
    \            \"UPDATE Accounts SET Balance=Balance+? WHERE AccountID=?\",\n            (amount, to_account_id),\n    \
    \    )\n        conn.commit()\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"이체\
    \ 실패: {exc}\") from exc\n"
- title: 07. IF/ELSE 분기 로직
  sql: "CREATE PROCEDURE ApplyDiscount\n    @OrderID     INT,\n    @CouponCode  NVARCHAR(50) = NULL,\n    @FinalAmount DECIMAL(18,2)\
    \ OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @BaseAmount DECIMAL(18,2);\n    DECLARE @Rate       DECIMAL(5,4)\
    \ = 0;\n    SELECT @BaseAmount = TotalAmount FROM Orders WHERE OrderID=@OrderID;\n    IF @CouponCode IS NOT NULL\n   \
    \     SELECT @Rate=DiscountRate FROM Coupons WHERE Code=@CouponCode AND IsUsed=0;\n    IF @Rate > 0\n        SET @FinalAmount\
    \ = @BaseAmount*(1-@Rate);\n    ELSE\n        SET @FinalAmount = @BaseAmount;\nEND"
  python_code: "from typing import Optional\n\n\ndef apply_discount(conn, order_id: int, coupon_code: Optional[str] = None)\
    \ -> float:\n    \"\"\"쿠폰 적용 후 최종 금액 반환. 원본 SP: ApplyDiscount\"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\"\
    SELECT TotalAmount FROM Orders WHERE OrderID=?\", (order_id,))\n    row = cursor.fetchone()\n    base_amount = float(row[0])\
    \ if row else 0.0\n\n    rate = 0.0\n    if coupon_code is not None:\n        cursor.execute(\n            \"SELECT DiscountRate\
    \ FROM Coupons WHERE Code=? AND IsUsed=0\", (coupon_code,)\n        )\n        row = cursor.fetchone()\n        if row:\n\
    \            rate = float(row[0])\n\n    return base_amount * (1 - rate) if rate > 0 else base_amount\n"
- title: 08. CASE WHEN + GROUP BY 집계
  sql: "CREATE PROCEDURE GetSalesSummary\n    @StartDate DATE,\n    @EndDate   DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\
    \ CategoryID,\n           COUNT(*) AS TotalOrders,\n           SUM(TotalAmount) AS TotalRevenue,\n           SUM(CASE\
    \ WHEN StatusCode='CANCEL' THEN 1 ELSE 0 END) AS CancelCount\n    FROM   Orders\n    WHERE  OrderDate BETWEEN @StartDate\
    \ AND @EndDate\n    GROUP  BY CategoryID\n    ORDER  BY TotalRevenue DESC;\nEND"
  python_code: "from datetime import date\nfrom typing import List, Dict, Any\n\n\ndef get_sales_summary(conn, start_date:\
    \ date, end_date: date) -> List[Dict[str, Any]]:\n    \"\"\"기간별 카테고리 매출 집계. 원본 SP: GetSalesSummary\"\"\"\n    sql = \"\
    \"\"\n        SELECT CategoryID, COUNT(*) AS TotalOrders,\n               SUM(TotalAmount) AS TotalRevenue,\n        \
    \       SUM(CASE WHEN StatusCode='CANCEL' THEN 1 ELSE 0 END) AS CancelCount\n        FROM   Orders\n        WHERE  OrderDate\
    \ BETWEEN ? AND ?\n        GROUP  BY CategoryID\n        ORDER  BY TotalRevenue DESC\n    \"\"\"\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, (start_date, end_date))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 09. 날짜·문자열·NULL 처리
  sql: "CREATE PROCEDURE GetRecentActivityLog\n    @UserID   INT,\n    @DaysBack INT = 7,\n    @Keyword  NVARCHAR(100) = NULL\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT LogID, Action, ISNULL(Description,'(없음)') AS Description,\n           DATEDIFF(HOUR,\
    \ LoggedAt, GETDATE()) AS HoursAgo\n    FROM   ActivityLog\n    WHERE  UserID=@UserID\n      AND  LoggedAt >= DATEADD(DAY,-@DaysBack,GETDATE())\n\
    \      AND  (@Keyword IS NULL OR Action LIKE '%'+@Keyword+'%')\n    ORDER  BY LoggedAt DESC;\nEND"
  python_code: "from datetime import datetime, timedelta\nfrom typing import List, Dict, Any, Optional\n\n\ndef get_recent_activity_log(\n\
    \    conn, user_id: int, days_back: int = 7, keyword: Optional[str] = None\n) -> List[Dict[str, Any]]:\n    \"\"\"최근 활동\
    \ 로그 조회. 원본 SP: GetRecentActivityLog\"\"\"\n    since = datetime.now() - timedelta(days=days_back)\n    sql = \"\"\"\n\
    \        SELECT LogID, Action, ISNULL(Description,'(없음)') AS Description,\n               DATEDIFF(HOUR, LoggedAt, GETDATE())\
    \ AS HoursAgo\n        FROM   ActivityLog\n        WHERE  UserID=? AND LoggedAt>=?\n    \"\"\"\n    params: list = [user_id,\
    \ since]\n    if keyword is not None:\n        sql += \" AND Action LIKE ?\"\n        params.append(f\"%{keyword}%\")\n\
    \    sql += \" ORDER BY LoggedAt DESC\"\n    cursor = conn.cursor()\n    cursor.execute(sql, params)\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 10. EXISTS 조건 체크 + 조건부 실행
  sql: "CREATE PROCEDURE ActivatePromotion\n    @PromoCode  NVARCHAR(50),\n    @UserID     INT,\n    @ResultCode INT OUTPUT\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    IF NOT EXISTS(SELECT 1 FROM Promotions WHERE Code=@PromoCode)\n    BEGIN SET @ResultCode=1;\
    \ RETURN; END\n    IF EXISTS(SELECT 1 FROM UserPromotions WHERE UserID=@UserID AND PromoCode=@PromoCode)\n    BEGIN SET\
    \ @ResultCode=2; RETURN; END\n    IF EXISTS(SELECT 1 FROM Promotions WHERE Code=@PromoCode AND ExpiresAt<GETDATE())\n\
    \    BEGIN SET @ResultCode=3; RETURN; END\n    INSERT INTO UserPromotions(UserID,PromoCode,UsedAt) VALUES(@UserID,@PromoCode,GETDATE());\n\
    \    SET @ResultCode=0;\nEND"
  python_code: "from datetime import datetime\n\n\ndef activate_promotion(conn, promo_code: str, user_id: int) -> int:\n \
    \   \"\"\"프로모션 활성화. 0=성공 1=없음 2=이미사용 3=만료. 원본 SP: ActivatePromotion\"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\"\
    SELECT 1 FROM Promotions WHERE Code=?\", (promo_code,))\n    if cursor.fetchone() is None:\n        return 1\n    cursor.execute(\n\
    \        \"SELECT 1 FROM UserPromotions WHERE UserID=? AND PromoCode=?\", (user_id, promo_code)\n    )\n    if cursor.fetchone()\
    \ is not None:\n        return 2\n    cursor.execute(\n        \"SELECT 1 FROM Promotions WHERE Code=? AND ExpiresAt<?\"\
    , (promo_code, datetime.now())\n    )\n    if cursor.fetchone() is not None:\n        return 3\n    cursor.execute(\n\
    \        \"INSERT INTO UserPromotions(UserID,PromoCode,UsedAt) VALUES(?,?,?)\",\n        (user_id, promo_code, datetime.now()),\n\
    \    )\n    conn.commit()\n    return 0\n"
- title: 11. 페이징 (OFFSET-FETCH)
  sql: "CREATE PROCEDURE SearchProducts\n    @Keyword    NVARCHAR(100) = NULL,\n    @CategoryID INT = NULL,\n    @PageNo \
    \    INT = 1,\n    @PageSize   INT = 20,\n    @TotalCount INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT @TotalCount=COUNT(*)\
    \ FROM Products\n    WHERE IsActive=1\n      AND (@Keyword IS NULL OR Name LIKE '%'+@Keyword+'%')\n      AND (@CategoryID\
    \ IS NULL OR CategoryID=@CategoryID);\n\n    SELECT ProductID, Name, Price, StockQty\n    FROM   Products\n    WHERE \
    \ IsActive=1\n      AND  (@Keyword IS NULL OR Name LIKE '%'+@Keyword+'%')\n      AND  (@CategoryID IS NULL OR CategoryID=@CategoryID)\n\
    \    ORDER  BY ProductID\n    OFFSET (@PageNo-1)*@PageSize ROWS FETCH NEXT @PageSize ROWS ONLY;\nEND"
  python_code: "from typing import Optional, List, Dict, Any, Tuple\n\n\ndef search_products(\n    conn,\n    keyword: Optional[str]\
    \ = None,\n    category_id: Optional[int] = None,\n    page_no: int = 1,\n    page_size: int = 20,\n) -> Tuple[int, List[Dict[str,\
    \ Any]]]:\n    \"\"\"상품 검색 + 페이징. (total_count, items) 반환. 원본 SP: SearchProducts\"\"\"\n    where, params = [\"IsActive=1\"\
    ], []\n    if keyword is not None:\n        where.append(\"Name LIKE ?\")\n        params.append(f\"%{keyword}%\")\n \
    \   if category_id is not None:\n        where.append(\"CategoryID=?\")\n        params.append(category_id)\n    where_sql\
    \ = \" AND \".join(where)\n    cursor = conn.cursor()\n    cursor.execute(f\"SELECT COUNT(*) FROM Products WHERE {where_sql}\"\
    , params)\n    total_count = cursor.fetchone()[0]\n    offset = (page_no - 1) * page_size\n    cursor.execute(\n     \
    \   f\"SELECT ProductID,Name,Price,StockQty FROM Products WHERE {where_sql}\"\n        f\" ORDER BY ProductID OFFSET ?\
    \ ROWS FETCH NEXT ? ROWS ONLY\",\n        params + [offset, page_size],\n    )\n    rows = cursor.fetchall()\n    cols\
    \ = [col[0] for col in cursor.description]\n    return total_count, [dict(zip(cols, row)) for row in rows]\n"
- title: 12. 다중 결과셋 반환
  sql: "CREATE PROCEDURE GetDashboardData @UserID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT COUNT(*) AS TotalOrders,\
    \ SUM(TotalAmount) AS TotalSpent\n    FROM Orders WHERE CustomerID=@UserID;\n\n    SELECT TOP 5 OrderID, TotalAmount,\
    \ StatusCode, OrderDate\n    FROM Orders WHERE CustomerID=@UserID ORDER BY OrderDate DESC;\nEND"
  python_code: "from typing import Dict, Any\n\n\ndef get_dashboard_data(conn, user_id: int) -> Dict[str, Any]:\n    \"\"\"\
    대시보드 데이터 (다중 결과셋). 원본 SP: GetDashboardData\"\"\"\n    sql = \"\"\"\n        SELECT COUNT(*) AS TotalOrders, SUM(TotalAmount)\
    \ AS TotalSpent\n        FROM Orders WHERE CustomerID=?;\n\n        SELECT TOP 5 OrderID, TotalAmount, StatusCode, OrderDate\n\
    \        FROM Orders WHERE CustomerID=? ORDER BY OrderDate DESC;\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql,\
    \ (user_id, user_id))\n    row  = cursor.fetchone()\n    cols = [col[0] for col in cursor.description]\n    summary =\
    \ dict(zip(cols, row)) if row else {}\n    cursor.nextset()\n    rows  = cursor.fetchall()\n    cols  = [col[0] for col\
    \ in cursor.description]\n    recent = [dict(zip(cols, r)) for r in rows]\n    return {\"summary\": summary, \"recent_orders\"\
    : recent}\n"
- title: 13. 임시 테이블 (#temp) → CTE 변환
  sql: "CREATE PROCEDURE CalcMonthlyBonuses @YearMonth NVARCHAR(6)\nAS\nBEGIN\n    SET NOCOUNT ON;\n    CREATE TABLE #SalesTemp(EmployeeID\
    \ INT, TotalSales DECIMAL(18,2), BonusRate DECIMAL(5,4));\n    INSERT INTO #SalesTemp\n    SELECT s.EmployeeID, SUM(s.Amount),\n\
    \           CASE WHEN SUM(s.Amount)>=10000000 THEN 0.10\n                WHEN SUM(s.Amount)>=5000000  THEN 0.07\n    \
    \            ELSE 0.05 END\n    FROM Sales s WHERE FORMAT(s.SaleDate,'yyyyMM')=@YearMonth GROUP BY s.EmployeeID;\n   \
    \ SELECT t.EmployeeID, e.Name, t.TotalSales, t.TotalSales*t.BonusRate AS BonusAmount\n    FROM #SalesTemp t JOIN Employees\
    \ e ON t.EmployeeID=e.EmployeeID ORDER BY BonusAmount DESC;\n    DROP TABLE #SalesTemp;\nEND"
  python_code: "from typing import List, Dict, Any\n\n\ndef calc_monthly_bonuses(conn, year_month: str) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"월별 보너스 계산. #temp → CTE 변환. 원본 SP: CalcMonthlyBonuses\"\"\"\n    sql = \"\"\"\n        WITH SalesTemp\
    \ AS (\n            SELECT s.EmployeeID, SUM(s.Amount) AS TotalSales,\n                   CASE WHEN SUM(s.Amount)>=10000000\
    \ THEN 0.10\n                        WHEN SUM(s.Amount)>=5000000  THEN 0.07\n                        ELSE 0.05 END AS\
    \ BonusRate\n            FROM Sales s\n            WHERE CONVERT(NVARCHAR(6), s.SaleDate, 112) = ?\n            GROUP\
    \ BY s.EmployeeID\n        )\n        SELECT t.EmployeeID, e.Name, t.TotalSales,\n               t.TotalSales*t.BonusRate\
    \ AS BonusAmount\n        FROM SalesTemp t JOIN Employees e ON t.EmployeeID=e.EmployeeID\n        ORDER BY BonusAmount\
    \ DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (year_month,))\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 14. 테이블 변수 → List + executemany
  sql: "CREATE PROCEDURE BulkInsertItems @OrderID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @Items TABLE(ProductID\
    \ INT, Qty INT, UnitPrice DECIMAL(10,2));\n    INSERT INTO @Items VALUES(101,2,9900),(205,1,34500);\n    INSERT INTO OrderItems(OrderID,ProductID,Qty,UnitPrice,LineTotal)\n\
    \    SELECT @OrderID,ProductID,Qty,UnitPrice,Qty*UnitPrice FROM @Items;\n    SELECT SUM(Qty*UnitPrice) AS GrandTotal FROM\
    \ @Items;\nEND"
  python_code: "from typing import List, Tuple\n\n\ndef bulk_insert_items(\n    conn, order_id: int, items: List[Tuple[int,\
    \ int, float]]\n) -> float:\n    \"\"\"주문 항목 일괄 등록. @table variable → List + executemany. 원본 SP: BulkInsertItems\"\"\"\
    \n    rows = [\n        (order_id, pid, qty, price, qty * price)\n        for pid, qty, price in items\n    ]\n    cursor\
    \ = conn.cursor()\n    try:\n        cursor.executemany(\n            \"INSERT INTO OrderItems(OrderID,ProductID,Qty,UnitPrice,LineTotal)\
    \ VALUES(?,?,?,?,?)\",\n            rows,\n        )\n        conn.commit()\n        return sum(qty * price for _, qty,\
    \ price in items)\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"일괄 등록 실패: {exc}\"\
    ) from exc\n"
- title: 15. 동적 SQL (sp_executesql) + 보안 검증
  sql: "CREATE PROCEDURE DynamicSearch\n    @TableName  NVARCHAR(128),\n    @Conditions NVARCHAR(500)=NULL,\n    @OrderBy\
    \    NVARCHAR(100)='ID ASC'\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @SQL NVARCHAR(MAX)=N'SELECT * FROM '+QUOTENAME(@TableName);\n\
    \    IF @Conditions IS NOT NULL SET @SQL=@SQL+N' WHERE '+@Conditions;\n    SET @SQL=@SQL+N' ORDER BY '+@OrderBy;\n   \
    \ EXEC sp_executesql @SQL;\nEND"
  python_code: "import re\nfrom typing import List, Dict, Any, Optional\n\n_ALLOWED_TABLES   = frozenset({\"Users\",\"Orders\"\
    ,\"Products\",\"Employees\"})\n_ORDER_RE         = re.compile(r\"^[A-Za-z_][A-Za-z0-9_]* (ASC|DESC)$\")\n\n\ndef dynamic_search(\n\
    \    conn,\n    table_name: str,\n    conditions: Optional[str] = None,\n    order_by: str = \"ID ASC\",\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"동적 테이블 검색. sp_executesql → 화이트리스트 검증. 원본 SP: DynamicSearch\"\"\"\n    if table_name not in _ALLOWED_TABLES:\n\
    \        raise ValueError(f\"허용되지 않는 테이블: {table_name}\")\n    if not _ORDER_RE.match(order_by):\n        raise ValueError(f\"\
    잘못된 ORDER BY: {order_by}\")\n    sql = f\"SELECT * FROM [{table_name}]\"\n    if conditions:\n        sql += f\" WHERE\
    \ {conditions}\"\n    sql += f\" ORDER BY {order_by}\"\n    cursor = conn.cursor()\n    cursor.execute(sql)\n    rows\
    \ = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in\
    \ rows]\n"
- title: 16. MERGE (UPSERT)
  sql: "CREATE PROCEDURE UpsertProduct\n    @ProductID INT, @Name NVARCHAR(200), @Price DECIMAL(10,2), @StockQty INT\nAS\n\
    BEGIN\n    SET NOCOUNT ON;\n    MERGE Products AS t\n    USING (SELECT @ProductID AS ProductID) AS s ON t.ProductID=s.ProductID\n\
    \    WHEN MATCHED THEN\n        UPDATE SET Name=@Name,Price=@Price,StockQty=@StockQty,UpdatedAt=GETDATE()\n    WHEN NOT\
    \ MATCHED THEN\n        INSERT(ProductID,Name,Price,StockQty,CreatedAt)\n        VALUES(@ProductID,@Name,@Price,@StockQty,GETDATE());\n\
    END"
  python_code: "from datetime import datetime\n\n\ndef upsert_product(conn, product_id: int, name: str, price: float, stock_qty:\
    \ int) -> None:\n    \"\"\"상품 UPSERT. MERGE → EXISTS 분기. 원본 SP: UpsertProduct\"\"\"\n    cursor = conn.cursor()\n    try:\n\
    \        cursor.execute(\"SELECT 1 FROM Products WHERE ProductID=?\", (product_id,))\n        now = datetime.now()\n \
    \       if cursor.fetchone():\n            cursor.execute(\n                \"UPDATE Products SET Name=?,Price=?,StockQty=?,UpdatedAt=?\
    \ WHERE ProductID=?\",\n                (name, price, stock_qty, now, product_id),\n            )\n        else:\n   \
    \         cursor.execute(\n                \"INSERT INTO Products(ProductID,Name,Price,StockQty,CreatedAt) VALUES(?,?,?,?,?)\"\
    ,\n                (product_id, name, price, stock_qty, now),\n            )\n        conn.commit()\n    except Exception\
    \ as exc:\n        conn.rollback()\n        raise RuntimeError(f\"UPSERT 실패: {exc}\") from exc\n"
- title: 17. 중첩 트랜잭션 + SAVEPOINT
  sql: "CREATE PROCEDURE ProcessOrderWithSavepoint @OrderID INT, @PaymentID INT\nAS\nBEGIN\n    BEGIN TRANSACTION OuterTx;\n\
    \    BEGIN TRY\n        UPDATE Orders SET StatusCode='PROCESSING' WHERE OrderID=@OrderID;\n        SAVE TRANSACTION PaymentSave;\n\
    \        BEGIN TRY\n            UPDATE Payments SET Status='CONFIRMED' WHERE PaymentID=@PaymentID;\n            UPDATE\
    \ Orders   SET StatusCode='PAID'  WHERE OrderID=@OrderID;\n        END TRY\n        BEGIN CATCH\n            ROLLBACK\
    \ TRANSACTION PaymentSave;\n            UPDATE Orders SET StatusCode='PAYMENT_FAILED' WHERE OrderID=@OrderID;\n      \
    \  END CATCH\n        COMMIT TRANSACTION OuterTx;\n    END TRY\n    BEGIN CATCH ROLLBACK TRANSACTION OuterTx; THROW; END\
    \ CATCH\nEND"
  python_code: "def process_order_with_savepoint(conn, order_id: int, payment_id: int) -> None:\n    \"\"\"주문 처리 (SAVEPOINT\
    \ 부분 롤백). 원본 SP: ProcessOrderWithSavepoint\"\"\"\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\"UPDATE\
    \ Orders SET StatusCode='PROCESSING' WHERE OrderID=?\", (order_id,))\n        cursor.execute(\"SAVE TRANSACTION PaymentSave\"\
    )\n        try:\n            cursor.execute(\n                \"UPDATE Payments SET Status='CONFIRMED' WHERE PaymentID=?\"\
    , (payment_id,)\n            )\n            cursor.execute(\"UPDATE Orders SET StatusCode='PAID' WHERE OrderID=?\", (order_id,))\n\
    \        except Exception:\n            cursor.execute(\"ROLLBACK TRANSACTION PaymentSave\")\n            cursor.execute(\n\
    \                \"UPDATE Orders SET StatusCode='PAYMENT_FAILED' WHERE OrderID=?\", (order_id,)\n            )\n     \
    \   conn.commit()\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"주문 처리 실패: {exc}\"\
    ) from exc\n"
- title: 18. CURSOR 루프 → fetchall + executemany
  sql: "CREATE PROCEDURE RecalcAllDiscounts @RatePercent FLOAT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @ProductID INT;\
    \ DECLARE @BasePrice DECIMAL(10,2);\n    DECLARE cur CURSOR FOR SELECT ProductID,BasePrice FROM Products;\n    OPEN cur;\
    \ FETCH NEXT FROM cur INTO @ProductID,@BasePrice;\n    WHILE @@FETCH_STATUS=0\n    BEGIN\n        UPDATE Products SET\
    \ DiscountPrice=@BasePrice*(1.0-@RatePercent/100.0)\n        WHERE ProductID=@ProductID;\n        FETCH NEXT FROM cur\
    \ INTO @ProductID,@BasePrice;\n    END\n    CLOSE cur; DEALLOCATE cur;\nEND"
  python_code: "def recalc_all_discounts(conn, rate_percent: float) -> int:\n    \"\"\"전체 상품 할인가 재계산. CURSOR → fetchall+executemany.\
    \ 원본 SP: RecalcAllDiscounts\"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\"SELECT ProductID, BasePrice FROM Products\"\
    )\n    products = cursor.fetchall()\n    if not products:\n        return 0\n    updates = [\n        (float(bp) * (1.0\
    \ - rate_percent / 100.0), pid)\n        for pid, bp in products\n    ]\n    cursor.executemany(\n        \"UPDATE Products\
    \ SET DiscountPrice=? WHERE ProductID=?\", updates\n    )\n    conn.commit()\n    return len(updates)\n"
- title: 19. TRY/CATCH + RETURN 코드
  sql: "CREATE PROCEDURE SafeDeleteCustomer\n    @CustomerID INT, @ForceDelete BIT=0, @ReturnCode INT OUTPUT\nAS\nBEGIN\n\
    \    SET NOCOUNT ON;\n    BEGIN TRY\n        IF EXISTS(SELECT 1 FROM Orders WHERE CustomerID=@CustomerID\n           \
    \       AND StatusCode NOT IN('DONE','CANCEL'))\n        BEGIN\n            IF @ForceDelete=0 BEGIN SET @ReturnCode=1;\
    \ RETURN; END\n            UPDATE Orders SET StatusCode='CANCEL'\n            WHERE CustomerID=@CustomerID AND StatusCode\
    \ NOT IN('DONE','CANCEL');\n        END\n        DELETE FROM Customers WHERE CustomerID=@CustomerID;\n        SET @ReturnCode=0;\n\
    \    END TRY\n    BEGIN CATCH SET @ReturnCode=2; END CATCH\nEND"
  python_code: "from typing import Tuple\n\n\ndef safe_delete_customer(\n    conn, customer_id: int, force_delete: bool =\
    \ False\n) -> Tuple[int, str]:\n    \"\"\"고객 안전 삭제. (0=성공,1=활성주문존재,2=오류). 원본 SP: SafeDeleteCustomer\"\"\"\n    cursor\
    \ = conn.cursor()\n    try:\n        cursor.execute(\n            \"SELECT 1 FROM Orders WHERE CustomerID=? AND StatusCode\
    \ NOT IN('DONE','CANCEL')\",\n            (customer_id,),\n        )\n        has_active = cursor.fetchone() is not None\n\
    \        if has_active:\n            if not force_delete:\n                return 1, \"활성 주문이 존재합니다.\"\n            cursor.execute(\n\
    \                \"UPDATE Orders SET StatusCode='CANCEL'\"\n                \" WHERE CustomerID=? AND StatusCode NOT IN('DONE','CANCEL')\"\
    ,\n                (customer_id,),\n            )\n        cursor.execute(\"DELETE FROM Customers WHERE CustomerID=?\"\
    , (customer_id,))\n        conn.commit()\n        return 0, \"성공\"\n    except Exception as exc:\n        conn.rollback()\n\
    \        return 2, f\"DB 오류: {exc}\"\n"
- title: 20. 복합 종합 (CTE + 다중 OUTPUT + 트랜잭션)
  sql: "CREATE PROCEDURE CloseMonthlyAccounts\n    @YearMonth NVARCHAR(6), @ClosedCount INT OUTPUT, @TotalSettled DECIMAL(18,2)\
    \ OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n    BEGIN TRY\n        WITH Eligible AS (\n        \
    \    SELECT OrderID,CustomerID,TotalAmount FROM Orders\n            WHERE CONVERT(NVARCHAR(6),OrderDate,112)=@YearMonth\n\
    \              AND StatusCode='PAID' AND IsSettled=0\n        ), CustomerTotals AS (\n            SELECT CustomerID,SUM(TotalAmount)\
    \ AS SettledAmount FROM Eligible GROUP BY CustomerID\n        )\n        INSERT INTO SettlementHistory(CustomerID,YearMonth,Amount,SettledAt)\n\
    \        SELECT CustomerID,@YearMonth,SettledAmount,GETDATE() FROM CustomerTotals;\n\n        UPDATE Orders SET IsSettled=1,\
    \ SettledAt=GETDATE()\n        WHERE CONVERT(NVARCHAR(6),OrderDate,112)=@YearMonth\n          AND StatusCode='PAID' AND\
    \ IsSettled=0;\n        SET @ClosedCount=@@ROWCOUNT;\n        SELECT @TotalSettled=SUM(Amount) FROM SettlementHistory\
    \ WHERE YearMonth=@YearMonth;\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH ROLLBACK TRANSACTION; THROW;\
    \ END CATCH\nEND"
  python_code: "from datetime import datetime\nfrom typing import Tuple\n\n\ndef close_monthly_accounts(conn, year_month:\
    \ str) -> Tuple[int, float]:\n    \"\"\"월 마감 정산. (closed_count, total_settled) 반환. 원본 SP: CloseMonthlyAccounts\"\"\"\n\
    \    now = datetime.now()\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\"\"\"\n            WITH Eligible\
    \ AS (\n                SELECT OrderID,CustomerID,TotalAmount FROM Orders\n                WHERE CONVERT(NVARCHAR(6),OrderDate,112)=?\n\
    \                  AND StatusCode='PAID' AND IsSettled=0\n            ), CustomerTotals AS (\n                SELECT CustomerID,SUM(TotalAmount)\
    \ AS SettledAmount\n                FROM Eligible GROUP BY CustomerID\n            )\n            INSERT INTO SettlementHistory(CustomerID,YearMonth,Amount,SettledAt)\n\
    \            SELECT CustomerID,?,SettledAmount,? FROM CustomerTotals\n        \"\"\", (year_month, year_month, now))\n\
    \        cursor.execute(\"\"\"\n            UPDATE Orders SET IsSettled=1, SettledAt=?\n            WHERE CONVERT(NVARCHAR(6),OrderDate,112)=?\
    \ AND StatusCode='PAID' AND IsSettled=0\n        \"\"\", (now, year_month))\n        closed_count = cursor.rowcount\n\
    \        cursor.execute(\n            \"SELECT SUM(Amount) FROM SettlementHistory WHERE YearMonth=?\", (year_month,)\n\
    \        )\n        row = cursor.fetchone()\n        total_settled = float(row[0]) if row and row[0] else 0.0\n      \
    \  conn.commit()\n        return closed_count, total_settled\n    except Exception as exc:\n        conn.rollback()\n\
    \        raise RuntimeError(f\"월 마감 실패: {exc}\") from exc\n"
- title: 21. LEFT JOIN + INNER JOIN 복합 조회
  sql: "CREATE PROCEDURE GetOrderDetail\n    @OrderID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        o.OrderID,\n\
    \        o.OrderDate,\n        c.Name        AS CustomerName,\n        c.Email,\n        oi.ProductID,\n        p.Name\
    \        AS ProductName,\n        oi.Qty,\n        oi.UnitPrice,\n        oi.Qty * oi.UnitPrice AS LineTotal,\n      \
    \  a.AddressLine AS ShipAddress\n    FROM Orders o\n    INNER JOIN Customers    c  ON o.CustomerID   = c.CustomerID\n\
    \    INNER JOIN OrderItems   oi ON o.OrderID       = oi.OrderID\n    INNER JOIN Products     p  ON oi.ProductID    = p.ProductID\n\
    \    LEFT  JOIN ShipAddresses a ON o.ShipAddressID = a.AddressID\n    WHERE o.OrderID = @OrderID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_order_detail(\n    conn: conn,\n    order_id: int,\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"\n    주문 상세 조회 (복합 JOIN).\n    원본 SP: GetOrderDetail\n    변환 규칙:\n      INNER JOIN / LEFT JOIN → SQL\
    \ 그대로 유지\n      계산 컬럼(Qty*UnitPrice) → SQL에서 계산 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            o.OrderID,\
    \ o.OrderDate,\n            c.Name AS CustomerName, c.Email,\n            oi.ProductID, p.Name AS ProductName,\n     \
    \       oi.Qty, oi.UnitPrice,\n            oi.Qty * oi.UnitPrice AS LineTotal,\n            a.AddressLine AS ShipAddress\n\
    \        FROM Orders o\n        INNER JOIN Customers    c  ON o.CustomerID   = c.CustomerID\n        INNER JOIN OrderItems\
    \   oi ON o.OrderID       = oi.OrderID\n        INNER JOIN Products     p  ON oi.ProductID    = p.ProductID\n        LEFT\
    \  JOIN ShipAddresses a ON o.ShipAddressID = a.AddressID\n        WHERE o.OrderID = ?\n    \"\"\"\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, (order_id,))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 22. SELF JOIN (계층 조직도)
  sql: "CREATE PROCEDURE GetOrgChart\n    @RootEmployeeID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        e.EmployeeID,\n\
    \        e.Name,\n        e.Title,\n        m.Name AS ManagerName,\n        e.ManagerID\n    FROM  Employees e\n    LEFT\
    \  JOIN Employees m ON e.ManagerID = m.EmployeeID\n    WHERE e.EmployeeID = @RootEmployeeID\n       OR e.ManagerID  =\
    \ @RootEmployeeID\n    ORDER BY e.ManagerID, e.EmployeeID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_org_chart(\n    conn: conn,\n    root_employee_id: int,\n) ->\
    \ List[Dict[str, Any]]:\n    \"\"\"\n    조직도 조회 (SELF JOIN).\n    원본 SP: GetOrgChart\n    변환 규칙:\n      SELF JOIN (같은\
    \ 테이블 두 번 참조) → 테이블 별칭으로 SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            e.EmployeeID, e.Name, e.Title,\n\
    \            m.Name AS ManagerName, e.ManagerID\n        FROM  Employees e\n        LEFT  JOIN Employees m ON e.ManagerID\
    \ = m.EmployeeID\n        WHERE e.EmployeeID = ?\n           OR e.ManagerID  = ?\n        ORDER BY e.ManagerID, e.EmployeeID\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (root_employee_id, root_employee_id))\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 23. ROW_NUMBER 윈도우 함수
  sql: "CREATE PROCEDURE GetRankedSalespeople\n    @TopN INT = 10\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT *\n    FROM\
    \ (\n        SELECT\n            EmployeeID,\n            Name,\n            Department,\n            TotalSales,\n  \
    \          ROW_NUMBER() OVER (\n                PARTITION BY Department ORDER BY TotalSales DESC\n            ) AS DeptRank\n\
    \        FROM vw_SalesSummary\n    ) ranked\n    WHERE DeptRank <= @TopN;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_ranked_salespeople(\n    conn: conn,\n    top_n: int = 10,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    부서별 영업 순위 조회.\n    원본 SP: GetRankedSalespeople\n    변환 규칙:\n      ROW_NUMBER()\
    \ OVER (PARTITION BY ... ORDER BY ...) → SQL 그대로 유지\n      서브쿼리 WHERE → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n   \
    \     SELECT *\n        FROM (\n            SELECT\n                EmployeeID, Name, Department, TotalSales,\n      \
    \          ROW_NUMBER() OVER (\n                    PARTITION BY Department ORDER BY TotalSales DESC\n               \
    \ ) AS DeptRank\n            FROM vw_SalesSummary\n        ) ranked\n        WHERE DeptRank <= ?\n    \"\"\"\n    cursor\
    \ = conn.cursor()\n    cursor.execute(sql, (top_n,))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 24. RANK / DENSE_RANK / LAG / LEAD 윈도우 함수
  sql: "CREATE PROCEDURE GetMonthlyGrowth\n    @Year INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        Month,\n   \
    \     Revenue,\n        LAG(Revenue,  1, 0) OVER (ORDER BY Month) AS PrevRevenue,\n        LEAD(Revenue, 1, 0) OVER (ORDER\
    \ BY Month) AS NextRevenue,\n        RANK()        OVER (ORDER BY Revenue DESC) AS RevenueRank,\n        DENSE_RANK()\
    \  OVER (ORDER BY Revenue DESC) AS DenseRank,\n        Revenue - LAG(Revenue, 1, 0) OVER (ORDER BY Month) AS MoM_Delta\n\
    \    FROM MonthlySales\n    WHERE Year = @Year\n    ORDER BY Month;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_monthly_growth(\n    conn: conn,\n    year: int,\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"\n    월별 매출 성장 분석.\n    원본 SP: GetMonthlyGrowth\n    변환 규칙:\n      LAG / LEAD / RANK / DENSE_RANK\
    \ → SQL 그대로 유지\n      복합 윈도우 함수는 DB 최적화에 맡기는 것이 효율적\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            Month,\
    \ Revenue,\n            LAG(Revenue,  1, 0) OVER (ORDER BY Month) AS PrevRevenue,\n            LEAD(Revenue, 1, 0) OVER\
    \ (ORDER BY Month) AS NextRevenue,\n            RANK()        OVER (ORDER BY Revenue DESC) AS RevenueRank,\n         \
    \   DENSE_RANK()  OVER (ORDER BY Revenue DESC) AS DenseRank,\n            Revenue - LAG(Revenue, 1, 0) OVER (ORDER BY\
    \ Month) AS MoM_Delta\n        FROM MonthlySales\n        WHERE Year = ?\n        ORDER BY Month\n    \"\"\"\n    cursor\
    \ = conn.cursor()\n    cursor.execute(sql, (year,))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 25. NTILE / PERCENT_RANK / CUME_DIST
  sql: "CREATE PROCEDURE GetCustomerSegments\n    @Buckets INT = 4\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        CustomerID,\n\
    \        TotalSpent,\n        NTILE(@Buckets)    OVER (ORDER BY TotalSpent DESC) AS Bucket,\n        PERCENT_RANK()  \
    \   OVER (ORDER BY TotalSpent)      AS PctRank,\n        CUME_DIST()        OVER (ORDER BY TotalSpent)      AS CumDist\n\
    \    FROM vw_CustomerLifetimeValue\n    ORDER BY TotalSpent DESC;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_customer_segments(\n    conn: conn,\n    buckets: int = 4,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    고객 세그멘테이션 (NTILE/PERCENT_RANK/CUME_DIST).\n    원본 SP: GetCustomerSegments\n\
    \    변환 규칙:\n      NTILE(@Buckets) → NTILE(?) 파라미터 바인딩 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            CustomerID,\
    \ TotalSpent,\n            NTILE(?)      OVER (ORDER BY TotalSpent DESC) AS Bucket,\n            PERCENT_RANK() OVER (ORDER\
    \ BY TotalSpent)     AS PctRank,\n            CUME_DIST()    OVER (ORDER BY TotalSpent)     AS CumDist\n        FROM vw_CustomerLifetimeValue\n\
    \        ORDER BY TotalSpent DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (buckets,))\n    rows\
    \ = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in\
    \ rows]\n"
- title: 26. 재귀 CTE (계층 트리 전체 탐색)
  sql: "CREATE PROCEDURE GetCategoryTree\n    @RootCategoryID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    WITH CategoryCTE AS\
    \ (\n        SELECT CategoryID, ParentID, Name, 0 AS Depth\n        FROM   Categories\n        WHERE  CategoryID = @RootCategoryID\n\
    \n        UNION ALL\n\n        SELECT c.CategoryID, c.ParentID, c.Name, cte.Depth + 1\n        FROM   Categories c\n \
    \       INNER JOIN CategoryCTE cte ON c.ParentID = cte.CategoryID\n    )\n    SELECT CategoryID, ParentID, Name, Depth\n\
    \    FROM   CategoryCTE\n    ORDER  BY Depth, CategoryID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_category_tree(\n    conn: conn,\n    root_category_id: int,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    카테고리 계층 트리 전체 조회 (재귀 CTE).\n    원본 SP: GetCategoryTree\n    변환 규칙:\n     \
    \ 재귀 WITH ... UNION ALL → SQL 그대로 유지\n      (SQL Server / pyodbc 재귀 CTE 지원)\n    \"\"\"\n    sql = \"\"\"\n        WITH\
    \ CategoryCTE AS (\n            SELECT CategoryID, ParentID, Name, 0 AS Depth\n            FROM   Categories\n       \
    \     WHERE  CategoryID = ?\n            UNION ALL\n            SELECT c.CategoryID, c.ParentID, c.Name, cte.Depth + 1\n\
    \            FROM   Categories c\n            INNER JOIN CategoryCTE cte ON c.ParentID = cte.CategoryID\n        )\n \
    \       SELECT CategoryID, ParentID, Name, Depth\n        FROM   CategoryCTE\n        ORDER  BY Depth, CategoryID\n  \
    \  \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (root_category_id,))\n    rows = cursor.fetchall()\n  \
    \  cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 27. 문자열 조작 (SUBSTRING, CHARINDEX, REPLACE, UPPER)
  sql: "CREATE PROCEDURE NormalizeContactInfo\n    @ContactID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        ContactID,\n\
    \        UPPER(LTRIM(RTRIM(Name)))                          AS NormalizedName,\n        LOWER(LTRIM(RTRIM(Email)))   \
    \                      AS NormalizedEmail,\n        REPLACE(REPLACE(REPLACE(Phone, '-', ''), ' ', ''), '(', '') AS CleanPhone,\n\
    \        SUBSTRING(Email, 1, CHARINDEX('@', Email) - 1)    AS EmailUser,\n        SUBSTRING(Email, CHARINDEX('@', Email)\
    \ + 1, LEN(Email)) AS EmailDomain\n    FROM Contacts\n    WHERE ContactID = @ContactID;\nEND\n"
  python_code: "from typing import Optional, Dict, Any\n\ndef normalize_contact_info(\n    conn: conn,\n    contact_id: int,\n\
    ) -> Optional[Dict[str, Any]]:\n    \"\"\"\n    연락처 정규화 조회.\n    원본 SP: NormalizeContactInfo\n    변환 규칙:\n      문자열 함수들\
    \ → SQL 그대로 유지 (DB에서 처리가 효율적)\n      UPPER/LOWER/LTRIM/RTRIM/REPLACE/SUBSTRING/CHARINDEX → SQL 유지\n    \"\"\"\n    sql\
    \ = \"\"\"\n        SELECT\n            ContactID,\n            UPPER(LTRIM(RTRIM(Name)))                         AS NormalizedName,\n\
    \            LOWER(LTRIM(RTRIM(Email)))                        AS NormalizedEmail,\n            REPLACE(REPLACE(REPLACE(Phone,'-',''),'\
    \ ',''),'(','') AS CleanPhone,\n            SUBSTRING(Email, 1, CHARINDEX('@',Email)-1)       AS EmailUser,\n        \
    \    SUBSTRING(Email, CHARINDEX('@',Email)+1, LEN(Email)) AS EmailDomain\n        FROM Contacts\n        WHERE ContactID\
    \ = ?\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (contact_id,))\n    row = cursor.fetchone()\n \
    \   if row is None:\n        return None\n    cols = [col[0] for col in cursor.description]\n    return dict(zip(cols,\
    \ row))\n"
- title: 28. JSON 데이터 처리 (FOR JSON / JSON_VALUE)
  sql: "CREATE PROCEDURE GetOrderAsJson\n    @OrderID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    -- 결과를 JSON으로 반환\n    SELECT\n\
    \        o.OrderID,\n        o.OrderDate,\n        c.Name AS CustomerName,\n        (\n            SELECT oi.ProductID,\
    \ oi.Qty, oi.UnitPrice\n            FROM OrderItems oi\n            WHERE oi.OrderID = o.OrderID\n            FOR JSON\
    \ PATH\n        ) AS ItemsJson\n    FROM Orders o\n    JOIN Customers c ON o.CustomerID = c.CustomerID\n    WHERE o.OrderID\
    \ = @OrderID;\nEND\n"
  python_code: "import json\nfrom typing import Optional, Dict, Any\n\ndef get_order_as_json(\n    conn: conn,\n    order_id:\
    \ int,\n) -> Optional[Dict[str, Any]]:\n    \"\"\"\n    주문 정보를 dict 구조로 반환 (중첩 items 포함).\n    원본 SP: GetOrderAsJson\n\
    \    변환 규칙:\n      FOR JSON PATH → Python에서 별도 쿼리로 items 조회 후 dict에 합침\n      (pyodbc는 FOR JSON PATH 결과를 문자열로 반환하므로 분리\
