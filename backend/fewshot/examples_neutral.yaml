    \ c.Name AS CustomerName\n        FROM Orders o JOIN Customers c ON o.CustomerID = c.CustomerID\n        WHERE o.OrderID\
    \ = ?\n        \"\"\",\n        (order_id,),\n    )\n    row = cursor.fetchone()\n    if row is None:\n        return\
