- title: 29. PIVOT / 행→열 변환
  sql: "CREATE PROCEDURE GetQuarterlySalesPivot\n    @Year INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        ProductID,\n\
    \        ISNULL([Q1], 0) AS Q1,\n        ISNULL([Q2], 0) AS Q2,\n        ISNULL([Q3], 0) AS Q3,\n        ISNULL([Q4],\
    \ 0) AS Q4\n    FROM (\n        SELECT ProductID, Quarter, Revenue\n        FROM   QuarterlySales\n        WHERE  Year\
    \ = @Year\n    ) src\n    PIVOT (\n        SUM(Revenue) FOR Quarter IN ([Q1],[Q2],[Q3],[Q4])\n    ) pvt\n    ORDER BY\
    \ ProductID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_quarterly_sales_pivot(\n    conn: conn,\n    year: int,\n) ->\
    \ List[Dict[str, Any]]:\n    \"\"\"\n    분기별 매출 피벗 조회.\n    원본 SP: GetQuarterlySalesPivot\n    변환 규칙:\n      PIVOT ...\
    \ FOR ... IN → Python에서 raw 데이터 조회 후 dict로 피벗 변환\n      (PIVOT SQL 문법은 이식성이 낮아 Python 변환 권장)\n    \"\"\"\n    cursor =\
    \ conn.cursor()\n    cursor.execute(\n        \"SELECT ProductID, Quarter, Revenue FROM QuarterlySales WHERE Year = ?\"\
    ,\n        (year,),\n    )\n    raw = cursor.fetchall()\n\n    pivot: Dict[int, Dict[str, float]] = {}\n    for product_id,\
    \ quarter, revenue in raw:\n        if product_id not in pivot:\n            pivot[product_id] = {\"ProductID\": product_id,\
    \ \"Q1\": 0, \"Q2\": 0, \"Q3\": 0, \"Q4\": 0}\n        pivot[product_id][quarter] = float(revenue or 0)\n\n    return\
    \ sorted(pivot.values(), key=lambda x: x[\"ProductID\"])\n"
- title: 30. UNPIVOT / 열→행 변환
  sql: "CREATE PROCEDURE UnpivotScores\n    @StudentID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT StudentID, Subject,\
    \ Score\n    FROM (\n        SELECT StudentID, Math, Science, English, History\n        FROM   StudentScores\n       \
    \ WHERE  StudentID = @StudentID\n    ) src\n    UNPIVOT (\n        Score FOR Subject IN (Math, Science, English, History)\n\
    \    ) unpvt;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef unpivot_scores(\n    conn: conn,\n    student_id: int,\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"\n    학생 점수 열→행 변환.\n    원본 SP: UnpivotScores\n    변환 규칙:\n      UNPIVOT → Python에서 wide 행을 조회 후 long\
    \ 형태로 변환\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\n        \"SELECT StudentID, Math, Science, English,\
    \ History\"\n        \" FROM StudentScores WHERE StudentID = ?\",\n        (student_id,),\n    )\n    row = cursor.fetchone()\n\
    \    if row is None:\n        return []\n\n    student_id_val, math, science, english, history = row\n    subjects = {\"\
    Math\": math, \"Science\": science, \"English\": english, \"History\": history}\n    return [\n        {\"StudentID\"\
    : student_id_val, \"Subject\": subj, \"Score\": score}\n        for subj, score in subjects.items()\n        if score\
    \ is not None\n    ]\n"
- title: 31. 타입 캐스팅 (CAST / CONVERT / TRY_CAST)
  sql: "CREATE PROCEDURE ImportRawData\n    @RawAmount   NVARCHAR(50),\n    @RawDate     NVARCHAR(20),\n    @RawIsActive NVARCHAR(5)\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @Amount   DECIMAL(18,2);\n    DECLARE @Date     DATE;\n    DECLARE @IsActive\
    \ BIT;\n\n    SET @Amount   = TRY_CAST(@RawAmount AS DECIMAL(18,2));\n    SET @Date     = TRY_CAST(@RawDate   AS DATE);\n\
    \    SET @IsActive = CASE WHEN LOWER(@RawIsActive) IN ('true','1','yes') THEN 1 ELSE 0 END;\n\n    IF @Amount IS NULL\
    \ OR @Date IS NULL\n    BEGIN\n        RAISERROR('변환 실패: 유효하지 않은 입력값', 16, 1);\n        RETURN;\n    END\n\n    INSERT\
    \ INTO ImportedData (Amount, ImportDate, IsActive)\n    VALUES (@Amount, @Date, @IsActive);\nEND\n"
  python_code: "from datetime import date\nfrom decimal import Decimal, InvalidOperation\nfrom typing import Optional\n\n\
    def import_raw_data(\n    conn: conn,\n    raw_amount: str,\n    raw_date: str,\n    raw_is_active: str,\n) -> None:\n\
    \    \"\"\"\n    원시 문자열 데이터를 타입 변환 후 저장.\n    원본 SP: ImportRawData\n    변환 규칙:\n      TRY_CAST → Python try/except 로 안전\
    \ 변환\n      CASE WHEN LOWER(...) IN ('true','1','yes') → Python 표현식\n      RAISERROR + RETURN → ValueError raise 후 return\n\
    \    \"\"\"\n    # TRY_CAST(amount AS DECIMAL)\n    try:\n        amount = float(Decimal(raw_amount.strip()))\n    except\
    \ (InvalidOperation, ValueError):\n        raise ValueError(f\"변환 실패: 유효하지 않은 amount '{raw_amount}'\")\n\n    # TRY_CAST(date\
    \ AS DATE)\n    try:\n        parsed_date = date.fromisoformat(raw_date.strip())\n    except ValueError:\n        raise\
    \ ValueError(f\"변환 실패: 유효하지 않은 date '{raw_date}'\")\n\n    # CASE WHEN LOWER(...) IN (...)\n    is_active: bool = raw_is_active.strip().lower()\
    \ in {\"true\", \"1\", \"yes\"}\n\n    cursor = conn.cursor()\n    cursor.execute(\n        \"INSERT INTO ImportedData\
    \ (Amount, ImportDate, IsActive) VALUES (?, ?, ?)\",\n        (amount, parsed_date, int(is_active)),\n    )\n    conn.commit()\n"
- title: 32. 에러 로깅 테이블 INSERT
  sql: "CREATE PROCEDURE ProcessWithErrorLog\n    @BatchID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    BEGIN TRY\n        --\
    \ 핵심 작업\n        UPDATE BatchJobs SET Status = 'RUNNING', StartedAt = GETDATE()\n        WHERE  BatchID = @BatchID;\n\n\
    \        EXEC sp_DoHeavyWork @BatchID;\n\n        UPDATE BatchJobs SET Status = 'DONE', FinishedAt = GETDATE()\n     \
    \   WHERE  BatchID = @BatchID;\n    END TRY\n    BEGIN CATCH\n        UPDATE BatchJobs SET Status = 'FAILED', FinishedAt\
    \ = GETDATE()\n        WHERE  BatchID = @BatchID;\n\n        INSERT INTO ErrorLog (BatchID, ErrorMsg, ErrorLine, OccurredAt)\n\
    \        VALUES (\n            @BatchID,\n            ERROR_MESSAGE(),\n            ERROR_LINE(),\n            GETDATE()\n\
    \        );\n        THROW;\n    END CATCH\nEND\n"
  python_code: "import traceback\nfrom datetime import datetime\n\ndef process_with_error_log(\n    conn: conn,\n    batch_id:\
    \ int,\n) -> None:\n    \"\"\"\n    배치 처리 + 에러 로깅.\n    원본 SP: ProcessWithErrorLog\n    변환 규칙:\n      ERROR_MESSAGE()\
    \ / ERROR_LINE() → Python exc 문자열 / traceback\n      BEGIN CATCH 내 INSERT ErrorLog → except 블록에서 INSERT\n      sp_DoHeavyWork\
    \ → 별도 Python 함수 호출로 대체\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\n        \"UPDATE BatchJobs SET Status='RUNNING',\
    \ StartedAt=? WHERE BatchID=?\",\n        (datetime.now(), batch_id),\n    )\n    conn.commit()\n\n    try:\n        #\
    \ sp_DoHeavyWork 대체 로직 호출\n        _do_heavy_work(conn, batch_id)\n\n        cursor.execute(\n            \"UPDATE BatchJobs\
    \ SET Status='DONE', FinishedAt=? WHERE BatchID=?\",\n            (datetime.now(), batch_id),\n        )\n        conn.commit()\n\
    \n    except Exception as exc:\n        conn.rollback()\n        error_msg  = str(exc)\n        error_line = traceback.extract_tb(exc.__traceback__)[-1].lineno\
    \ if exc.__traceback__ else 0\n\n        cursor.execute(\n            \"UPDATE BatchJobs SET Status='FAILED', FinishedAt=?\
    \ WHERE BatchID=?\",\n            (datetime.now(), batch_id),\n        )\n        cursor.execute(\n            \"INSERT\
    \ INTO ErrorLog (BatchID, ErrorMsg, ErrorLine, OccurredAt)\"\n            \" VALUES (?, ?, ?, ?)\",\n            (batch_id,\
    \ error_msg, error_line, datetime.now()),\n        )\n        conn.commit()\n        raise\n\ndef _do_heavy_work(conn:\
    \ conn, batch_id: int) -> None:\n    \"\"\"sp_DoHeavyWork 대체 함수 — 실제 로직으로 구현 필요.\"\"\"\n    pass\n"
- title: 33. WHILE 루프 (반복 배치 처리)
  sql: "CREATE PROCEDURE ProcessInBatches\n    @BatchSize  INT = 1000,\n    @MaxBatches INT = 100\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    DECLARE @Processed INT = 0;\n    DECLARE @BatchCount INT = 0;\n\n    WHILE @BatchCount < @MaxBatches\n    BEGIN\n\
    \        UPDATE TOP (@BatchSize) StagingData\n        SET    ProcessedAt = GETDATE(),\n               IsProcessed = 1\n\
    \        WHERE  IsProcessed = 0;\n\n        IF @@ROWCOUNT = 0 BREAK;\n\n        SET @Processed  = @Processed + @@ROWCOUNT;\n\
    \        SET @BatchCount = @BatchCount + 1;\n    END\n\n    SELECT @Processed AS TotalProcessed, @BatchCount AS BatchesRun;\n\
    END\n"
  python_code: "from datetime import datetime\nfrom typing import Dict\n\ndef process_in_batches(\n    conn: conn,\n    batch_size:\
    \ int = 1000,\n    max_batches: int = 100,\n) -> Dict[str, int]:\n    \"\"\"\n    대용량 데이터 배치 처리.\n    원본 SP: ProcessInBatches\n\
    \    변환 규칙:\n      WHILE + BREAK → Python while + break\n      @@ROWCOUNT = 0 → cursor.rowcount == 0\n      DECLARE @Var\
    \ = 0 → Python 로컬 변수\n      TOP (@BatchSize) → TOP (?) 파라미터 바인딩\n    \"\"\"\n    cursor    = conn.cursor()\n    processed\
    \ = 0\n    batch_count = 0\n\n    while batch_count < max_batches:\n        cursor.execute(\n            \"UPDATE TOP\
    \ (?) StagingData\"\n            \" SET ProcessedAt=?, IsProcessed=1\"\n            \" WHERE IsProcessed=0\",\n      \
    \      (batch_size, datetime.now()),\n        )\n        if cursor.rowcount == 0:\n            break\n\n        processed\
    \   += cursor.rowcount\n        batch_count += 1\n        conn.commit()\n\n    return {\"TotalProcessed\": processed,\
    \ \"BatchesRun\": batch_count}\n"
- title: 34. CROSS APPLY / OUTER APPLY
  sql: "CREATE PROCEDURE GetLatestOrderPerCustomer\n    @MinOrders INT = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n \
    \       c.CustomerID,\n        c.Name,\n        oa.OrderID,\n        oa.OrderDate,\n        oa.TotalAmount\n    FROM Customers\
    \ c\n    OUTER APPLY (\n        SELECT TOP 1 OrderID, OrderDate, TotalAmount\n        FROM   Orders o\n        WHERE \
    \ o.CustomerID = c.CustomerID\n        ORDER  BY o.OrderDate DESC\n    ) oa\n    WHERE (\n        SELECT COUNT(*) FROM\
    \ Orders o2\n        WHERE o2.CustomerID = c.CustomerID\n    ) >= @MinOrders\n    ORDER BY c.CustomerID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_latest_order_per_customer(\n    conn: conn,\n    min_orders:\
    \ int = 1,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    고객별 최신 주문 조회 (OUTER APPLY).\n    원본 SP: GetLatestOrderPerCustomer\n\
    \    변환 규칙:\n      OUTER APPLY (SELECT TOP 1 ... ORDER BY ...) → SQL 그대로 유지\n      (APPLY는 SQL Server 전용이므로 쿼리 내 유지 권장)\n\
    \    \"\"\"\n    sql = \"\"\"\n        SELECT\n            c.CustomerID, c.Name,\n            oa.OrderID, oa.OrderDate,\
    \ oa.TotalAmount\n        FROM Customers c\n        OUTER APPLY (\n            SELECT TOP 1 OrderID, OrderDate, TotalAmount\n\
    \            FROM   Orders o\n            WHERE  o.CustomerID = c.CustomerID\n            ORDER  BY o.OrderDate DESC\n\
    \        ) oa\n        WHERE (\n            SELECT COUNT(*) FROM Orders o2\n            WHERE o2.CustomerID = c.CustomerID\n\
    \        ) >= ?\n        ORDER BY c.CustomerID\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (min_orders,))\n\
    \    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for\
    \ row in rows]\n"
- title: 35. FULL OUTER JOIN
  sql: "CREATE PROCEDURE ReconcileInventory\n    @WarehouseID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        COALESCE(s.ProductID,\
    \ p.ProductID) AS ProductID,\n        s.SystemQty,\n        p.PhysicalQty,\n        ISNULL(s.SystemQty,0) - ISNULL(p.PhysicalQty,0)\
    \ AS Variance\n    FROM SystemInventory  s\n    FULL OUTER JOIN PhysicalCount p\n        ON s.ProductID   = p.ProductID\n\
    \       AND s.WarehouseID = p.WarehouseID\n    WHERE s.WarehouseID = @WarehouseID\n       OR p.WarehouseID = @WarehouseID\n\
    \    ORDER BY Variance DESC;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef reconcile_inventory(\n    conn: conn,\n    warehouse_id: int,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    재고 시스템-실사 대사.\n    원본 SP: ReconcileInventory\n    변환 규칙:\n      FULL OUTER\
    \ JOIN → SQL 그대로 유지\n      COALESCE / ISNULL → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            COALESCE(s.ProductID,\
    \ p.ProductID) AS ProductID,\n            s.SystemQty, p.PhysicalQty,\n            ISNULL(s.SystemQty,0) - ISNULL(p.PhysicalQty,0)\
    \ AS Variance\n        FROM SystemInventory s\n        FULL OUTER JOIN PhysicalCount p\n            ON s.ProductID   =\
    \ p.ProductID\n           AND s.WarehouseID = p.WarehouseID\n        WHERE s.WarehouseID = ?\n           OR p.WarehouseID\
    \ = ?\n        ORDER BY Variance DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (warehouse_id,\
    \ warehouse_id))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols,\
    \ row)) for row in rows]\n"
- title: 36. 집계 함수 + HAVING
  sql: "CREATE PROCEDURE GetHighValueCustomers\n    @MinTotalSpent  DECIMAL(18,2) = 1000000,\n    @MinOrderCount  INT    \
    \       = 5\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        CustomerID,\n        COUNT(*)         AS OrderCount,\n\
    \        SUM(TotalAmount) AS TotalSpent,\n        AVG(TotalAmount) AS AvgOrder,\n        MIN(OrderDate)   AS FirstOrder,\n\
    \        MAX(OrderDate)   AS LastOrder\n    FROM Orders\n    WHERE StatusCode = 'DONE'\n    GROUP BY CustomerID\n    HAVING\
    \ SUM(TotalAmount) >= @MinTotalSpent\n       AND COUNT(*) >= @MinOrderCount\n    ORDER BY TotalSpent DESC;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_high_value_customers(\n    conn: conn,\n    min_total_spent:\
    \ float = 1_000_000,\n    min_order_count: int = 5,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    고가치 고객 조회.\n    원본 SP:\
    \ GetHighValueCustomers\n    변환 규칙:\n      GROUP BY + HAVING → SQL 그대로 유지\n      집계 함수 파라미터 조건 → HAVING 절 파라미터 바인딩\n \
    \   \"\"\"\n    sql = \"\"\"\n        SELECT\n            CustomerID,\n            COUNT(*)         AS OrderCount,\n \
    \           SUM(TotalAmount) AS TotalSpent,\n            AVG(TotalAmount) AS AvgOrder,\n            MIN(OrderDate)   AS\
    \ FirstOrder,\n            MAX(OrderDate)   AS LastOrder\n        FROM Orders\n        WHERE StatusCode = 'DONE'\n   \
    \     GROUP BY CustomerID\n        HAVING SUM(TotalAmount) >= ?\n           AND COUNT(*) >= ?\n        ORDER BY TotalSpent\
    \ DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (min_total_spent, min_order_count))\n    rows\
    \ = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in\
    \ rows]\n"
- title: 37. SUBQUERY IN WHERE (IN / NOT IN)
  sql: "CREATE PROCEDURE GetUnpurchasedProducts\n    @CustomerID INT,\n    @CategoryID INT = NULL\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    SELECT ProductID, Name, Price\n    FROM   Products\n    WHERE  IsActive = 1\n      AND  ProductID NOT IN (\n\
    \          SELECT DISTINCT ProductID\n          FROM   OrderItems oi\n          JOIN   Orders o ON oi.OrderID = o.OrderID\n\
    \          WHERE  o.CustomerID = @CustomerID\n      )\n      AND (@CategoryID IS NULL OR CategoryID = @CategoryID)\n \
    \   ORDER BY Price;\nEND\n"
  python_code: "from typing import List, Dict, Any, Optional\n\ndef get_unpurchased_products(\n    conn: conn,\n    customer_id:\
    \ int,\n    category_id: Optional[int] = None,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    고객이 아직 구매하지 않은 상품 조회.\n  \
    \  원본 SP: GetUnpurchasedProducts\n    변환 규칙:\n      NOT IN (서브쿼리) → SQL 그대로 유지\n      동적 AND 조건 → Python 분기\n    \"\"\"\
    \n    base_sql = \"\"\"\n        SELECT ProductID, Name, Price\n        FROM   Products\n        WHERE  IsActive = 1\n\
    \          AND  ProductID NOT IN (\n              SELECT DISTINCT oi.ProductID\n              FROM   OrderItems oi\n \
    \             JOIN   Orders o ON oi.OrderID = o.OrderID\n              WHERE  o.CustomerID = ?\n          )\n    \"\"\"\
    \n    params: list = [customer_id]\n\n    if category_id is not None:\n        base_sql += \" AND CategoryID = ?\\n\"\n\
    \        params.append(category_id)\n    base_sql += \"ORDER BY Price\"\n\n    cursor = conn.cursor()\n    cursor.execute(base_sql,\
    \ params)\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols,\
    \ row)) for row in rows]\n"
- title: 38. ROLLUP / CUBE 소계
  sql: "CREATE PROCEDURE GetSalesRollup\n    @Year INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        ISNULL(CAST(Region\
    \ AS NVARCHAR), '전체')    AS Region,\n        ISNULL(CAST(Quarter AS NVARCHAR), '전체')   AS Quarter,\n        SUM(Revenue)\
    \ AS TotalRevenue\n    FROM SalesData\n    WHERE Year = @Year\n    GROUP BY ROLLUP(Region, Quarter)\n    ORDER BY Region,\
    \ Quarter;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_sales_rollup(\n    conn: conn,\n    year: int,\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"\n    지역/분기별 매출 소계 (ROLLUP).\n    원본 SP: GetSalesRollup\n    변환 규칙:\n      GROUP BY ROLLUP → SQL 그대로\
    \ 유지\n      ISNULL(CAST(... AS NVARCHAR), '전체') → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n         \
    \   ISNULL(CAST(Region AS NVARCHAR), '전체')  AS Region,\n            ISNULL(CAST(Quarter AS NVARCHAR), '전체') AS Quarter,\n\
    \            SUM(Revenue) AS TotalRevenue\n        FROM SalesData\n        WHERE Year = ?\n        GROUP BY ROLLUP(Region,\
    \ Quarter)\n        ORDER BY Region, Quarter\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (year,))\n\
    \    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for\
    \ row in rows]\n"
- title: 39. STRING_AGG / STUFF FOR XML PATH (문자열 집계)
  sql: "CREATE PROCEDURE GetProductTagsSummary\n    @CategoryID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        p.ProductID,\n\
    \        p.Name,\n        STUFF((\n            SELECT ',' + t.TagName\n            FROM   ProductTags pt\n           \
    \ JOIN   Tags t ON pt.TagID = t.TagID\n            WHERE  pt.ProductID = p.ProductID\n            FOR XML PATH(''), TYPE\n\
    \        ).value('.','NVARCHAR(MAX)'), 1, 1, '') AS Tags\n    FROM Products p\n    WHERE p.CategoryID = @CategoryID\n\
    \      AND p.IsActive   = 1\n    ORDER BY p.ProductID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_product_tags_summary(\n    conn: conn,\n    category_id: int,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    상품별 태그 목록 (쉼표 구분 문자열).\n    원본 SP: GetProductTagsSummary\n    변환 규칙:\n   \
    \   STUFF(... FOR XML PATH) → Python에서 별도 쿼리 후 ','.join()\n      (STUFF/FOR XML PATH는 SQL Server 전용 → Python 변환 필수)\n\
    \    \"\"\"\n    cursor = conn.cursor()\n\n    # 상품 목록\n    cursor.execute(\n        \"SELECT ProductID, Name FROM Products\
    \ WHERE CategoryID=? AND IsActive=1 ORDER BY ProductID\",\n        (category_id,),\n    )\n    products = cursor.fetchall()\n\
    \n    result: List[Dict[str, Any]] = []\n    for product_id, name in products:\n        cursor.execute(\n            \"\
    \"\"\n            SELECT t.TagName\n            FROM   ProductTags pt\n            JOIN   Tags t ON pt.TagID = t.TagID\n\
    \            WHERE  pt.ProductID = ?\n            ORDER  BY t.TagName\n            \"\"\",\n            (product_id,),\n\
    \        )\n        tags = \",\".join(row[0] for row in cursor.fetchall())\n        result.append({\"ProductID\": product_id,\
    \ \"Name\": name, \"Tags\": tags})\n\n    return result\n"
- title: 40. 시퀀스 / IDENTITY 관리
  sql: "CREATE PROCEDURE GetNextSequenceValue\n    @SequenceName NVARCHAR(100),\n    @NextValue    BIGINT OUTPUT\nAS\nBEGIN\n\
    \    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n    BEGIN TRY\n        UPDATE Sequences\n        SET    CurrentValue = CurrentValue\
    \ + StepSize,\n               UpdatedAt    = GETDATE()\n        WHERE  SequenceName = @SequenceName;\n\n        IF @@ROWCOUNT\
    \ = 0\n            RAISERROR('시퀀스를 찾을 수 없음: %s', 16, 1, @SequenceName);\n\n        SELECT @NextValue = CurrentValue\n\
    \        FROM   Sequences\n        WHERE  SequenceName = @SequenceName;\n\n        COMMIT TRANSACTION;\n    END TRY\n\
    \    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n        THROW;\n    END CATCH\nEND\n"
  python_code: "def get_next_sequence_value(\n    conn: conn,\n    sequence_name: str,\n) -> int:\n    \"\"\"\n    커스텀 시퀀스\
    \ 다음 값 채번.\n    원본 SP: GetNextSequenceValue\n    변환 규칙:\n      UPDATE + SELECT 같은 트랜잭션 → try/except 내에서 순서대로 실행\n    \
    \  @@ROWCOUNT = 0 → rowcount == 0 → ValueError\n      OUTPUT 파라미터 → return value\n    \"\"\"\n    cursor = conn.cursor()\n\
    \    try:\n        cursor.execute(\n            \"UPDATE Sequences SET CurrentValue=CurrentValue+StepSize, UpdatedAt=GETDATE()\"\
    \n            \" WHERE SequenceName=?\",\n            (sequence_name,),\n        )\n        if cursor.rowcount == 0:\n\
    \            raise ValueError(f\"시퀀스를 찾을 수 없음: {sequence_name}\")\n\n        cursor.execute(\n            \"SELECT CurrentValue\
    \ FROM Sequences WHERE SequenceName=?\",\n            (sequence_name,),\n        )\n        row = cursor.fetchone()\n\
    \        conn.commit()\n        return int(row[0])\n    except Exception as exc:\n        conn.rollback()\n        raise\
    \ RuntimeError(f\"시퀀스 채번 실패: {exc}\") from exc\n"
- title: 41. 소프트 삭제 + 감사 로그
  sql: "CREATE PROCEDURE SoftDeleteRecord\n    @TableName  NVARCHAR(128),\n    @RecordID   INT,\n    @DeletedBy  INT\nAS\n\
    BEGIN\n    SET NOCOUNT ON;\n    DECLARE @SQL NVARCHAR(MAX);\n    DECLARE @AuditSQL NVARCHAR(MAX);\n\n    SET @SQL = N'UPDATE\
    \ ' + QUOTENAME(@TableName)\n             + N' SET IsDeleted=1, DeletedAt=GETDATE(), DeletedBy=@DBy'\n             + N'\
    \ WHERE ID=@RID AND IsDeleted=0';\n\n    EXEC sp_executesql @SQL,\n        N'@DBy INT, @RID INT',\n        @DBy = @DeletedBy,\n\
    \        @RID = @RecordID;\n\n    INSERT INTO AuditLog (TableName, RecordID, Action, PerformedBy, PerformedAt)\n    VALUES\
    \ (@TableName, @RecordID, 'SOFT_DELETE', @DeletedBy, GETDATE());\nEND\n"
  python_code: "import re\nfrom datetime import datetime\n\n_ALLOWED_TABLES = frozenset({\n    \"Users\", \"Products\", \"\
    Orders\", \"Customers\", \"Employees\"\n})\n\ndef soft_delete_record(\n    conn: conn,\n    table_name: str,\n    record_id:\
    \ int,\n    deleted_by: int,\n) -> None:\n    \"\"\"\n    레코드 소프트 삭제 + 감사 로그 기록.\n    원본 SP: SoftDeleteRecord\n    변환\
    \ 규칙:\n      sp_executesql (동적 SQL) → 화이트리스트 검증 후 문자열 조립\n      QUOTENAME → 화이트리스트 + 대괄호 처리\n      감사 INSERT → except\
    \ 없이 항상 실행\n    \"\"\"\n    if table_name not in _ALLOWED_TABLES:\n        raise ValueError(f\"허용되지 않은 테이블: {table_name}\"\
    )\n\n    now = datetime.now()\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n            f\"UPDATE [{table_name}]\
    \ SET IsDeleted=1, DeletedAt=?, DeletedBy=?\"\n            f\" WHERE ID=? AND IsDeleted=0\",\n            (now, deleted_by,\
    \ record_id),\n        )\n        cursor.execute(\n            \"INSERT INTO AuditLog (TableName,RecordID,Action,PerformedBy,PerformedAt)\"\
    \n            \" VALUES (?,?,?,?,?)\",\n            (table_name, record_id, \"SOFT_DELETE\", deleted_by, now),\n     \
    \   )\n        conn.commit()\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"소프트\
    \ 삭제 실패: {exc}\") from exc\n"
- title: 42. 낙관적 잠금 (Optimistic Locking / RowVersion)
  sql: "CREATE PROCEDURE UpdateWithVersionCheck\n    @ProductID      INT,\n    @NewPrice       DECIMAL(10,2),\n    @ExpectedVersion\
    \ ROWVERSION,\n    @Updated        BIT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    UPDATE Products\n    SET    Price \
    \    = @NewPrice,\n           UpdatedAt = GETDATE()\n    WHERE  ProductID = @ProductID\n      AND  RowVer    = @ExpectedVersion;\n\
    \n    SET @Updated = CASE WHEN @@ROWCOUNT > 0 THEN 1 ELSE 0 END;\nEND\n"
  python_code: "from datetime import datetime\n\ndef update_with_version_check(\n    conn: conn,\n    product_id: int,\n \
    \   new_price: float,\n    expected_version: bytes,\n) -> bool:\n    \"\"\"\n    낙관적 잠금으로 가격 업데이트.\n    원본 SP: UpdateWithVersionCheck\n\
    \    변환 규칙:\n      ROWVERSION → bytes 타입 파라미터\n      @@ROWCOUNT > 0 → cursor.rowcount > 0\n      OUTPUT BIT → return bool\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\n        \"UPDATE Products SET Price=?, UpdatedAt=?\"\n \
    \       \" WHERE ProductID=? AND RowVer=?\",\n        (new_price, datetime.now(), product_id, expected_version),\n   \
    \ )\n    updated = cursor.rowcount > 0\n    conn.commit()\n    return updated\n"
- title: 43. 비관적 잠금 (SELECT ... WITH (UPDLOCK))
  sql: "CREATE PROCEDURE ReserveTicket\n    @EventID  INT,\n    @UserID   INT,\n    @TicketID INT OUTPUT\nAS\nBEGIN\n    BEGIN\
    \ TRANSACTION;\n    BEGIN TRY\n        -- 잠금 획득 후 가용 티켓 선택\n        SELECT TOP 1 @TicketID = TicketID\n        FROM  \
    \ Tickets WITH (UPDLOCK, ROWLOCK)\n        WHERE  EventID   = @EventID\n          AND  Status    = 'AVAILABLE'\n     \
    \   ORDER  BY TicketID;\n\n        IF @TicketID IS NULL\n        BEGIN\n            ROLLBACK TRANSACTION;\n          \
    \  RETURN;\n        END\n\n        UPDATE Tickets\n        SET    Status    = 'RESERVED',\n               ReservedBy =\
    \ @UserID,\n               ReservedAt = GETDATE()\n        WHERE  TicketID = @TicketID;\n\n        COMMIT TRANSACTION;\n\
    \    END TRY\n    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n        THROW;\n    END CATCH\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import Optional\n\ndef reserve_ticket(\n    conn: conn,\n    event_id:\
    \ int,\n    user_id: int,\n) -> Optional[int]:\n    \"\"\"\n    티켓 예약 (비관적 잠금).\n    원본 SP: ReserveTicket\n    변환 규칙:\n\
    \      SELECT TOP 1 ... WITH (UPDLOCK, ROWLOCK) → SQL 힌트 그대로 유지\n      IF @TicketID IS NULL + ROLLBACK + RETURN → None\
    \ 반환\n      OUTPUT 파라미터 → return value\n    \"\"\"\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n  \
    \          \"SELECT TOP 1 TicketID FROM Tickets WITH (UPDLOCK, ROWLOCK)\"\n            \" WHERE EventID=? AND Status='AVAILABLE'\
    \ ORDER BY TicketID\",\n            (event_id,),\n        )\n        row = cursor.fetchone()\n        if row is None:\n\
    \            conn.rollback()\n            return None\n\n        ticket_id = int(row[0])\n        cursor.execute(\n  \
    \          \"UPDATE Tickets SET Status='RESERVED', ReservedBy=?, ReservedAt=?\"\n            \" WHERE TicketID=?\",\n\
    \            (user_id, datetime.now(), ticket_id),\n        )\n        conn.commit()\n        return ticket_id\n    except\
    \ Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"티켓 예약 실패: {exc}\") from exc\n"
- title: 44. 멀티 테넌트 (TenantID 파티셔닝)
  sql: "CREATE PROCEDURE GetTenantUsers\n    @TenantID   INT,\n    @RoleFilter NVARCHAR(50) = NULL,\n    @PageNo     INT =\
    \ 1,\n    @PageSize   INT = 50\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT UserID, Name, Email, Role, CreatedAt\n    FROM\
    \   TenantUsers\n    WHERE  TenantID = @TenantID\n      AND  IsDeleted = 0\n      AND  (@RoleFilter IS NULL OR Role =\
    \ @RoleFilter)\n    ORDER  BY UserID\n    OFFSET (@PageNo - 1) * @PageSize ROWS\n    FETCH  NEXT @PageSize ROWS ONLY;\n\
    END\n"
  python_code: "from typing import List, Dict, Any, Optional\n\ndef get_tenant_users(\n    conn: conn,\n    tenant_id: int,\n\
    \    role_filter: Optional[str] = None,\n    page_no: int = 1,\n    page_size: int = 50,\n) -> List[Dict[str, Any]]:\n\
    \    \"\"\"\n    테넌트별 사용자 페이징 조회.\n    원본 SP: GetTenantUsers\n    변환 규칙:\n      TenantID 조건 → 모든 쿼리에 반드시 포함 (멀티 테넌트 보안)\n\
    \      OFFSET-FETCH → params로 전달\n    \"\"\"\n    clauses = [\"TenantID = ?\", \"IsDeleted = 0\"]\n    params: list =\
    \ [tenant_id]\n\n    if role_filter is not None:\n        clauses.append(\"Role = ?\")\n        params.append(role_filter)\n\
    \n    offset = (page_no - 1) * page_size\n    sql = (\n        f\"SELECT UserID, Name, Email, Role, CreatedAt\"\n    \
    \    f\" FROM TenantUsers WHERE {' AND '.join(clauses)}\"\n        f\" ORDER BY UserID OFFSET ? ROWS FETCH NEXT ? ROWS\
    \ ONLY\"\n    )\n    params += [offset, page_size]\n\n    cursor = conn.cursor()\n    cursor.execute(sql, params)\n  \
    \  rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row\
    \ in rows]\n"
- title: 45. 재시도 로직 (RETRY with WAITFOR DELAY)
  sql: "CREATE PROCEDURE InsertWithRetry\n    @Data       NVARCHAR(500),\n    @MaxRetries INT = 3\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    DECLARE @Attempt INT = 0;\n    DECLARE @Success BIT = 0;\n\n    WHILE @Attempt < @MaxRetries AND @Success =\
    \ 0\n    BEGIN\n        BEGIN TRY\n            INSERT INTO TargetTable (Data, InsertedAt)\n            VALUES (@Data,\
    \ GETDATE());\n            SET @Success = 1;\n        END TRY\n        BEGIN CATCH\n            SET @Attempt = @Attempt\
    \ + 1;\n            IF @Attempt < @MaxRetries\n                WAITFOR DELAY '00:00:01';\n        END CATCH\n    END\n\
    \n    IF @Success = 0\n        RAISERROR('최대 재시도 횟수 초과', 16, 1);\nEND\n"
  python_code: "import time\nfrom datetime import datetime\n\ndef insert_with_retry(\n    conn: conn,\n    data: str,\n  \
    \  max_retries: int = 3,\n    retry_delay: float = 1.0,\n) -> None:\n    \"\"\"\n    재시도 로직 포함 INSERT.\n    원본 SP: InsertWithRetry\n\
    \    변환 규칙:\n      WHILE + TRY/CATCH + SET @Success → Python while + try/except\n      WAITFOR DELAY '00:00:01' → time.sleep(retry_delay)\n\
    \      RAISERROR (최종 실패) → RuntimeError raise\n    \"\"\"\n    last_exc: Exception = RuntimeError(\"알 수 없는 오류\")\n   \
    \ for attempt in range(max_retries):\n        try:\n            cursor = conn.cursor()\n            cursor.execute(\n\
    \                \"INSERT INTO TargetTable (Data, InsertedAt) VALUES (?, ?)\",\n                (data, datetime.now()),\n\
    \            )\n            conn.commit()\n            return\n        except Exception as exc:\n            last_exc\
    \ = exc\n            conn.rollback()\n            if attempt < max_retries - 1:\n                time.sleep(retry_delay)\n\
    \n    raise RuntimeError(f\"최대 재시도 횟수 초과: {last_exc}\") from last_exc\n"
- title: 46. 스케줄 작업 상태 관리
  sql: "CREATE PROCEDURE ClaimScheduledJob\n    @WorkerID   NVARCHAR(100),\n    @JobID      INT OUTPUT\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n    BEGIN TRANSACTION;\n    BEGIN TRY\n        SELECT TOP 1 @JobID = JobID\n        FROM   ScheduledJobs\
    \ WITH (UPDLOCK)\n        WHERE  Status      = 'PENDING'\n          AND  ScheduledAt <= GETDATE()\n        ORDER  BY Priority\
    \ DESC, ScheduledAt ASC;\n\n        IF @JobID IS NOT NULL\n            UPDATE ScheduledJobs\n            SET    Status\
    \    = 'RUNNING',\n                   WorkerID  = @WorkerID,\n                   StartedAt = GETDATE()\n            WHERE\
    \  JobID = @JobID;\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n     \
    \   THROW;\n    END CATCH\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import Optional\n\ndef claim_scheduled_job(\n    conn: conn,\n\
    \    worker_id: str,\n) -> Optional[int]:\n    \"\"\"\n    스케줄 작업 클레임.\n    원본 SP: ClaimScheduledJob\n    변환 규칙:\n   \
    \   WITH (UPDLOCK) → SQL 힌트 유지\n      IF @JobID IS NOT NULL → if job_id is not None\n      OUTPUT 파라미터 → return Optional[int]\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n            \"SELECT TOP 1 JobID FROM ScheduledJobs\
    \ WITH (UPDLOCK)\"\n            \" WHERE Status='PENDING' AND ScheduledAt<=?\"\n            \" ORDER BY Priority DESC,\
    \ ScheduledAt ASC\",\n            (datetime.now(),),\n        )\n        row = cursor.fetchone()\n        job_id = int(row[0])\
    \ if row else None\n\n        if job_id is not None:\n            cursor.execute(\n                \"UPDATE ScheduledJobs\
    \ SET Status='RUNNING', WorkerID=?, StartedAt=?\"\n                \" WHERE JobID=?\",\n                (worker_id, datetime.now(),\
    \ job_id),\n            )\n        conn.commit()\n        return job_id\n    except Exception as exc:\n        conn.rollback()\n\
    \        raise RuntimeError(f\"작업 클레임 실패: {exc}\") from exc\n"
- title: 47. 알림 큐 INSERT + 상태 업데이트
  sql: "CREATE PROCEDURE SendNotification\n    @UserID     INT,\n    @Channel    NVARCHAR(20),   -- EMAIL, SMS, PUSH\n   \
    \ @Title      NVARCHAR(200),\n    @Body       NVARCHAR(MAX),\n    @NotiID     INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
    \    INSERT INTO NotificationQueue\n        (UserID, Channel, Title, Body, Status, CreatedAt, ScheduledAt)\n    VALUES\n\
    \        (@UserID, @Channel, @Title, @Body, 'PENDING', GETDATE(), GETDATE());\n\n    SET @NotiID = SCOPE_IDENTITY();\n\
    \n    -- 사용자 알림 카운터 증가\n    UPDATE Users\n    SET    UnreadNotiCount = UnreadNotiCount + 1\n    WHERE  UserID = @UserID;\n\
    END\n"
  python_code: "from datetime import datetime\n\ndef send_notification(\n    conn: conn,\n    user_id: int,\n    channel:\
    \ str,\n    title: str,\n    body: str,\n) -> int:\n    \"\"\"\n    알림 큐 등록 + 미읽음 카운터 증가.\n    원본 SP: SendNotification\n\
    \    변환 규칙:\n      SCOPE_IDENTITY → SELECT CAST(SCOPE_IDENTITY() AS INT)\n      OUTPUT 파라미터 → return int\n      GETDATE()\
    \ × 2 → datetime.now() 한 번 캡처 후 재사용\n    \"\"\"\n    now = datetime.now()\n    cursor = conn.cursor()\n    try:\n    \
    \    cursor.execute(\n            \"\"\"\n            INSERT INTO NotificationQueue\n                (UserID, Channel,\
    \ Title, Body, Status, CreatedAt, ScheduledAt)\n            VALUES (?,?,?,?,'PENDING',?,?);\n            SELECT CAST(SCOPE_IDENTITY()\
    \ AS INT) AS NewID;\n            \"\"\",\n            (user_id, channel, title, body, now, now),\n        )\n        row\
    \ = cursor.fetchone()\n        noti_id = int(row[0]) if row else -1\n\n        cursor.execute(\n            \"UPDATE Users\
    \ SET UnreadNotiCount=UnreadNotiCount+1 WHERE UserID=?\",\n            (user_id,),\n        )\n        conn.commit()\n\
    \        return noti_id\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"알림 등록 실패:\
    \ {exc}\") from exc\n"
- title: 48. 파티션 테이블 조회 (날짜 범위)
  sql: "CREATE PROCEDURE GetPartitionedLogs\n    @StartDate DATETIME,\n    @EndDate   DATETIME,\n    @Level     NVARCHAR(10)\
    \ = NULL   -- ERROR, WARN, INFO\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT LogID, Level, Message, Source, LoggedAt\n\
    \    FROM   AppLogs\n    WHERE  LoggedAt BETWEEN @StartDate AND @EndDate\n      AND  (@Level IS NULL OR Level = @Level)\n\
    \    ORDER  BY LoggedAt DESC;\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import List, Dict, Any, Optional\n\ndef get_partitioned_logs(\n\
    \    conn: conn,\n    start_date: datetime,\n    end_date: datetime,\n    level: Optional[str] = None,\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"\n    파티션 테이블 로그 조회.\n    원본 SP: GetPartitionedLogs\n    변환 규칙:\n      DATETIME 파라미터 → datetime.datetime\n\
    \      BETWEEN → BETWEEN ? AND ?\n      동적 조건 → Python 분기\n    \"\"\"\n    sql = (\n        \"SELECT LogID, Level, Message,\
    \ Source, LoggedAt\"\n        \" FROM AppLogs WHERE LoggedAt BETWEEN ? AND ?\"\n    )\n    params: list = [start_date,\
    \ end_date]\n\n    if level is not None:\n        sql += \" AND Level = ?\"\n        params.append(level)\n\n    sql +=\
    \ \" ORDER BY LoggedAt DESC\"\n\n    cursor = conn.cursor()\n    cursor.execute(sql, params)\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 49. 집계 후 조건별 UPDATE (CASE 업데이트)
  sql: "CREATE PROCEDURE UpdateCustomerGrades\nAS\nBEGIN\n    SET NOCOUNT ON;\n    UPDATE c\n    SET    c.Grade = CASE\n \
    \       WHEN stats.TotalSpent >= 5000000 THEN 'VIP'\n        WHEN stats.TotalSpent >= 1000000 THEN 'GOLD'\n        WHEN\
    \ stats.TotalSpent >= 300000  THEN 'SILVER'\n        ELSE 'BASIC'\n    END,\n    c.GradeUpdatedAt = GETDATE()\n    FROM\
    \ Customers c\n    INNER JOIN (\n        SELECT CustomerID, SUM(TotalAmount) AS TotalSpent\n        FROM   Orders\n  \
    \      WHERE  StatusCode = 'DONE'\n        GROUP  BY CustomerID\n    ) stats ON c.CustomerID = stats.CustomerID;\nEND\n"
  python_code: "from datetime import datetime\n\ndef update_customer_grades(conn: conn) -> int:\n    \"\"\"\n    고객 등급 일괄\
    \ 업데이트 (집계 기반 CASE).\n    원본 SP: UpdateCustomerGrades\n    변환 규칙:\n      UPDATE ... FROM ... INNER JOIN (서브쿼리) → SQL 그대로\
    \ 유지\n      CASE WHEN 집계 기반 → SQL 그대로 유지 (DB 최적화 활용)\n      반환: 업데이트된 행 수\n    \"\"\"\n    sql = \"\"\"\n        UPDATE\
    \ c\n        SET    c.Grade = CASE\n            WHEN stats.TotalSpent >= 5000000 THEN 'VIP'\n            WHEN stats.TotalSpent\
    \ >= 1000000 THEN 'GOLD'\n            WHEN stats.TotalSpent >= 300000  THEN 'SILVER'\n            ELSE 'BASIC'\n     \
    \   END,\n        c.GradeUpdatedAt = ?\n        FROM Customers c\n        INNER JOIN (\n            SELECT CustomerID,\
    \ SUM(TotalAmount) AS TotalSpent\n            FROM   Orders WHERE StatusCode='DONE'\n            GROUP  BY CustomerID\n\
    \        ) stats ON c.CustomerID = stats.CustomerID\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (datetime.now(),))\n\
    \    updated = cursor.rowcount\n    conn.commit()\n    return updated\n"
- title: 50. 연쇄 DELETE (CASCADE 수동 구현)
  sql: "CREATE PROCEDURE DeleteOrderCascade\n    @OrderID   INT,\n    @DeletedBy INT\nAS\nBEGIN\n    BEGIN TRANSACTION;\n\
    \    BEGIN TRY\n        -- 자식 테이블 먼저 삭제\n        DELETE FROM OrderPayments  WHERE OrderID = @OrderID;\n        DELETE\
    \ FROM OrderShipments WHERE OrderID = @OrderID;\n        DELETE FROM OrderItems     WHERE OrderID = @OrderID;\n      \
    \  DELETE FROM Orders         WHERE OrderID = @OrderID;\n\n        INSERT INTO AuditLog (Action, RecordID, PerformedBy,\
    \ PerformedAt)\n        VALUES ('ORDER_CASCADE_DELETE', @OrderID, @DeletedBy, GETDATE());\n\n        COMMIT TRANSACTION;\n\
    \    END TRY\n    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n        THROW;\n    END CATCH\nEND\n"
  python_code: "from datetime import datetime\n\ndef delete_order_cascade(\n    conn: conn,\n    order_id: int,\n    deleted_by:\
    \ int,\n) -> None:\n    \"\"\"\n    주문 연쇄 삭제 (CASCADE 수동).\n    원본 SP: DeleteOrderCascade\n    변환 규칙:\n      순서대로 DELETE\
    \ → 자식 먼저, 부모 나중 (외래키 의존성 순서 유지)\n      트랜잭션 + 감사 로그\n    \"\"\"\n    now = datetime.now()\n    cursor = conn.cursor()\n\
    \    try:\n        cursor.execute(\"DELETE FROM OrderPayments  WHERE OrderID=?\", (order_id,))\n        cursor.execute(\"\
    DELETE FROM OrderShipments WHERE OrderID=?\", (order_id,))\n        cursor.execute(\"DELETE FROM OrderItems     WHERE\
    \ OrderID=?\", (order_id,))\n        cursor.execute(\"DELETE FROM Orders         WHERE OrderID=?\", (order_id,))\n   \
    \     cursor.execute(\n            \"INSERT INTO AuditLog (Action,RecordID,PerformedBy,PerformedAt)\"\n            \"\
    \ VALUES ('ORDER_CASCADE_DELETE',?,?,?)\",\n            (order_id, deleted_by, now),\n        )\n        conn.commit()\n\
    \    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"연쇄 삭제 실패: {exc}\") from exc\n"
- title: 51. 통계 집계 (PERCENTILE_CONT / PERCENTILE_DISC)
  sql: "CREATE PROCEDURE GetPriceStatistics\n    @CategoryID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        COUNT(*)\
    \                                          AS Count,\n        AVG(Price)                                        AS Mean,\n\
    \        STDEV(Price)                                      AS StdDev,\n        MIN(Price)                            \
    \            AS MinPrice,\n        MAX(Price)                                        AS MaxPrice,\n        PERCENTILE_CONT(0.5)\
    \ WITHIN GROUP (ORDER BY Price) OVER () AS Median,\n        PERCENTILE_CONT(0.25) WITHIN GROUP (ORDER BY Price) OVER ()\
    \ AS Q1,\n        PERCENTILE_CONT(0.75) WITHIN GROUP (ORDER BY Price) OVER () AS Q3\n    FROM Products\n    WHERE CategoryID\
    \ = @CategoryID AND IsActive = 1;\nEND\n"
  python_code: "from typing import Dict, Any\n\ndef get_price_statistics(\n    conn: conn,\n    category_id: int,\n) -> Dict[str,\
    \ Any]:\n    \"\"\"\n    상품 가격 통계.\n    원본 SP: GetPriceStatistics\n    변환 규칙:\n      PERCENTILE_CONT ... WITHIN GROUP\
    \ OVER () → SQL 그대로 유지\n      STDEV → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            COUNT(*) \
    \                                             AS Count,\n            AVG(Price)                                      \
    \      AS Mean,\n            STDEV(Price)                                          AS StdDev,\n            MIN(Price)\
    \                                            AS MinPrice,\n            MAX(Price)                                    \
    \        AS MaxPrice,\n            PERCENTILE_CONT(0.5)  WITHIN GROUP (ORDER BY Price) OVER () AS Median,\n          \
    \  PERCENTILE_CONT(0.25) WITHIN GROUP (ORDER BY Price) OVER () AS Q1,\n            PERCENTILE_CONT(0.75) WITHIN GROUP\
    \ (ORDER BY Price) OVER () AS Q3\n        FROM Products\n        WHERE CategoryID=? AND IsActive=1\n    \"\"\"\n    cursor\
    \ = conn.cursor()\n    cursor.execute(sql, (category_id,))\n    row = cursor.fetchone()\n    cols = [col[0] for col in\
    \ cursor.description]\n    return dict(zip(cols, row)) if row else {}\n"
- title: 52. BULK COPY / bcp 패턴 (executemany 배치)
  sql: "CREATE PROCEDURE BulkUpsertPrices\n    @PriceData NVARCHAR(MAX)  -- JSON 배열 형태 입력\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
    \    DECLARE @Prices TABLE (ProductID INT, NewPrice DECIMAL(10,2));\n\n    INSERT INTO @Prices\n    SELECT ProductID,\
    \ NewPrice\n    FROM OPENJSON(@PriceData)\n    WITH (ProductID INT, NewPrice DECIMAL(10,2));\n\n    MERGE Products AS\
    \ t\n    USING @Prices AS s ON t.ProductID = s.ProductID\n    WHEN MATCHED THEN\n        UPDATE SET t.Price=s.NewPrice,\
    \ t.UpdatedAt=GETDATE()\n    WHEN NOT MATCHED THEN\n        INSERT (ProductID, Price, CreatedAt)\n        VALUES (s.ProductID,\
    \ s.NewPrice, GETDATE());\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import List, Tuple\n\ndef bulk_upsert_prices(\n    conn: conn,\n\
    \    prices: List[Tuple[int, float]],\n) -> None:\n    \"\"\"\n    가격 일괄 UPSERT.\n    원본 SP: BulkUpsertPrices\n    변환\
    \ 규칙:\n      OPENJSON → Python List[Tuple] 파라미터로 직접 전달\n      MERGE → EXISTS 체크 후 UPDATE/INSERT 분기 + executemany\n   \
    \ \"\"\"\n    now = datetime.now()\n    cursor = conn.cursor()\n    try:\n        # 기존 ProductID 조회\n        ids = [p[0]\
    \ for p in prices]\n        placeholders = \",\".join([\"?\"] * len(ids))\n        cursor.execute(\n            f\"SELECT\
    \ ProductID FROM Products WHERE ProductID IN ({placeholders})\",\n            ids,\n        )\n        existing = {row[0]\
    \ for row in cursor.fetchall()}\n\n        updates = [(p[1], now, p[0]) for p in prices if p[0] in existing]\n       \
    \ inserts = [(p[0], p[1], now) for p in prices if p[0] not in existing]\n\n        if updates:\n            cursor.executemany(\n\
    \                \"UPDATE Products SET Price=?, UpdatedAt=? WHERE ProductID=?\", updates\n            )\n        if inserts:\n\
    \            cursor.executemany(\n                \"INSERT INTO Products (ProductID, Price, CreatedAt) VALUES (?,?,?)\"\
    , inserts\n            )\n        conn.commit()\n    except Exception as exc:\n        conn.rollback()\n        raise\
    \ RuntimeError(f\"일괄 UPSERT 실패: {exc}\") from exc\n"
- title: 53. 읽기 전용 트랜잭션 (SNAPSHOT ISOLATION)
  sql: "CREATE PROCEDURE GetConsistentReport\n    @ReportDate DATE\nAS\nBEGIN\n    SET TRANSACTION ISOLATION LEVEL SNAPSHOT;\n\
    \    BEGIN TRANSACTION;\n\n    SELECT o.OrderID, o.TotalAmount, c.Name AS CustomerName\n    FROM   Orders    o\n    JOIN\
    \   Customers c ON o.CustomerID = c.CustomerID\n    WHERE  CAST(o.OrderDate AS DATE) = @ReportDate;\n\n    COMMIT TRANSACTION;\n\
    END\n"
  python_code: "from datetime import date\nfrom typing import List, Dict, Any\n\ndef get_consistent_report(\n    conn: conn,\n\
    \    report_date: date,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    일관된 보고서 조회 (스냅샷 격리).\n    원본 SP: GetConsistentReport\n\
    \    변환 규칙:\n      SET TRANSACTION ISOLATION LEVEL SNAPSHOT → 커넥션 속성 또는 SQL 직접 실행\n      CAST(OrderDate AS DATE) → SQL\
    \ 그대로 유지\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\"SET TRANSACTION ISOLATION LEVEL SNAPSHOT\")\n \
    \   cursor.execute(\n        \"\"\"\n        SELECT o.OrderID, o.TotalAmount, c.Name AS CustomerName\n        FROM   Orders\
    \ o\n        JOIN   Customers c ON o.CustomerID = c.CustomerID\n        WHERE  CAST(o.OrderDate AS DATE) = ?\n       \
    \ \"\"\",\n        (report_date,),\n    )\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    # 격리 레벨 복원\n    cursor.execute(\"SET TRANSACTION ISOLATION LEVEL READ COMMITTED\")\n    return [dict(zip(cols, row))\
    \ for row in rows]\n"
- title: 54. 다중 CTE 체인
  sql: "CREATE PROCEDURE GetLtvFunnel\n    @CohortMonth NVARCHAR(7)   -- 'YYYY-MM'\nAS\nBEGIN\n    SET NOCOUNT ON;\n    WITH\n\
    \    Cohort AS (\n        SELECT CustomerID\n        FROM   Customers\n        WHERE  FORMAT(CreatedAt, 'yyyy-MM') = @CohortMonth\n\
    \    ),\n    FirstOrders AS (\n        SELECT o.CustomerID, MIN(o.OrderDate) AS FirstOrderDate\n        FROM   Orders\
    \ o\n        JOIN   Cohort c ON o.CustomerID = c.CustomerID\n        GROUP  BY o.CustomerID\n    ),\n    LTV AS (\n  \
    \      SELECT fo.CustomerID,\n               fo.FirstOrderDate,\n               SUM(o.TotalAmount) AS LifetimeValue\n\
    \        FROM   FirstOrders fo\n        JOIN   Orders o ON fo.CustomerID = o.CustomerID\n        GROUP  BY fo.CustomerID,\
    \ fo.FirstOrderDate\n    )\n    SELECT\n        l.CustomerID,\n        l.FirstOrderDate,\n        l.LifetimeValue,\n \
    \       DATEDIFF(DAY, l.FirstOrderDate, GETDATE()) AS DaysSinceFirst\n    FROM LTV l\n    ORDER BY l.LifetimeValue DESC;\n\
    END\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_ltv_funnel(\n    conn: conn,\n    cohort_month: str,\n) -> List[Dict[str,\
    \ Any]]:\n    \"\"\"\n    코호트 LTV 퍼널 분석.\n    원본 SP: GetLtvFunnel\n    변환 규칙:\n      다중 CTE 체인 (WITH A AS (...), B AS\
    \ (...)) → SQL 그대로 유지\n      FORMAT(date, 'yyyy-MM') → CONVERT(NVARCHAR(7), date, 120)\n      DATEDIFF(DAY, ..., GETDATE())\
    \ → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        WITH\n        Cohort AS (\n            SELECT CustomerID\n     \
    \       FROM   Customers\n            WHERE  CONVERT(NVARCHAR(7), CreatedAt, 120) = ?\n        ),\n        FirstOrders\
    \ AS (\n            SELECT o.CustomerID, MIN(o.OrderDate) AS FirstOrderDate\n            FROM   Orders o JOIN Cohort c\
    \ ON o.CustomerID=c.CustomerID\n            GROUP  BY o.CustomerID\n        ),\n        LTV AS (\n            SELECT fo.CustomerID,\
    \ fo.FirstOrderDate,\n                   SUM(o.TotalAmount) AS LifetimeValue\n            FROM   FirstOrders fo JOIN Orders\
    \ o ON fo.CustomerID=o.CustomerID\n            GROUP  BY fo.CustomerID, fo.FirstOrderDate\n        )\n        SELECT l.CustomerID,\
    \ l.FirstOrderDate, l.LifetimeValue,\n               DATEDIFF(DAY, l.FirstOrderDate, GETDATE()) AS DaysSinceFirst\n  \
    \      FROM LTV l\n        ORDER BY l.LifetimeValue DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql,\
    \ (cohort_month,))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols,\
    \ row)) for row in rows]\n"
- title: 55. EXCEPT / INTERSECT 집합 연산
  sql: "CREATE PROCEDURE GetCustomerDiff\n    @GroupA INT,\n    @GroupB INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    -- GroupA에\
    \ 있고 GroupB에 없는 고객\n    SELECT CustomerID FROM GroupMembers WHERE GroupID = @GroupA\n    EXCEPT\n    SELECT CustomerID\
    \ FROM GroupMembers WHERE GroupID = @GroupB\n\n    UNION ALL\n\n    -- 두 그룹 모두에 있는 고객\n    SELECT CustomerID FROM GroupMembers\
    \ WHERE GroupID = @GroupA\n    INTERSECT\n    SELECT CustomerID FROM GroupMembers WHERE GroupID = @GroupB;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_customer_diff(\n    conn: conn,\n    group_a: int,\n    group_b:\
    \ int,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    고객 그룹 집합 연산 (EXCEPT + INTERSECT).\n    원본 SP: GetCustomerDiff\n  \
    \  변환 규칙:\n      EXCEPT / INTERSECT / UNION ALL → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT CustomerID,\
    \ 'ONLY_A' AS Membership\n        FROM GroupMembers WHERE GroupID=?\n        EXCEPT\n        SELECT CustomerID, 'ONLY_A'\
    \ AS Membership\n        FROM GroupMembers WHERE GroupID=?\n\n        UNION ALL\n\n        SELECT CustomerID, 'BOTH' AS\
    \ Membership\n        FROM GroupMembers WHERE GroupID=?\n        INTERSECT\n        SELECT CustomerID, 'BOTH' AS Membership\n\
    \        FROM GroupMembers WHERE GroupID=?\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (group_a,\
    \ group_b, group_a, group_b))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return\
    \ [dict(zip(cols, row)) for row in rows]\n"
- title: 56. 지연 실행 / DATEADD 기반 만료 처리
  sql: "CREATE PROCEDURE ExpireOldSessions\n    @TimeoutMinutes INT = 30\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @ExpiredCount\
    \ INT;\n\n    UPDATE UserSessions\n    SET    Status    = 'EXPIRED',\n           ExpiredAt = GETDATE()\n    WHERE  Status\
    \    = 'ACTIVE'\n      AND  LastActivity < DATEADD(MINUTE, -@TimeoutMinutes, GETDATE());\n\n    SET @ExpiredCount = @@ROWCOUNT;\n\
    \n    SELECT @ExpiredCount AS ExpiredCount;\nEND\n"
  python_code: "from datetime import datetime, timedelta\n\ndef expire_old_sessions(\n    conn: conn,\n    timeout_minutes:\
    \ int = 30,\n) -> int:\n    \"\"\"\n    만료된 세션 처리.\n    원본 SP: ExpireOldSessions\n    변환 규칙:\n      DATEADD(MINUTE, -N,\
    \ GETDATE()) → datetime.now() - timedelta(minutes=N)\n      @@ROWCOUNT → cursor.rowcount\n      OUTPUT SELECT → return\
    \ int\n    \"\"\"\n    cutoff = datetime.now() - timedelta(minutes=timeout_minutes)\n    cursor = conn.cursor()\n    cursor.execute(\n\
    \        \"UPDATE UserSessions SET Status='EXPIRED', ExpiredAt=?\"\n        \" WHERE Status='ACTIVE' AND LastActivity<?\"\
    ,\n        (datetime.now(), cutoff),\n    )\n    expired_count = cursor.rowcount\n    conn.commit()\n    return expired_count\n"
- title: 57. 재귀 합계 (계층별 누적)
  sql: "CREATE PROCEDURE GetDeptBudgetRollup\n    @RootDeptID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    WITH DeptTree AS (\n\
    \        SELECT DeptID, ParentDeptID, DeptName, Budget, 0 AS Level\n        FROM   Departments WHERE DeptID = @RootDeptID\n\
    \        UNION ALL\n        SELECT d.DeptID, d.ParentDeptID, d.DeptName, d.Budget, dt.Level + 1\n        FROM   Departments\
    \ d\n        JOIN   DeptTree dt ON d.ParentDeptID = dt.DeptID\n    )\n    SELECT\n        DeptID, DeptName, Level, Budget,\n\
    \        SUM(Budget) OVER (PARTITION BY Level) AS LevelTotalBudget\n    FROM DeptTree\n    ORDER BY Level, DeptID;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_dept_budget_rollup(\n    conn: conn,\n    root_dept_id: int,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    부서 예산 계층 누적 집계.\n    원본 SP: GetDeptBudgetRollup\n    변환 규칙:\n      재귀 CTE\
    \ + 윈도우 함수 SUM OVER (PARTITION BY) → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        WITH DeptTree AS (\n          \
    \  SELECT DeptID, ParentDeptID, DeptName, Budget, 0 AS Level\n            FROM   Departments WHERE DeptID=?\n        \
    \    UNION ALL\n            SELECT d.DeptID, d.ParentDeptID, d.DeptName, d.Budget, dt.Level+1\n            FROM   Departments\
    \ d JOIN DeptTree dt ON d.ParentDeptID=dt.DeptID\n        )\n        SELECT DeptID, DeptName, Level, Budget,\n       \
    \        SUM(Budget) OVER (PARTITION BY Level) AS LevelTotalBudget\n        FROM DeptTree\n        ORDER BY Level, DeptID\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (root_dept_id,))\n    rows = cursor.fetchall()\n    cols\
    \ = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 58. 집계 후 INSERT INTO (요약 테이블 갱신)
  sql: "CREATE PROCEDURE RefreshDailySummary\n    @SummaryDate DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n    -- 기존 데이터 삭제 후 재집계\n\
    \    DELETE FROM DailySummary WHERE SummaryDate = @SummaryDate;\n\n    INSERT INTO DailySummary\n        (SummaryDate,\
    \ CategoryID, OrderCount, Revenue, AvgOrderValue)\n    SELECT\n        @SummaryDate,\n        p.CategoryID,\n        COUNT(DISTINCT\
    \ o.OrderID),\n        SUM(oi.Qty * oi.UnitPrice),\n        AVG(o.TotalAmount)\n    FROM Orders o\n    JOIN OrderItems\
    \ oi ON o.OrderID    = oi.OrderID\n    JOIN Products   p  ON oi.ProductID = p.ProductID\n    WHERE CAST(o.OrderDate AS\
    \ DATE) = @SummaryDate\n      AND o.StatusCode IN ('PAID','DONE')\n    GROUP BY p.CategoryID;\nEND\n"
  python_code: "from datetime import date\n\ndef refresh_daily_summary(\n    conn: conn,\n    summary_date: date,\n) -> int:\n\
    \    \"\"\"\n    일별 요약 테이블 갱신.\n    원본 SP: RefreshDailySummary\n    변환 규칙:\n      DELETE + INSERT INTO ... SELECT → 트랜잭션으로\
    \ 묶어 원자성 보장\n      CAST(date AS DATE) → SQL 그대로 유지\n      반환: 삽입된 행 수\n    \"\"\"\n    cursor = conn.cursor()\n    try:\n\
    \        cursor.execute(\n            \"DELETE FROM DailySummary WHERE SummaryDate=?\",\n            (summary_date,),\n\
    \        )\n        cursor.execute(\n            \"\"\"\n            INSERT INTO DailySummary\n                (SummaryDate,\
    \ CategoryID, OrderCount, Revenue, AvgOrderValue)\n            SELECT\n                ?, p.CategoryID,\n            \
    \    COUNT(DISTINCT o.OrderID),\n                SUM(oi.Qty * oi.UnitPrice),\n                AVG(o.TotalAmount)\n   \
    \         FROM Orders o\n            JOIN OrderItems oi ON o.OrderID    = oi.OrderID\n            JOIN Products   p  ON\
    \ oi.ProductID = p.ProductID\n            WHERE CAST(o.OrderDate AS DATE) = ?\n              AND o.StatusCode IN ('PAID','DONE')\n\
    \            GROUP BY p.CategoryID\n            \"\"\",\n            (summary_date, summary_date),\n        )\n      \
    \  inserted = cursor.rowcount\n        conn.commit()\n        return inserted\n    except Exception as exc:\n        conn.rollback()\n\
    \        raise RuntimeError(f\"요약 갱신 실패: {exc}\") from exc\n"
- title: 59. FILESTREAM / VARBINARY (이진 데이터)
  sql: "CREATE PROCEDURE SaveAttachment\n    @RecordID    INT,\n    @FileName    NVARCHAR(255),\n    @FileContent VARBINARY(MAX),\n\
    \    @MimeType    NVARCHAR(100),\n    @AttachID    INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO Attachments\n\
    \        (RecordID, FileName, FileContent, MimeType, FileSize, UploadedAt)\n    VALUES\n        (@RecordID, @FileName,\
    \ @FileContent, @MimeType,\n         DATALENGTH(@FileContent), GETDATE());\n\n    SET @AttachID = SCOPE_IDENTITY();\n\
    END\n"
  python_code: "from datetime import datetime\n\ndef save_attachment(\n    conn: conn,\n    record_id: int,\n    file_name:\
    \ str,\n    file_content: bytes,\n    mime_type: str,\n) -> int:\n    \"\"\"\n    첨부 파일 저장.\n    원본 SP: SaveAttachment\n\
    \    변환 규칙:\n      VARBINARY(MAX) → Python bytes\n      DATALENGTH(@FileContent) → len(file_content)\n      SCOPE_IDENTITY\
    \ → SELECT CAST(SCOPE_IDENTITY() AS INT)\n      OUTPUT 파라미터 → return int\n    \"\"\"\n    cursor = conn.cursor()\n   \
    \ try:\n        cursor.execute(\n            \"\"\"\n            INSERT INTO Attachments\n                (RecordID, FileName,\
    \ FileContent, MimeType, FileSize, UploadedAt)\n            VALUES (?,?,?,?,?,?);\n            SELECT CAST(SCOPE_IDENTITY()\
    \ AS INT);\n            \"\"\",\n            (record_id, file_name, file_content, mime_type,\n             len(file_content),\
    \ datetime.now()),\n        )\n        row = cursor.fetchone()\n        conn.commit()\n        return int(row[0]) if row\
    \ else -1\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"첨부 저장 실패: {exc}\") from\
    \ exc\n"
- title: 60. 집합 기반 점수 계산 (SUM CASE + 조인)
  sql: "CREATE PROCEDURE CalcReviewScores\n    @ProductID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        r.ProductID,\n\
    \        COUNT(*)                                           AS ReviewCount,\n        ROUND(AVG(CAST(r.Rating AS FLOAT)),\
    \ 2)            AS AvgRating,\n        SUM(CASE WHEN r.Rating = 5 THEN 1 ELSE 0 END)    AS Star5,\n        SUM(CASE WHEN\
    \ r.Rating = 4 THEN 1 ELSE 0 END)    AS Star4,\n        SUM(CASE WHEN r.Rating = 3 THEN 1 ELSE 0 END)    AS Star3,\n \
    \       SUM(CASE WHEN r.Rating = 2 THEN 1 ELSE 0 END)    AS Star2,\n        SUM(CASE WHEN r.Rating = 1 THEN 1 ELSE 0 END)\
    \    AS Star1,\n        SUM(CASE WHEN r.IsVerified = 1 THEN 1 ELSE 0 END) AS VerifiedCount\n    FROM Reviews r\n    WHERE\
    \ r.ProductID = @ProductID\n      AND r.IsVisible = 1\n    GROUP BY r.ProductID;\nEND\n"
  python_code: "from typing import Optional, Dict, Any\n\ndef calc_review_scores(\n    conn: conn,\n    product_id: int,\n\
    ) -> Optional[Dict[str, Any]]:\n    \"\"\"\n    상품 리뷰 점수 집계.\n    원본 SP: CalcReviewScores\n    변환 규칙:\n      SUM(CASE\
    \ WHEN rating=N THEN 1 ELSE 0 END) → SQL 그대로 유지\n      ROUND(AVG(CAST(... AS FLOAT)), 2) → SQL 그대로 유지\n    \"\"\"\n  \
    \  sql = \"\"\"\n        SELECT\n            r.ProductID,\n            COUNT(*)                                      \
    \     AS ReviewCount,\n            ROUND(AVG(CAST(r.Rating AS FLOAT)), 2)            AS AvgRating,\n            SUM(CASE\
    \ WHEN r.Rating=5 THEN 1 ELSE 0 END)      AS Star5,\n            SUM(CASE WHEN r.Rating=4 THEN 1 ELSE 0 END)      AS Star4,\n\
    \            SUM(CASE WHEN r.Rating=3 THEN 1 ELSE 0 END)      AS Star3,\n            SUM(CASE WHEN r.Rating=2 THEN 1 ELSE\
    \ 0 END)      AS Star2,\n            SUM(CASE WHEN r.Rating=1 THEN 1 ELSE 0 END)      AS Star1,\n            SUM(CASE\
    \ WHEN r.IsVerified=1 THEN 1 ELSE 0 END)  AS VerifiedCount\n        FROM Reviews r\n        WHERE r.ProductID=? AND r.IsVisible=1\n\
    \        GROUP BY r.ProductID\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (product_id,))\n    row\
    \ = cursor.fetchone()\n    if row is None:\n        return None\n    cols = [col[0] for col in cursor.description]\n \
    \   return dict(zip(cols, row))\n"
- title: 61. 재고 예약 + 롤백 (2단계 커밋 패턴)
  sql: "CREATE PROCEDURE ReserveStock\n    @OrderID   INT,\n    @ProductID INT,\n    @Qty       INT,\n    @Reserved  BIT OUTPUT\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n    BEGIN TRY\n        DECLARE @Available INT;\n        SELECT\
    \ @Available = StockQty - ReservedQty\n        FROM   Products WITH (UPDLOCK)\n        WHERE  ProductID = @ProductID;\n\
    \n        IF @Available >= @Qty\n        BEGIN\n            UPDATE Products SET ReservedQty = ReservedQty + @Qty\n   \
    \         WHERE  ProductID = @ProductID;\n\n            INSERT INTO StockReservations (OrderID, ProductID, Qty, ReservedAt)\n\
    \            VALUES (@OrderID, @ProductID, @Qty, GETDATE());\n\n            SET @Reserved = 1;\n        END\n        ELSE\n\
    \            SET @Reserved = 0;\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n\
    \        THROW;\n    END CATCH\nEND\n"
  python_code: "from datetime import datetime\n\ndef reserve_stock(\n    conn: conn,\n    order_id: int,\n    product_id:\
    \ int,\n    qty: int,\n) -> bool:\n    \"\"\"\n    재고 예약 (가용 재고 확인 후 원자적 처리).\n    원본 SP: ReserveStock\n    변환 규칙:\n \
    \     DECLARE @Var + SELECT @Var = → Python 로컬 변수\n      WITH (UPDLOCK) → SQL 힌트 유지\n      IF @Available >= @Qty → Python\
    \ if 분기\n      OUTPUT BIT → return bool\n    \"\"\"\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n \
    \           \"SELECT StockQty - ReservedQty AS Available\"\n            \" FROM Products WITH (UPDLOCK) WHERE ProductID=?\"\
    ,\n            (product_id,),\n        )\n        row = cursor.fetchone()\n        available = int(row[0]) if row else\
    \ 0\n\n        if available >= qty:\n            cursor.execute(\n                \"UPDATE Products SET ReservedQty=ReservedQty+?\
    \ WHERE ProductID=?\",\n                (qty, product_id),\n            )\n            cursor.execute(\n             \
    \   \"INSERT INTO StockReservations (OrderID,ProductID,Qty,ReservedAt)\"\n                \" VALUES (?,?,?,?)\",\n   \
    \             (order_id, product_id, qty, datetime.now()),\n            )\n            conn.commit()\n            return\
    \ True\n\n        conn.rollback()\n        return False\n    except Exception as exc:\n        conn.rollback()\n     \
    \   raise RuntimeError(f\"재고 예약 실패: {exc}\") from exc\n"
- title: 62. 이력 테이블 INSERT (히스토리 패턴)
  sql: "CREATE PROCEDURE UpdateStatusWithHistory\n    @OrderID    INT,\n    @NewStatus  NVARCHAR(20),\n    @ChangedBy  INT,\n\
    \    @Note       NVARCHAR(500) = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @OldStatus NVARCHAR(20);\n\n    SELECT\
    \ @OldStatus = StatusCode FROM Orders WHERE OrderID = @OrderID;\n\n    UPDATE Orders\n    SET    StatusCode  = @NewStatus,\n\
    \           UpdatedAt   = GETDATE(),\n           UpdatedBy   = @ChangedBy\n    WHERE  OrderID = @OrderID;\n\n    INSERT\
    \ INTO OrderStatusHistory\n        (OrderID, OldStatus, NewStatus, ChangedBy, ChangedAt, Note)\n    VALUES\n        (@OrderID,\
    \ @OldStatus, @NewStatus, @ChangedBy, GETDATE(), @Note);\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import Optional\n\ndef update_status_with_history(\n    conn: conn,\n\
    \    order_id: int,\n    new_status: str,\n    changed_by: int,\n    note: Optional[str] = None,\n) -> None:\n    \"\"\
    \"\n    주문 상태 변경 + 이력 기록.\n    원본 SP: UpdateStatusWithHistory\n    변환 규칙:\n      DECLARE @OldStatus + SELECT @OldStatus\
    \ = → Python 조회 후 변수 할당\n      UPDATE + INSERT 쌍 → 트랜잭션으로 원자성 보장\n    \"\"\"\n    now = datetime.now()\n    cursor = conn.cursor()\n\
    \    try:\n        cursor.execute(\"SELECT StatusCode FROM Orders WHERE OrderID=?\", (order_id,))\n        row = cursor.fetchone()\n\
    \        old_status = row[0] if row else None\n\n        cursor.execute(\n            \"UPDATE Orders SET StatusCode=?,\
    \ UpdatedAt=?, UpdatedBy=? WHERE OrderID=?\",\n            (new_status, now, changed_by, order_id),\n        )\n     \
    \   cursor.execute(\n            \"INSERT INTO OrderStatusHistory\"\n            \" (OrderID,OldStatus,NewStatus,ChangedBy,ChangedAt,Note)\"\
    \n            \" VALUES (?,?,?,?,?,?)\",\n            (order_id, old_status, new_status, changed_by, now, note),\n   \
    \     )\n        conn.commit()\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"\
    상태 변경 실패: {exc}\") from exc\n"
- title: 63. API 속도 제한 체크 (Rate Limiting)
  sql: "CREATE PROCEDURE CheckRateLimit\n    @UserID     INT,\n    @Endpoint   NVARCHAR(200),\n    @MaxCalls   INT = 100,\n\
    \    @WindowSec  INT = 3600,\n    @Allowed    BIT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @CallCount INT;\n\
    \    DECLARE @WindowStart DATETIME = DATEADD(SECOND, -@WindowSec, GETDATE());\n\n    SELECT @CallCount = COUNT(*)\n  \
    \  FROM   ApiCallLog\n    WHERE  UserID     = @UserID\n      AND  Endpoint   = @Endpoint\n      AND  CalledAt  >= @WindowStart;\n\
    \n    IF @CallCount < @MaxCalls\n    BEGIN\n        INSERT INTO ApiCallLog (UserID, Endpoint, CalledAt)\n        VALUES\
    \ (@UserID, @Endpoint, GETDATE());\n        SET @Allowed = 1;\n    END\n    ELSE\n        SET @Allowed = 0;\nEND\n"
  python_code: "from datetime import datetime, timedelta\n\ndef check_rate_limit(\n    conn: conn,\n    user_id: int,\n  \
    \  endpoint: str,\n    max_calls: int = 100,\n    window_sec: int = 3600,\n) -> bool:\n    \"\"\"\n    API 속도 제한 확인 +\
    \ 호출 기록.\n    원본 SP: CheckRateLimit\n    변환 규칙:\n      DATEADD(SECOND,-N,GETDATE()) → datetime.now()-timedelta(seconds=N)\n\
    \      DECLARE @Var + SELECT @Var = → Python 변수\n      IF @CallCount < @MaxCalls → Python if\n      OUTPUT BIT → return\
    \ bool\n    \"\"\"\n    window_start = datetime.now() - timedelta(seconds=window_sec)\n    cursor = conn.cursor()\n  \
    \  try:\n        cursor.execute(\n            \"SELECT COUNT(*) FROM ApiCallLog\"\n            \" WHERE UserID=? AND Endpoint=?\
    \ AND CalledAt>=?\",\n            (user_id, endpoint, window_start),\n        )\n        call_count = cursor.fetchone()[0]\n\
    \n        if call_count < max_calls:\n            cursor.execute(\n                \"INSERT INTO ApiCallLog (UserID,Endpoint,CalledAt)\
    \ VALUES (?,?,?)\",\n                (user_id, endpoint, datetime.now()),\n            )\n            conn.commit()\n\
    \            return True\n\n        return False\n    except Exception as exc:\n        conn.rollback()\n        raise\
    \ RuntimeError(f\"속도 제한 처리 실패: {exc}\") from exc\n"
- title: 64. 전문 검색 (FULL-TEXT SEARCH / CONTAINS)
  sql: "CREATE PROCEDURE FullTextSearch\n    @SearchQuery  NVARCHAR(500),\n    @TableTarget  NVARCHAR(50),   -- 'PRODUCTS'\
    \ or 'ARTICLES'\n    @TopN         INT = 20\nAS\nBEGIN\n    SET NOCOUNT ON;\n    IF @TableTarget = 'PRODUCTS'\n      \
    \  SELECT TOP (@TopN) ProductID, Name, Description,\n               KEY_TBL.RANK\n        FROM Products p\n        INNER\
    \ JOIN CONTAINSTABLE(Products, (Name, Description), @SearchQuery) AS KEY_TBL\n            ON p.ProductID = KEY_TBL.[KEY]\n\
    \        ORDER BY KEY_TBL.RANK DESC;\n    ELSE\n        SELECT TOP (@TopN) ArticleID, Title, Summary,\n              \
    \ KEY_TBL.RANK\n        FROM Articles a\n        INNER JOIN CONTAINSTABLE(Articles, (Title, Body), @SearchQuery) AS KEY_TBL\n\
    \            ON a.ArticleID = KEY_TBL.[KEY]\n        ORDER BY KEY_TBL.RANK DESC;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef full_text_search(\n    conn: conn,\n    search_query: str,\n   \
    \ table_target: str,\n    top_n: int = 20,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    전문 검색 (CONTAINSTABLE).\n    원본\
    \ SP: FullTextSearch\n    변환 규칙:\n      CONTAINSTABLE → SQL 그대로 유지 (SQL Server FTS 전용)\n      IF @TableTarget → Python\
    \ if 분기\n      TOP (@TopN) → TOP (?) 파라미터 바인딩\n    \"\"\"\n    cursor = conn.cursor()\n    if table_target.upper() ==\
    \ \"PRODUCTS\":\n        sql = \"\"\"\n            SELECT TOP (?) ProductID, Name, Description, KEY_TBL.RANK\n       \
    \     FROM Products p\n            INNER JOIN CONTAINSTABLE(Products, (Name, Description), ?) AS KEY_TBL\n           \
    \     ON p.ProductID = KEY_TBL.[KEY]\n            ORDER BY KEY_TBL.RANK DESC\n        \"\"\"\n    else:\n        sql =\
    \ \"\"\"\n            SELECT TOP (?) ArticleID, Title, Summary, KEY_TBL.RANK\n            FROM Articles a\n          \
    \  INNER JOIN CONTAINSTABLE(Articles, (Title, Body), ?) AS KEY_TBL\n                ON a.ArticleID = KEY_TBL.[KEY]\n \
    \           ORDER BY KEY_TBL.RANK DESC\n        \"\"\"\n    cursor.execute(sql, (top_n, search_query))\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 65. 권한 검사 (Permission Check)
  sql: "CREATE PROCEDURE CheckUserPermission\n    @UserID     INT,\n    @Resource   NVARCHAR(100),\n    @Action     NVARCHAR(50),\n\
    \    @HasPerm    BIT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET @HasPerm = 0;\n\n    -- 직접 권한 확인\n    IF EXISTS (\n\
    \        SELECT 1 FROM UserPermissions\n        WHERE UserID=@UserID AND Resource=@Resource AND Action=@Action AND IsActive=1\n\
    \    )\n    BEGIN\n        SET @HasPerm = 1;\n        RETURN;\n    END\n\n    -- 역할 기반 권한 확인\n    IF EXISTS (\n      \
    \  SELECT 1\n        FROM   UserRoles ur\n        JOIN   RolePermissions rp ON ur.RoleID = rp.RoleID\n        WHERE  ur.UserID\
    \   = @UserID\n          AND  rp.Resource = @Resource\n          AND  rp.Action   = @Action\n          AND  rp.IsActive\
    \ = 1\n    )\n        SET @HasPerm = 1;\nEND\n"
  python_code: "def check_user_permission(\n    conn: conn,\n    user_id: int,\n    resource: str,\n    action: str,\n) ->\
    \ bool:\n    \"\"\"\n    사용자 권한 확인 (직접 권한 → 역할 기반 권한 순서로 체크).\n    원본 SP: CheckUserPermission\n    변환 규칙:\n      IF EXISTS\
    \ + RETURN → Python if + early return\n      다단계 권한 체크 → 순차 if 문\n      OUTPUT BIT → return bool\n    \"\"\"\n    cursor\
    \ = conn.cursor()\n\n    # 직접 권한\n    cursor.execute(\n        \"SELECT 1 FROM UserPermissions\"\n        \" WHERE UserID=?\
    \ AND Resource=? AND Action=? AND IsActive=1\",\n        (user_id, resource, action),\n    )\n    if cursor.fetchone()\
    \ is not None:\n        return True\n\n    # 역할 기반 권한\n    cursor.execute(\n        \"\"\"\n        SELECT 1 FROM UserRoles\
    \ ur\n        JOIN RolePermissions rp ON ur.RoleID=rp.RoleID\n        WHERE ur.UserID=? AND rp.Resource=? AND rp.Action=?\
    \ AND rp.IsActive=1\n        \"\"\",\n        (user_id, resource, action),\n    )\n    return cursor.fetchone() is not\
    \ None\n"
- title: 66. 다단계 주문 워크플로우
  sql: "CREATE PROCEDURE ProcessOrderWorkflow\n    @OrderID     INT,\n    @StepCode    NVARCHAR(50),\n    @OperatorID  INT,\n\
    \    @NextStep    NVARCHAR(50) OUTPUT,\n    @IsComplete  BIT         OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    BEGIN\
    \ TRANSACTION;\n    BEGIN TRY\n        -- 현재 단계 완료 처리\n        UPDATE OrderWorkflow\n        SET    Status       = 'DONE',\n\
    \               CompletedBy  = @OperatorID,\n               CompletedAt  = GETDATE()\n        WHERE  OrderID  = @OrderID\n\
    \          AND  StepCode = @StepCode\n          AND  Status   = 'IN_PROGRESS';\n\n        -- 다음 단계 조회\n        SELECT\
    \ @NextStep = NextStepCode\n        FROM   WorkflowSteps\n        WHERE  StepCode = @StepCode;\n\n        IF @NextStep\
    \ IS NOT NULL\n        BEGIN\n            INSERT INTO OrderWorkflow (OrderID, StepCode, Status, CreatedAt)\n         \
    \   VALUES (@OrderID, @NextStep, 'IN_PROGRESS', GETDATE());\n            SET @IsComplete = 0;\n        END\n        ELSE\n\
    \        BEGIN\n            UPDATE Orders SET StatusCode='DONE', UpdatedAt=GETDATE() WHERE OrderID=@OrderID;\n       \
    \     SET @IsComplete = 1;\n        END\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        ROLLBACK\
    \ TRANSACTION;\n        THROW;\n    END CATCH\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import Tuple, Optional\n\ndef process_order_workflow(\n    conn:\
    \ conn,\n    order_id: int,\n    step_code: str,\n    operator_id: int,\n) -> Tuple[Optional[str], bool]:\n    \"\"\"\n\
    \    주문 워크플로우 단계 처리.\n    반환: (next_step, is_complete)\n    원본 SP: ProcessOrderWorkflow\n    변환 규칙:\n      다중 OUTPUT 파라미터\
    \ → Tuple[Optional[str], bool]\n      IF @NextStep IS NOT NULL → Python if next_step is not None\n      UPDATE + INSERT\
    \ 조건 분기 → Python if/else\n    \"\"\"\n    now = datetime.now()\n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n\
    \            \"UPDATE OrderWorkflow SET Status='DONE', CompletedBy=?, CompletedAt=?\"\n            \" WHERE OrderID=?\
    \ AND StepCode=? AND Status='IN_PROGRESS'\",\n            (operator_id, now, order_id, step_code),\n        )\n      \
    \  cursor.execute(\n            \"SELECT NextStepCode FROM WorkflowSteps WHERE StepCode=?\",\n            (step_code,),\n\
    \        )\n        row = cursor.fetchone()\n        next_step: Optional[str] = row[0] if row else None\n\n        if\
    \ next_step is not None:\n            cursor.execute(\n                \"INSERT INTO OrderWorkflow (OrderID,StepCode,Status,CreatedAt)\"\
    \n                \" VALUES (?,?,'IN_PROGRESS',?)\",\n                (order_id, next_step, now),\n            )\n   \
    \         is_complete = False\n        else:\n            cursor.execute(\n                \"UPDATE Orders SET StatusCode='DONE',\
    \ UpdatedAt=? WHERE OrderID=?\",\n                (now, order_id),\n            )\n            is_complete = True\n\n\
    \        conn.commit()\n        return next_step, is_complete\n    except Exception as exc:\n        conn.rollback()\n\
    \        raise RuntimeError(f\"워크플로우 처리 실패: {exc}\") from exc\n"
- title: 67. 버전 관리 (Version History / Temporal)
  sql: "CREATE PROCEDURE SaveDocumentVersion\n    @DocID     INT,\n    @Content   NVARCHAR(MAX),\n    @EditedBy  INT,\n  \
    \  @VersionNo INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @CurrentVersion INT;\n\n    SELECT @CurrentVersion\
    \ = MAX(VersionNo) FROM DocumentVersions WHERE DocID=@DocID;\n    SET @CurrentVersion = ISNULL(@CurrentVersion, 0) + 1;\n\
    \    SET @VersionNo = @CurrentVersion;\n\n    INSERT INTO DocumentVersions (DocID, VersionNo, Content, EditedBy, EditedAt)\n\
    \    VALUES (@DocID, @CurrentVersion, @Content, @EditedBy, GETDATE());\n\n    UPDATE Documents SET CurrentVersion=@CurrentVersion,\
    \ UpdatedAt=GETDATE()\n    WHERE DocID=@DocID;\nEND\n"
  python_code: "from datetime import datetime\n\ndef save_document_version(\n    conn: conn,\n    doc_id: int,\n    content:\
    \ str,\n    edited_by: int,\n) -> int:\n    \"\"\"\n    문서 버전 저장.\n    원본 SP: SaveDocumentVersion\n    변환 규칙:\n      SELECT\
    \ MAX + ISNULL(...,0) + 1 → Python 조회 후 계산\n      OUTPUT 파라미터 → return int\n      UPDATE + INSERT 쌍 → 트랜잭션\n    \"\"\"\
    \n    cursor = conn.cursor()\n    try:\n        cursor.execute(\n            \"SELECT MAX(VersionNo) FROM DocumentVersions\
    \ WHERE DocID=?\",\n            (doc_id,),\n        )\n        row = cursor.fetchone()\n        current_version = (int(row[0])\
    \ if row and row[0] is not None else 0) + 1\n\n        now = datetime.now()\n        cursor.execute(\n            \"INSERT\
    \ INTO DocumentVersions (DocID,VersionNo,Content,EditedBy,EditedAt)\"\n            \" VALUES (?,?,?,?,?)\",\n        \
    \    (doc_id, current_version, content, edited_by, now),\n        )\n        cursor.execute(\n            \"UPDATE Documents\
    \ SET CurrentVersion=?, UpdatedAt=? WHERE DocID=?\",\n            (current_version, now, doc_id),\n        )\n       \
    \ conn.commit()\n        return current_version\n    except Exception as exc:\n        conn.rollback()\n        raise\
    \ RuntimeError(f\"버전 저장 실패: {exc}\") from exc\n"
- title: 68. 다중 테이블 집계 보고서 (복합 서브쿼리)
  sql: "CREATE PROCEDURE GetExecutiveReport\n    @StartDate DATE,\n    @EndDate   DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n \
    \   SELECT\n        COALESCE(r.Region, '전체')         AS Region,\n        COUNT(DISTINCT o.CustomerID)       AS UniqueCustomers,\n\
    \        COUNT(o.OrderID)                   AS TotalOrders,\n        SUM(o.TotalAmount)                 AS Revenue,\n\
    \        SUM(o.TotalAmount) / NULLIF(COUNT(o.OrderID), 0) AS ARPO,\n        (SELECT COUNT(*) FROM NewCustomers nc\n  \
    \       WHERE nc.Region=r.Region AND nc.JoinDate BETWEEN @StartDate AND @EndDate) AS NewCustomers\n    FROM Orders o\n\
    \    JOIN Customers c ON o.CustomerID = c.CustomerID\n    JOIN Regions   r ON c.RegionCode = r.RegionCode\n    WHERE o.OrderDate\
    \ BETWEEN @StartDate AND @EndDate\n      AND o.StatusCode = 'DONE'\n    GROUP BY ROLLUP(r.Region)\n    ORDER BY Region;\n\
    END\n"
  python_code: "from datetime import date\nfrom typing import List, Dict, Any\n\ndef get_executive_report(\n    conn: conn,\n\
    \    start_date: date,\n    end_date: date,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    경영진 보고서 (ROLLUP + 상관 서브쿼리).\n\
    \    원본 SP: GetExecutiveReport\n    변환 규칙:\n      NULLIF(COUNT(...),0) → SQL 그대로 유지 (0 나누기 방지)\n      상관 서브쿼리 → SQL 그대로\
    \ 유지\n      GROUP BY ROLLUP → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n            COALESCE(r.Region,\
    \ '전체')         AS Region,\n            COUNT(DISTINCT o.CustomerID)       AS UniqueCustomers,\n            COUNT(o.OrderID)\
    \                   AS TotalOrders,\n            SUM(o.TotalAmount)                 AS Revenue,\n            SUM(o.TotalAmount)/NULLIF(COUNT(o.OrderID),0)\
    \ AS ARPO,\n            (SELECT COUNT(*) FROM NewCustomers nc\n             WHERE nc.Region=r.Region AND nc.JoinDate BETWEEN\
    \ ? AND ?) AS NewCustomers\n        FROM Orders o\n        JOIN Customers c ON o.CustomerID = c.CustomerID\n        JOIN\
    \ Regions   r ON c.RegionCode = r.RegionCode\n        WHERE o.OrderDate BETWEEN ? AND ?\n          AND o.StatusCode =\
    \ 'DONE'\n        GROUP BY ROLLUP(r.Region)\n        ORDER BY Region\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql,\
    \ (start_date, end_date, start_date, end_date))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 69. 조건부 집계 (GROUPING SETS)
  sql: "CREATE PROCEDURE GetSalesGroupingSets\n    @Year INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        GROUPING_ID(Region,\
    \ ProductCategory) AS GroupingID,\n        Region, ProductCategory,\n        SUM(Revenue) AS Revenue\n    FROM SalesData\n\
    \    WHERE Year = @Year\n    GROUP BY GROUPING SETS (\n        (Region, ProductCategory),\n        (Region),\n       \
    \ (ProductCategory),\n        ()\n    )\n    ORDER BY GroupingID, Region, ProductCategory;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_sales_grouping_sets(\n    conn: conn,\n    year: int,\n) ->\
    \ List[Dict[str, Any]]:\n    \"\"\"\n    매출 다차원 집계 (GROUPING SETS).\n    원본 SP: GetSalesGroupingSets\n    변환 규칙:\n   \
    \   GROUPING SETS → SQL 그대로 유지\n      GROUPING_ID() → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        SELECT\n     \
    \       GROUPING_ID(Region, ProductCategory) AS GroupingID,\n            Region, ProductCategory,\n            SUM(Revenue)\
    \ AS Revenue\n        FROM SalesData\n        WHERE Year=?\n        GROUP BY GROUPING SETS (\n            (Region, ProductCategory),\n\
    \            (Region),\n            (ProductCategory),\n            ()\n        )\n        ORDER BY GroupingID, Region,\
    \ ProductCategory\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (year,))\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 70. 이메일 중복 체크 + 조건부 등록
  sql: "CREATE PROCEDURE RegisterUniqueEmail\n    @Email      NVARCHAR(200),\n    @Name       NVARCHAR(100),\n    @ResultCode\
    \ TINYINT OUTPUT   -- 0:성공 1:이미존재 2:오류\nAS\nBEGIN\n    SET NOCOUNT ON;\n    IF EXISTS (SELECT 1 FROM Users WHERE Email\
    \ = @Email AND IsDeleted = 0)\n    BEGIN\n        SET @ResultCode = 1;\n        RETURN;\n    END\n\n    BEGIN TRY\n  \
    \      INSERT INTO Users (Email, Name, CreatedAt, IsDeleted)\n        VALUES (@Email, @Name, GETDATE(), 0);\n        SET\
    \ @ResultCode = 0;\n    END TRY\n    BEGIN CATCH\n        SET @ResultCode = 2;\n    END CATCH\nEND\n"
  python_code: "from datetime import datetime\n\ndef register_unique_email(\n    conn: conn,\n    email: str,\n    name: str,\n\
    ) -> int:\n    \"\"\"\n    이메일 중복 확인 후 등록.\n    반환: 0=성공, 1=이미존재, 2=오류\n    원본 SP: RegisterUniqueEmail\n    변환 규칙:\n \
    \     IF EXISTS → fetchone() is not None + early return\n      BEGIN TRY/CATCH → try/except\n      OUTPUT TINYINT → return\
    \ int\n    \"\"\"\n    cursor = conn.cursor()\n\n    cursor.execute(\n        \"SELECT 1 FROM Users WHERE Email=? AND\
    \ IsDeleted=0\",\n        (email,),\n    )\n    if cursor.fetchone() is not None:\n        return 1\n\n    try:\n    \
    \    cursor.execute(\n            \"INSERT INTO Users (Email,Name,CreatedAt,IsDeleted) VALUES (?,?,?,0)\",\n         \
    \   (email, name, datetime.now()),\n        )\n        conn.commit()\n        return 0\n    except Exception:\n      \
    \  conn.rollback()\n        return 2\n"
- title: 71. 날짜 차원 테이블 생성 (캘린더 데이터)
  sql: "CREATE PROCEDURE GenerateDateDimension\n    @StartDate DATE,\n    @EndDate   DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
    \    DECLARE @Current DATE = @StartDate;\n\n    WHILE @Current <= @EndDate\n    BEGIN\n        IF NOT EXISTS (SELECT 1\
    \ FROM DateDimension WHERE DateKey = @Current)\n            INSERT INTO DateDimension\n                (DateKey, Year,\
    \ Quarter, Month, Week, DayOfWeek, IsWeekend, IsHoliday)\n            VALUES (\n                @Current,\n          \
    \      YEAR(@Current),\n                DATEPART(QUARTER, @Current),\n                MONTH(@Current),\n             \
    \   DATEPART(WEEK, @Current),\n                DATEPART(WEEKDAY, @Current),\n                CASE WHEN DATEPART(WEEKDAY,\
    \ @Current) IN (1,7) THEN 1 ELSE 0 END,\n                0\n            );\n        SET @Current = DATEADD(DAY, 1, @Current);\n\
    \    END\nEND\n"
  python_code: "from datetime import date, timedelta\n\ndef generate_date_dimension(\n    conn: conn,\n    start_date: date,\n\
    \    end_date: date,\n) -> int:\n    \"\"\"\n    날짜 차원 테이블 생성.\n    원본 SP: GenerateDateDimension\n    변환 규칙:\n      WHILE\
    \ @Current <= @EndDate + DATEADD(DAY,1,...) →\n        Python for 루프 + timedelta(days=1)\n      YEAR/MONTH/DATEPART →\
    \ Python date 속성\n      IF NOT EXISTS → INSERT 또는 executemany + 중복 무시\n    \"\"\"\n    rows = []\n    current = start_date\n\
    \    while current <= end_date:\n        iso_weekday = current.isoweekday()  # 1=Mon, 7=Sun\n        quarter     = (current.month\
    \ - 1) // 3 + 1\n        is_weekend  = 1 if iso_weekday in (6, 7) else 0\n        rows.append((\n            current,\
    \ current.year, quarter, current.month,\n            current.isocalendar()[1], iso_weekday, is_weekend, 0,\n        ))\n\
    \        current += timedelta(days=1)\n\n    cursor = conn.cursor()\n    inserted = 0\n    for row in rows:\n        cursor.execute(\n\
    \            \"IF NOT EXISTS (SELECT 1 FROM DateDimension WHERE DateKey=?)\"\n            \" INSERT INTO DateDimension\"\
    \n            \" (DateKey,Year,Quarter,Month,Week,DayOfWeek,IsWeekend,IsHoliday)\"\n            \" VALUES (?,?,?,?,?,?,?,?)\"\
    ,\n            (row[0],) + row,\n        )\n        inserted += cursor.rowcount\n\n    conn.commit()\n    return inserted\n"
- title: 72. 집계 데이터 캐시 무효화
  sql: "CREATE PROCEDURE InvalidateCacheOnUpdate\n    @TableName NVARCHAR(128),\n    @RecordID  INT\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    -- 관련 캐시 항목 무효화\n    UPDATE CacheEntries\n    SET    IsValid   = 0,\n           InvalidAt = GETDATE()\n   \
    \ WHERE  CacheKey LIKE '%' + @TableName + '%'\n       OR  CacheKey LIKE '%id=' + CAST(@RecordID AS NVARCHAR) + '%';\n\n\
    \    -- 캐시 이벤트 로그\n    INSERT INTO CacheEvents (TableName, RecordID, EventType, OccurredAt)\n    VALUES (@TableName, @RecordID,\
    \ 'INVALIDATE', GETDATE());\nEND\n"
  python_code: "from datetime import datetime\n\ndef invalidate_cache_on_update(\n    conn: conn,\n    table_name: str,\n\
    \    record_id: int,\n) -> int:\n    \"\"\"\n    캐시 무효화 + 이벤트 로그.\n    원본 SP: InvalidateCacheOnUpdate\n    변환 규칙:\n  \
    \    LIKE '%' + @Param + '%' → SQL 그대로 유지 (LIKE + ? 파라미터)\n      CAST(INT AS NVARCHAR) → Python f-string 으로 변환\n    \"\
    \"\"\n    cursor = conn.cursor()\n    try:\n        like_table = f\"%{table_name}%\"\n        like_id    = f\"%id={record_id}%\"\
    \n        now        = datetime.now()\n\n        cursor.execute(\n            \"UPDATE CacheEntries SET IsValid=0, InvalidAt=?\"\
    \n            \" WHERE CacheKey LIKE ? OR CacheKey LIKE ?\",\n            (now, like_table, like_id),\n        )\n   \
    \     invalidated = cursor.rowcount\n\n        cursor.execute(\n            \"INSERT INTO CacheEvents (TableName,RecordID,EventType,OccurredAt)\"\
    \n            \" VALUES (?,?,'INVALIDATE',?)\",\n            (table_name, record_id, now),\n        )\n        conn.commit()\n\
    \        return invalidated\n    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"캐시 무효화\
    \ 실패: {exc}\") from exc\n"
- title: 73. 포인트 적립 + 만료 처리
  sql: "CREATE PROCEDURE AddAndExpirePoints\n    @UserID       INT,\n    @PointsToAdd  INT,\n    @ExpireDays   INT = 365,\n\
    \    @Reason       NVARCHAR(200),\n    @NetBalance   INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    BEGIN TRANSACTION;\n\
    \    BEGIN TRY\n        -- 만료 포인트 처리\n        UPDATE Points\n        SET    Status = 'EXPIRED'\n        WHERE  UserID\
    \    = @UserID\n          AND  Status    = 'ACTIVE'\n          AND  ExpiresAt < GETDATE();\n\n        -- 포인트 적립\n    \
    \    INSERT INTO Points (UserID, Amount, Reason, Status, EarnedAt, ExpiresAt)\n        VALUES (\n            @UserID,\
    \ @PointsToAdd, @Reason, 'ACTIVE',\n            GETDATE(), DATEADD(DAY, @ExpireDays, GETDATE())\n        );\n\n      \
    \  -- 잔액 계산\n        SELECT @NetBalance = SUM(Amount)\n        FROM   Points\n        WHERE  UserID = @UserID AND Status\
    \ = 'ACTIVE';\n\n        COMMIT TRANSACTION;\n    END TRY\n    BEGIN CATCH\n        ROLLBACK TRANSACTION;\n        THROW;\n\
    \    END CATCH\nEND\n"
  python_code: "from datetime import datetime, timedelta\n\ndef add_and_expire_points(\n    conn: conn,\n    user_id: int,\n\
    \    points_to_add: int,\n    expire_days: int = 365,\n    reason: str = \"\",\n) -> int:\n    \"\"\"\n    포인트 적립 + 만료\
    \ 처리 후 순 잔액 반환.\n    원본 SP: AddAndExpirePoints\n    변환 규칙:\n      DATEADD(DAY,N,GETDATE()) → datetime.now() + timedelta(days=N)\n\
    \      SELECT @Var = SUM(...) → Python fetchone()[0]\n      OUTPUT 파라미터 → return int\n    \"\"\"\n    now        = datetime.now()\n\
    \    expires_at = now + timedelta(days=expire_days)\n    cursor     = conn.cursor()\n\n    try:\n        cursor.execute(\n\
    \            \"UPDATE Points SET Status='EXPIRED'\"\n            \" WHERE UserID=? AND Status='ACTIVE' AND ExpiresAt<?\"\
    ,\n            (user_id, now),\n        )\n        cursor.execute(\n            \"INSERT INTO Points (UserID,Amount,Reason,Status,EarnedAt,ExpiresAt)\"\
    \n            \" VALUES (?,?,?,'ACTIVE',?,?)\",\n            (user_id, points_to_add, reason, now, expires_at),\n    \
    \    )\n        cursor.execute(\n            \"SELECT SUM(Amount) FROM Points WHERE UserID=? AND Status='ACTIVE'\",\n\
    \            (user_id,),\n        )\n        row         = cursor.fetchone()\n        net_balance = int(row[0]) if row\
    \ and row[0] is not None else 0\n\n        conn.commit()\n        return net_balance\n    except Exception as exc:\n \
    \       conn.rollback()\n        raise RuntimeError(f\"포인트 처리 실패: {exc}\") from exc\n"
- title: 74. 배치 상태 모니터링
  sql: "CREATE PROCEDURE GetBatchStatus\n    @BatchDate DATE = NULL\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @TargetDate\
    \ DATE = ISNULL(@BatchDate, CAST(GETDATE() AS DATE));\n\n    SELECT\n        BatchName,\n        Status,\n        StartedAt,\n\
    \        FinishedAt,\n        DATEDIFF(SECOND, StartedAt, ISNULL(FinishedAt, GETDATE())) AS ElapsedSec,\n        RecordsProcessed,\n\
    \        ErrorCount\n    FROM BatchJobHistory\n    WHERE CAST(StartedAt AS DATE) = @TargetDate\n    ORDER BY StartedAt\
    \ DESC;\nEND\n"
  python_code: "from datetime import date, datetime\nfrom typing import List, Dict, Any, Optional\n\ndef get_batch_status(\n\
    \    conn: conn,\n    batch_date: Optional[date] = None,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    배치 작업 상태 조회.\n \
    \   원본 SP: GetBatchStatus\n    변환 규칙:\n      ISNULL(@BatchDate, CAST(GETDATE() AS DATE)) →\n        Python: batch_date\
    \ or date.today()\n      DATEDIFF(SECOND, ..., ISNULL(FinishedAt, GETDATE())) → SQL 유지\n      CAST(StartedAt AS DATE)\
    \ → SQL 유지\n    \"\"\"\n    target_date = batch_date or date.today()\n    sql = \"\"\"\n        SELECT\n            BatchName,\
    \ Status, StartedAt, FinishedAt,\n            DATEDIFF(SECOND, StartedAt, ISNULL(FinishedAt,GETDATE())) AS ElapsedSec,\n\
    \            RecordsProcessed, ErrorCount\n        FROM BatchJobHistory\n        WHERE CAST(StartedAt AS DATE)=?\n   \
    \     ORDER BY StartedAt DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (target_date,))\n    rows\
    \ = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in\
    \ rows]\n"
- title: 75. 토큰 검증 + 세션 갱신
  sql: "CREATE PROCEDURE ValidateAndRefreshToken\n    @Token       NVARCHAR(500),\n    @NewToken    NVARCHAR(500) OUTPUT,\n\
    \    @UserID      INT           OUTPUT,\n    @IsValid     BIT           OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE\
    \ @SessionID INT;\n    DECLARE @ExpiresAt DATETIME;\n\n    SELECT @SessionID = SessionID,\n           @UserID    = UserID,\n\
    \           @ExpiresAt = ExpiresAt\n    FROM   Sessions\n    WHERE  Token   = @Token\n      AND  Status  = 'ACTIVE'\n\
    \      AND  IsRevoked = 0;\n\n    IF @SessionID IS NULL OR @ExpiresAt < GETDATE()\n    BEGIN\n        SET @IsValid  =\
    \ 0;\n        SET @UserID   = NULL;\n        SET @NewToken = NULL;\n        RETURN;\n    END\n\n    -- 토큰 갱신\n    SET\
    \ @NewToken = NEWID();\n    UPDATE Sessions\n    SET    Token     = @NewToken,\n           ExpiresAt = DATEADD(HOUR, 2,\
    \ GETDATE()),\n           UpdatedAt = GETDATE()\n    WHERE  SessionID = @SessionID;\n\n    SET @IsValid = 1;\nEND\n"
  python_code: "import uuid\nfrom datetime import datetime, timedelta\nfrom typing import Tuple, Optional\n\ndef validate_and_refresh_token(\n\
    \    conn: conn,\n    token: str,\n) -> Tuple[bool, Optional[int], Optional[str]]:\n    \"\"\"\n    토큰 검증 및 갱신.\n    반환:\
    \ (is_valid, user_id, new_token)\n    원본 SP: ValidateAndRefreshToken\n    변환 규칙:\n      NEWID() → str(uuid.uuid4())\n\
    \      DATEADD(HOUR,2,GETDATE()) → timedelta(hours=2)\n      다중 OUTPUT + RETURN → Tuple 반환\n      SELECT 다중 컬럼 → Python\
    \ 변수 개별 할당\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\n        \"SELECT SessionID, UserID, ExpiresAt\
    \ FROM Sessions\"\n        \" WHERE Token=? AND Status='ACTIVE' AND IsRevoked=0\",\n        (token,),\n    )\n    row\
    \ = cursor.fetchone()\n\n    if row is None or row[2] < datetime.now():\n        return False, None, None\n\n    session_id\
    \ = row[0]\n    user_id    = row[1]\n    new_token  = str(uuid.uuid4())\n    now        = datetime.now()\n\n    cursor.execute(\n\
    \        \"UPDATE Sessions SET Token=?, ExpiresAt=?, UpdatedAt=? WHERE SessionID=?\",\n        (new_token, now + timedelta(hours=2),\
    \ now, session_id),\n    )\n    conn.commit()\n    return True, user_id, new_token\n"
- title: 76. 지역 코드 계층 조회
  sql: "CREATE PROCEDURE GetRegionHierarchy\n    @CountryCode NVARCHAR(5)\nAS\nBEGIN\n    SET NOCOUNT ON;\n    WITH RegionTree\
    \ AS (\n        SELECT RegionID, ParentID, RegionCode, RegionName, Level\n        FROM   Regions WHERE ParentID IS NULL\
    \ AND CountryCode = @CountryCode\n        UNION ALL\n        SELECT r.RegionID, r.ParentID, r.RegionCode, r.RegionName,\
    \ rt.Level+1\n        FROM   Regions r JOIN RegionTree rt ON r.ParentID = rt.RegionID\n    )\n    SELECT * FROM RegionTree\
    \ ORDER BY Level, RegionCode;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_region_hierarchy(\n    conn: conn,\n    country_code: str,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    지역 계층 조회.\n    원본 SP: GetRegionHierarchy\n    변환 규칙:\n      재귀 CTE → SQL 그대로\
    \ 유지\n      ParentID IS NULL + CountryCode → 앵커 조건\n    \"\"\"\n    sql = \"\"\"\n        WITH RegionTree AS (\n     \
    \       SELECT RegionID, ParentID, RegionCode, RegionName, Level\n            FROM   Regions WHERE ParentID IS NULL AND\
    \ CountryCode=?\n            UNION ALL\n            SELECT r.RegionID, r.ParentID, r.RegionCode, r.RegionName, rt.Level+1\n\
    \            FROM   Regions r JOIN RegionTree rt ON r.ParentID=rt.RegionID\n        )\n        SELECT * FROM RegionTree\
    \ ORDER BY Level, RegionCode\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (country_code,))\n    rows\
    \ = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in\
    \ rows]\n"
- title: 77. 누락 데이터 감지 (갭 분석)
  sql: "CREATE PROCEDURE FindSequenceGaps\n    @TableName  NVARCHAR(128),\n    @StartID    INT,\n    @EndID      INT\nAS\n\
    BEGIN\n    SET NOCOUNT ON;\n    -- 연속된 숫자 범위에서 누락 ID 탐지\n    WITH Expected AS (\n        SELECT n AS ExpectedID\n    \
    \    FROM (\n            SELECT ROW_NUMBER() OVER (ORDER BY (SELECT NULL)) + @StartID - 1 AS n\n            FROM sys.objects\
    \ CROSS JOIN sys.objects o2\n        ) nums WHERE n <= @EndID\n    )\n    SELECT e.ExpectedID AS MissingID\n    FROM Expected\
    \ e\n    LEFT JOIN Orders o ON e.ExpectedID = o.OrderID\n    WHERE o.OrderID IS NULL\n    ORDER BY e.ExpectedID;\nEND\n"
  python_code: "from typing import List, int as BuiltinInt\n\n# re-import correctly\nfrom typing import List\n\ndef find_sequence_gaps(\n\
    \    conn: conn,\n    table_name: str,\n    id_column: str,\n    start_id: int,\n    end_id: int,\n) -> List[int]:\n \
    \   \"\"\"\n    ID 시퀀스 갭 탐지.\n    원본 SP: FindSequenceGaps\n    변환 규칙:\n      sys.objects CROSS JOIN 기반 숫자 생성 → Python\
    \ range()로 대체\n      LEFT JOIN + WHERE IS NULL → 집합 차이 (set subtraction)\n    \"\"\"\n    import re\n    _ALLOWED = re.compile(r\"\
    ^[A-Za-z_][A-Za-z0-9_]*$\")\n    if not _ALLOWED.match(table_name) or not _ALLOWED.match(id_column):\n        raise ValueError(\"\
    잘못된 테이블/컬럼명\")\n\n    expected = set(range(start_id, end_id + 1))\n\n    cursor = conn.cursor()\n    cursor.execute(\n\
    \        f\"SELECT [{id_column}] FROM [{table_name}]\"\n        f\" WHERE [{id_column}] BETWEEN ? AND ?\",\n        (start_id,\
    \ end_id),\n    )\n    existing = {row[0] for row in cursor.fetchall()}\n    return sorted(expected - existing)\n"
- title: 78. 재귀 BOM (Bill of Materials)
  sql: "CREATE PROCEDURE GetBOMTree\n    @ProductID INT,\n    @Qty       DECIMAL(10,2) = 1\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
    \    WITH BOM AS (\n        SELECT\n            b.ComponentID, b.ProductID AS ParentID,\n            b.Quantity * @Qty\
    \ AS TotalQty,\n            0 AS Level,\n            CAST(b.ComponentID AS NVARCHAR(MAX)) AS Path\n        FROM BillOfMaterials\
    \ b WHERE b.ProductID = @ProductID\n\n        UNION ALL\n\n        SELECT\n            b.ComponentID, b.ProductID,\n \
    \           b.Quantity * bom.TotalQty,\n            bom.Level + 1,\n            bom.Path + '>' + CAST(b.ComponentID AS\
    \ NVARCHAR)\n        FROM BillOfMaterials b JOIN BOM bom ON b.ProductID = bom.ComponentID\n    )\n    SELECT ComponentID,\
    \ ParentID, TotalQty, Level, Path\n    FROM   BOM\n    ORDER  BY Level, Path;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_bom_tree(\n    conn: conn,\n    product_id: int,\n    qty: float\
    \ = 1.0,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    BOM 트리 전체 전개 (재귀 CTE).\n    원본 SP: GetBOMTree\n    변환 규칙:\n    \
    \  재귀 CTE + 누적 수량 계산 → SQL 그대로 유지\n      CAST(... AS NVARCHAR(MAX)) 경로 추적 → SQL 유지\n    \"\"\"\n    sql = \"\"\"\n   \
    \     WITH BOM AS (\n            SELECT b.ComponentID, b.ProductID AS ParentID,\n                   b.Quantity*? AS TotalQty,\
    \ 0 AS Level,\n                   CAST(b.ComponentID AS NVARCHAR(MAX)) AS Path\n            FROM BillOfMaterials b WHERE\
    \ b.ProductID=?\n            UNION ALL\n            SELECT b.ComponentID, b.ProductID,\n                   b.Quantity*bom.TotalQty,\
    \ bom.Level+1,\n                   bom.Path+'>'+CAST(b.ComponentID AS NVARCHAR)\n            FROM BillOfMaterials b JOIN\
    \ BOM bom ON b.ProductID=bom.ComponentID\n        )\n        SELECT ComponentID, ParentID, TotalQty, Level, Path\n   \
    \     FROM BOM ORDER BY Level, Path\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (qty, product_id))\n\
    \    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for\
    \ row in rows]\n"
- title: 79. 이벤트 소싱 스냅샷
  sql: "CREATE PROCEDURE RebuildAccountSnapshot\n    @AccountID INT,\n    @AsOfDate  DATE = NULL\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    DECLARE @TargetDate DATE = ISNULL(@AsOfDate, CAST(GETDATE() AS DATE));\n\n    SELECT\n        @AccountID  \
    \                      AS AccountID,\n        SUM(CASE WHEN EventType='CREDIT' THEN Amount ELSE -Amount END) AS Balance,\n\
    \        COUNT(*)                           AS TransactionCount,\n        MIN(OccurredAt)                    AS FirstTransaction,\n\
    \        MAX(OccurredAt)                    AS LastTransaction\n    FROM AccountEvents\n    WHERE AccountID = @AccountID\n\
    \      AND CAST(OccurredAt AS DATE) <= @TargetDate;\nEND\n"
  python_code: "from datetime import date\nfrom typing import Optional, Dict, Any\n\ndef rebuild_account_snapshot(\n    conn:\
    \ conn,\n    account_id: int,\n    as_of_date: Optional[date] = None,\n) -> Dict[str, Any]:\n    \"\"\"\n    계좌 이벤트 소싱\
    \ 스냅샷 재구성.\n    원본 SP: RebuildAccountSnapshot\n    변환 규칙:\n      ISNULL(@AsOfDate, CAST(GETDATE() AS DATE)) → as_of_date\
    \ or date.today()\n      SUM(CASE WHEN EventType='CREDIT' THEN Amount ELSE -Amount END) → SQL 유지\n      CAST(OccurredAt\
    \ AS DATE) → SQL 유지\n    \"\"\"\n    target_date = as_of_date or date.today()\n    sql = \"\"\"\n        SELECT\n    \
    \        ? AS AccountID,\n            SUM(CASE WHEN EventType='CREDIT' THEN Amount ELSE -Amount END) AS Balance,\n   \
    \         COUNT(*) AS TransactionCount,\n            MIN(OccurredAt) AS FirstTransaction,\n            MAX(OccurredAt)\
    \ AS LastTransaction\n        FROM AccountEvents\n        WHERE AccountID=? AND CAST(OccurredAt AS DATE)<=?\n    \"\"\"\
    \n    cursor = conn.cursor()\n    cursor.execute(sql, (account_id, account_id, target_date))\n    row = cursor.fetchone()\n\
    \    cols = [col[0] for col in cursor.description]\n    return dict(zip(cols, row)) if row else {}\n"
- title: 80. 크로스 데이터베이스 조회 (Linked Server)
  sql: "CREATE PROCEDURE GetCrossDatabaseData\n    @LinkedServer NVARCHAR(128),\n    @RemoteDB     NVARCHAR(128),\n    @LocalOrderID\
    \ INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    -- 로컬 주문 정보\n    SELECT OrderID, CustomerID, TotalAmount FROM Orders WHERE\
    \ OrderID = @LocalOrderID;\n\n    -- Linked Server 참조 (이식성 낮아 Python에서 별도 연결 권장)\n    -- SELECT * FROM [RemoteServer].[RemoteDB].[dbo].[ExternalData]\
    \ WHERE ...\nEND\n"
  python_code: "from typing import Dict, Any, Optional, List\n\ndef get_cross_database_data(\n    conn_local: conn,\n    conn_remote:\
    \ conn,\n    local_order_id: int,\n) -> Dict[str, Any]:\n    \"\"\"\n    크로스 DB 데이터 조회.\n    원본 SP: GetCrossDatabaseData\n\
    \    변환 규칙:\n      Linked Server 참조 → Python에서 두 개의 별도 커넥션으로 대체\n      (Linked Server는 Python 레이어에서 다중 커넥션이 더 이식성 높음)\n\
    \    \"\"\"\n    # 로컬 DB 조회\n    cursor_local = conn_local.cursor()\n    cursor_local.execute(\n        \"SELECT OrderID,\
    \ CustomerID, TotalAmount FROM Orders WHERE OrderID=?\",\n        (local_order_id,),\n    )\n    row = cursor_local.fetchone()\n\
    \    local_data: Optional[Dict[str, Any]] = None\n    if row:\n        cols = [col[0] for col in cursor_local.description]\n\
    \        local_data = dict(zip(cols, row))\n\n    # 원격 DB 조회 (별도 커넥션)\n    cursor_remote = conn_remote.cursor()\n    cursor_remote.execute(\n\
    \        \"SELECT * FROM ExternalData WHERE OrderID=?\",\n        (local_order_id,),\n    )\n    remote_rows = cursor_remote.fetchall()\n\
    \    remote_cols = [col[0] for col in cursor_remote.description] if remote_rows else []\n    remote_data: List[Dict[str,\
    \ Any]] = [\n        dict(zip(remote_cols, r)) for r in remote_rows\n    ]\n\n    return {\"local\": local_data, \"remote\"\
    : remote_data}\n"
- title: 81. DATEPART 기반 시간대·요일별 집계
  sql: "CREATE PROCEDURE GetTrafficByTimeSlot\n    @StartDate DATE,\n    @EndDate   DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
    \    SELECT\n        DATEPART(WEEKDAY, LoggedAt)  AS WeekDay,\n        DATEPART(HOUR,    LoggedAt)  AS HourSlot,\n   \
    \     COUNT(*)                     AS HitCount,\n        AVG(ResponseMs)              AS AvgResponseMs\n    FROM RequestLogs\n\
    \    WHERE  LoggedAt >= @StartDate\n      AND  LoggedAt <  DATEADD(DAY, 1, @EndDate)\n    GROUP  BY DATEPART(WEEKDAY,\
    \ LoggedAt),\n              DATEPART(HOUR, LoggedAt)\n    ORDER  BY WeekDay, HourSlot;\nEND\n"
  python_code: "from datetime import date, timedelta\nfrom typing import List, Dict, Any\n\ndef get_traffic_by_time_slot(\n\
    \    conn: conn,\n    start_date: date,\n    end_date: date,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    시간대·요일별 트래픽\
    \ 집계.\n    원본 SP: GetTrafficByTimeSlot\n    변환 규칙:\n      DATEPART(WEEKDAY/HOUR, ...) → SQL 그대로 유지\n      DATEADD(DAY,1,@EndDate)\
    \     → Python timedelta(days=1)로 상단 경계 계산\n    \"\"\"\n    end_exclusive = end_date + timedelta(days=1)\n    sql = \"\
    \"\"\n        SELECT\n            DATEPART(WEEKDAY, LoggedAt) AS WeekDay,\n            DATEPART(HOUR,    LoggedAt) AS\
    \ HourSlot,\n            COUNT(*)                    AS HitCount,\n            AVG(ResponseMs)             AS AvgResponseMs\n\
    \        FROM RequestLogs\n        WHERE LoggedAt >= ? AND LoggedAt < ?\n        GROUP BY DATEPART(WEEKDAY, LoggedAt),\n\
    \                 DATEPART(HOUR,    LoggedAt)\n        ORDER BY WeekDay, HourSlot\n    \"\"\"\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, (start_date, end_exclusive))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 82. 복합 키 IN 필터 (다중 컬럼 쌍)
  sql: "CREATE PROCEDURE GetOrdersByCompositeKeys\n    @Keys NVARCHAR(MAX)   -- JSON: [{\"CustomerID\":1,\"OrderDate\":\"\
    2024-01\"},...]\nAS\nBEGIN\n    SET NOCOUNT ON;\n    -- 실제 구현: XML/JSON 파싱 또는 임시 테이블 사용\n    -- 여기서는 단일 파라미터 예시\n    SELECT\
    \ o.OrderID, o.CustomerID, o.OrderDate, o.TotalAmount\n    FROM   Orders o\n    WHERE  EXISTS (\n        SELECT 1 FROM\
    \ OPENJSON(@Keys)\n        WITH (CustomerID INT, YearMonth NVARCHAR(7))\n        WHERE CustomerID = o.CustomerID\n   \
    \       AND FORMAT(o.OrderDate,'yyyy-MM') = YearMonth\n    );\nEND\n"
  python_code: "from typing import List, Dict, Any, Tuple\n\ndef get_orders_by_composite_keys(\n    conn: conn,\n    keys:\
    \ List[Tuple[int, str]],\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    복합 키 쌍으로 주문 조회.\n    원본 SP: GetOrdersByCompositeKeys\n\
    \    변환 규칙:\n      OPENJSON + EXISTS → Python에서 OR 조건 동적 조합\n      복합 IN 필터       → (CustomerID=? AND CONVERT(...)=?)\
    \ OR ... 형태\n    \"\"\"\n    if not keys:\n        return []\n\n    clauses = []\n    params: list = []\n    for customer_id,\
    \ year_month in keys:\n        clauses.append(\n            \"(o.CustomerID=? AND CONVERT(NVARCHAR(7),o.OrderDate,120)=?)\"\
    \n        )\n        params.extend([customer_id, year_month])\n\n    sql = (\n        \"SELECT o.OrderID, o.CustomerID,\
    \ o.OrderDate, o.TotalAmount\"\n        \" FROM Orders o WHERE \" + \" OR \".join(clauses)\n    )\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, params)\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n  \
    \  return [dict(zip(cols, row)) for row in rows]\n"
- title: 83. UPDATE FROM JOIN (다른 테이블 값으로 일괄 업데이트)
  sql: "CREATE PROCEDURE SyncPricesFromMaster\n    @EffectiveDate DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n    UPDATE p\n   \
    \ SET    p.Price      = mp.MasterPrice,\n           p.UpdatedAt  = GETDATE()\n    FROM   Products p\n    INNER  JOIN MasterPrices\
    \ mp\n           ON  p.SKU          = mp.SKU\n           AND mp.EffectiveDate = @EffectiveDate\n           AND mp.IsActive\
    \     = 1\n    WHERE  p.IsActive = 1;\n\n    SELECT @@ROWCOUNT AS UpdatedCount;\nEND\n"
  python_code: "from datetime import date, datetime\n\ndef sync_prices_from_master(\n    conn: conn,\n    effective_date:\
    \ date,\n) -> int:\n    \"\"\"\n    마스터 가격표에서 상품 가격 동기화.\n    원본 SP: SyncPricesFromMaster\n    변환 규칙:\n      UPDATE p\
    \ FROM Products p INNER JOIN ... → SQL 그대로 유지\n      @@ROWCOUNT → cursor.rowcount\n    \"\"\"\n    sql = \"\"\"\n    \
    \    UPDATE p\n        SET    p.Price     = mp.MasterPrice,\n               p.UpdatedAt = ?\n        FROM   Products p\n\
    \        INNER  JOIN MasterPrices mp\n               ON  p.SKU          = mp.SKU\n               AND mp.EffectiveDate\
    \ = ?\n               AND mp.IsActive    = 1\n        WHERE  p.IsActive = 1\n    \"\"\"\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, (datetime.now(), effective_date))\n    updated = cursor.rowcount\n    conn.commit()\n    return\
    \ updated\n"
- title: 84. SELECT INTO (테이블 복사 / 백업)
  sql: "CREATE PROCEDURE BackupTableData\n    @SourceTable NVARCHAR(128),\n    @BackupSuffix NVARCHAR(50)   -- e.g. '_20240101'\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @BackupTable NVARCHAR(200) = @SourceTable + @BackupSuffix;\n    DECLARE @SQL\
    \ NVARCHAR(MAX);\n\n    IF OBJECT_ID(@BackupTable) IS NOT NULL\n    BEGIN\n        SET @SQL = N'DROP TABLE ' + QUOTENAME(@BackupTable);\n\
    \        EXEC sp_executesql @SQL;\n    END\n\n    SET @SQL = N'SELECT * INTO ' + QUOTENAME(@BackupTable)\n           \
    \  + N' FROM ' + QUOTENAME(@SourceTable);\n    EXEC sp_executesql @SQL;\n\n    SELECT COUNT(*) AS RowsCopied FROM Orders;\
    \  -- 예시\nEND\n"
  python_code: "import re\nfrom typing import int as BuiltinInt\n\nfrom typing import Tuple\n\n_IDENT = re.compile(r'^[A-Za-z_][A-Za-z0-9_]*$')\n\
    \ndef backup_table_data(\n    conn: conn,\n    source_table: str,\n    backup_suffix: str,\n) -> int:\n    \"\"\"\n  \
    \  테이블 데이터 백업 (SELECT INTO).\n    원본 SP: BackupTableData\n    변환 규칙:\n      SELECT INTO (테이블 생성+복사) → SQL 그대로 유지 (동적 SQL)\n\
    \      OBJECT_ID 체크 → INFORMATION_SCHEMA.TABLES 조회로 대체\n      QUOTENAME + EXEC → 화이트리스트 검증 후 문자열 조립\n    \"\"\"\n    if\
    \ not _IDENT.match(source_table) or not _IDENT.match(backup_suffix.lstrip('_')):\n        raise ValueError(\"잘못된 테이블명\
    \ 또는 접미사\")\n\n    backup_table = f\"{source_table}{backup_suffix}\"\n    cursor = conn.cursor()\n\n    # 기존 백업 테이블 존재\
    \ 확인\n    cursor.execute(\n        \"SELECT 1 FROM INFORMATION_SCHEMA.TABLES\"\n        \" WHERE TABLE_NAME=?\",\n   \
    \     (backup_table,),\n    )\n    if cursor.fetchone():\n        cursor.execute(f\"DROP TABLE [{backup_table}]\")\n\n\
    \    cursor.execute(\n        f\"SELECT * INTO [{backup_table}] FROM [{source_table}]\"\n    )\n    rows_copied = cursor.rowcount\n\
    \    conn.commit()\n    return rows_copied\n"
- title: 85. HASHBYTES 무결성 검증
  sql: "CREATE PROCEDURE VerifyDataIntegrity\n    @TableName  NVARCHAR(128),\n    @RecordID   INT,\n    @ExpectedHash NVARCHAR(64),\n\
    \    @IsValid    BIT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    DECLARE @ActualHash NVARCHAR(64);\n\n    SELECT @ActualHash\
    \ = CONVERT(\n        NVARCHAR(64),\n        HASHBYTES('SHA2_256', CAST(Name AS NVARCHAR) + '|' + CAST(Price AS NVARCHAR)),\n\
    \        2\n    )\n    FROM Products WHERE ProductID = @RecordID;\n\n    SET @IsValid = CASE WHEN @ActualHash = @ExpectedHash\
    \ THEN 1 ELSE 0 END;\nEND\n"
  python_code: "import hashlib\nfrom typing import Optional\n\ndef verify_data_integrity(\n    conn: conn,\n    record_id:\
    \ int,\n    expected_hash: str,\n) -> bool:\n    \"\"\"\n    레코드 무결성 검증 (HASHBYTES 대체).\n    원본 SP: VerifyDataIntegrity\n\
    \    변환 규칙:\n      HASHBYTES('SHA2_256', ...) → Python hashlib.sha256()\n      CONVERT(NVARCHAR,hash,2) → hexdigest().upper()\n\
    \      OUTPUT BIT → return bool\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(\n        \"SELECT Name, Price\
    \ FROM Products WHERE ProductID=?\",\n        (record_id,),\n    )\n    row = cursor.fetchone()\n    if row is None:\n\
    \        return False\n\n    name, price = row\n    payload = f\"{name}|{price}\"\n    actual_hash = hashlib.sha256(payload.encode(\"\
    utf-8\")).hexdigest().upper()\n    return actual_hash == expected_hash.upper()\n"
- title: 86. 스칼라 서브쿼리 SELECT절 + OUTER APPLY 대체
  sql: "CREATE PROCEDURE GetProductsWithStats\n    @CategoryID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n        p.ProductID,\n\
    \        p.Name,\n        p.Price,\n        (SELECT COUNT(*) FROM OrderItems oi WHERE oi.ProductID = p.ProductID) AS SoldCount,\n\
    \        (SELECT AVG(Rating) FROM Reviews r WHERE r.ProductID = p.ProductID)   AS AvgRating,\n        (SELECT MAX(o.OrderDate)\n\
    \         FROM OrderItems oi2\n         JOIN Orders o ON oi2.OrderID = o.OrderID\n         WHERE oi2.ProductID = p.ProductID)\
    \                                   AS LastSoldAt\n    FROM Products p\n    WHERE p.CategoryID = @CategoryID\n      AND\
    \ p.IsActive   = 1\n    ORDER BY SoldCount DESC;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_products_with_stats(\n    conn: conn,\n    category_id: int,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    상품 + 판매통계 조회 (스칼라 서브쿼리).\n    원본 SP: GetProductsWithStats\n    변환 규칙:\n  \
    \    스칼라 서브쿼리 → LEFT JOIN + GROUP BY 로 재작성\n      (스칼라 서브쿼리는 행당 실행되어 성능 저하 → JOIN 방식이 효율적)\n    \"\"\"\n    sql = \"\"\
    \"\n        SELECT\n            p.ProductID, p.Name, p.Price,\n            COUNT(oi.ProductID)     AS SoldCount,\n   \
    \         AVG(r.Rating)           AS AvgRating,\n            MAX(o.OrderDate)        AS LastSoldAt\n        FROM Products\
    \ p\n        LEFT JOIN OrderItems oi ON oi.ProductID = p.ProductID\n        LEFT JOIN Orders     o  ON oi.OrderID   =\
    \ o.OrderID\n        LEFT JOIN Reviews    r  ON r.ProductID  = p.ProductID\n        WHERE p.CategoryID=? AND p.IsActive=1\n\
    \        GROUP BY p.ProductID, p.Name, p.Price\n        ORDER BY SoldCount DESC\n    \"\"\"\n    cursor = conn.cursor()\n\
    \    cursor.execute(sql, (category_id,))\n    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n\
    \    return [dict(zip(cols, row)) for row in rows]\n"
- title: 87. ROWS BETWEEN 슬라이딩 윈도우 집계
  sql: "CREATE PROCEDURE GetMovingAverage\n    @ProductID  INT,\n    @WindowSize INT = 7\nAS\nBEGIN\n    SET NOCOUNT ON;\n\
    \    SELECT\n        SaleDate,\n        DailySales,\n        AVG(DailySales) OVER (\n            ORDER BY SaleDate\n \
    \           ROWS BETWEEN @WindowSize - 1 PRECEDING AND CURRENT ROW\n        ) AS MovingAvg,\n        SUM(DailySales) OVER\
    \ (\n            ORDER BY SaleDate\n            ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n        ) AS CumSum\n\
    \    FROM DailySalesData\n    WHERE ProductID = @ProductID\n    ORDER BY SaleDate;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_moving_average(\n    conn: conn,\n    product_id: int,\n   \
    \ window_size: int = 7,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    이동 평균 + 누적 합계 계산.\n    원본 SP: GetMovingAverage\n\
    \    변환 규칙:\n      ROWS BETWEEN N PRECEDING AND CURRENT ROW →\n        SQL Server에서는 파라미터를 동적 SQL로 전달\n      (ROWS BETWEEN의\
    \ N은 리터럴만 허용 → 동적 SQL 필요)\n    \"\"\"\n    # ROWS BETWEEN의 N은 SQL Server에서 변수 직접 사용 불가 → 동적 SQL\n    sql = f\"\"\"\n \
    \       SELECT\n            SaleDate, DailySales,\n            AVG(DailySales) OVER (\n                ORDER BY SaleDate\n\
    \                ROWS BETWEEN {int(window_size) - 1} PRECEDING AND CURRENT ROW\n            ) AS MovingAvg,\n        \
    \    SUM(DailySales) OVER (\n                ORDER BY SaleDate\n                ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT\
    \ ROW\n            ) AS CumSum\n        FROM DailySalesData\n        WHERE ProductID = ?\n        ORDER BY SaleDate\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (product_id,))\n    rows = cursor.fetchall()\n    cols\
    \ = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 88. 부분 성공 허용 (에러 건너뛰기)
  sql: "CREATE PROCEDURE BulkProcessWithPartialSuccess\n    @ItemCount  INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET XACT_ABORT\
    \ OFF;   -- 오류 발생해도 트랜잭션 자동 롤백 안 함\n\n    DECLARE @i INT = 1, @Success INT = 0, @Failed INT = 0;\n    WHILE @i <= @ItemCount\n\
    \    BEGIN\n        BEGIN TRY\n            -- 아이템별 처리\n            INSERT INTO ProcessedItems (ItemNo, ProcessedAt)\n\
    \            VALUES (@i, GETDATE());\n            SET @Success = @Success + 1;\n        END TRY\n        BEGIN CATCH\n\
    \            SET @Failed = @Failed + 1;\n        END CATCH\n        SET @i = @i + 1;\n    END\n\n    SELECT @Success AS\
    \ SuccessCount, @Failed AS FailedCount;\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import Dict\n\ndef bulk_process_with_partial_success(\n    conn:\
    \ conn,\n    item_numbers: list,\n) -> Dict[str, int]:\n    \"\"\"\n    일괄 처리 (실패 건 건너뛰기).\n    원본 SP: BulkProcessWithPartialSuccess\n\
    \    변환 규칙:\n      SET XACT_ABORT OFF + 개별 TRY/CATCH →\n        Python: 개별 try/except, 실패 시 rollback 후 continue\n    \
    \  WHILE @i <= N → for 루프\n      결과 SELECT → dict 반환\n    \"\"\"\n    success = 0\n    failed  = 0\n    cursor  = conn.cursor()\n\
    \n    for item_no in item_numbers:\n        try:\n            cursor.execute(\n                \"INSERT INTO ProcessedItems\
    \ (ItemNo, ProcessedAt) VALUES (?, ?)\",\n                (item_no, datetime.now()),\n            )\n            conn.commit()\n\
    \            success += 1\n        except Exception:\n            conn.rollback()\n            failed += 1\n\n    return\
    \ {\"SuccessCount\": success, \"FailedCount\": failed}\n"
- title: 89. XML 파라미터 파싱 (다중 값 입력)
  sql: "CREATE PROCEDURE ProcessXmlInput\n    @XmlData XML\nAS\nBEGIN\n    SET NOCOUNT ON;\n    INSERT INTO ImportQueue (ProductID,\
    \ Qty, RequestedAt)\n    SELECT\n        t.ProductID,\n        t.Qty,\n        GETDATE()\n    FROM @XmlData.nodes('/Items/Item')\
    \ AS x(node)\n    CROSS APPLY (\n        SELECT\n            node.value('@ProductID', 'INT')   AS ProductID,\n       \
    \     node.value('@Qty',       'INT')    AS Qty\n    ) t\n    WHERE t.ProductID IS NOT NULL;\n\n    SELECT @@ROWCOUNT\
    \ AS InsertedCount;\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import List, Dict\n\ndef process_xml_input(\n    conn: conn,\n\
    \    items: List[Dict[str, int]],\n) -> int:\n    \"\"\"\n    다중 값 일괄 INSERT.\n    원본 SP: ProcessXmlInput\n    변환 규칙:\n\
    \      XML 파라미터 → Python List[Dict] 파라미터로 대체\n      XmlData.nodes + CROSS APPLY → Python executemany\n    \"\"\"\n   \
    \ if not items:\n        return 0\n\n    now  = datetime.now()\n    rows = [\n        (item[\"ProductID\"], item[\"Qty\"\
    ], now)\n        for item in items\n        if item.get(\"ProductID\") is not None\n    ]\n    if not rows:\n        return\
    \ 0\n\n    cursor = conn.cursor()\n    try:\n        cursor.executemany(\n            \"INSERT INTO ImportQueue (ProductID,\
    \ Qty, RequestedAt) VALUES (?,?,?)\",\n            rows,\n        )\n        conn.commit()\n        return len(rows)\n\
    \    except Exception as exc:\n        conn.rollback()\n        raise RuntimeError(f\"XML 입력 처리 실패: {exc}\") from exc\n"
- title: 90. TABLESAMPLE (통계용 샘플링)
  sql: "CREATE PROCEDURE GetSampledData\n    @SamplePercent FLOAT = 10.0,\n    @MaxRows       INT   = 1000\nAS\nBEGIN\n  \
    \  SET NOCOUNT ON;\n    SELECT TOP (@MaxRows) *\n    FROM   Orders TABLESAMPLE (@SamplePercent PERCENT)\n    WHERE  StatusCode\
    \ = 'DONE'\n    ORDER  BY NEWID();   -- 무작위 정렬\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_sampled_data(\n    conn: conn,\n    sample_percent: float =\
    \ 10.0,\n    max_rows: int = 1000,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    랜덤 샘플 데이터 조회.\n    원본 SP: GetSampledData\n\
    \    변환 규칙:\n      TABLESAMPLE (@Percent PERCENT) → SQL 그대로 유지\n      NEWID() → SQL 그대로 유지 (ORDER BY NEWID()로 무작위)\n \
    \     sample_percent는 float 범위(0~100) 검증\n    \"\"\"\n    if not 0 < sample_percent <= 100:\n        raise ValueError(\"\
    sample_percent는 0 초과 100 이하여야 합니다\")\n\n    # TABLESAMPLE에는 리터럴 또는 변수 직접 사용 가능 (동적 SQL)\n    sql = f\"\"\"\n        SELECT\
    \ TOP (?) *\n        FROM   Orders TABLESAMPLE ({float(sample_percent)} PERCENT)\n        WHERE  StatusCode = 'DONE'\n\
    \        ORDER  BY NEWID()\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (max_rows,))\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 91. 재귀 권한 위임 (Delegated Permissions)
  sql: "CREATE PROCEDURE GetEffectivePermissions\n    @UserID INT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    WITH RoleCTE AS (\n\
    \        SELECT RoleID FROM UserRoles WHERE UserID = @UserID\n        UNION ALL\n        SELECT rh.ParentRoleID\n    \
    \    FROM RoleHierarchy rh JOIN RoleCTE rc ON rh.ChildRoleID = rc.RoleID\n    )\n    SELECT DISTINCT p.Resource, p.Action\n\
    \    FROM RoleCTE rc\n    JOIN RolePermissions p ON rc.RoleID = p.RoleID\n    WHERE p.IsActive = 1\n    ORDER BY p.Resource,\
    \ p.Action;\nEND\n"
  python_code: "from typing import List, Dict, Any\n\ndef get_effective_permissions(\n    conn: conn,\n    user_id: int,\n\
    ) -> List[Dict[str, Any]]:\n    \"\"\"\n    사용자 유효 권한 전체 조회 (역할 계층 재귀).\n    원본 SP: GetEffectivePermissions\n    변환 규칙:\n\
    \      재귀 CTE (역할 계층) → SQL 그대로 유지\n      DISTINCT → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        WITH RoleCTE AS\
    \ (\n            SELECT RoleID FROM UserRoles WHERE UserID=?\n            UNION ALL\n            SELECT rh.ParentRoleID\n\
    \            FROM RoleHierarchy rh JOIN RoleCTE rc ON rh.ChildRoleID=rc.RoleID\n        )\n        SELECT DISTINCT p.Resource,\
    \ p.Action\n        FROM RoleCTE rc\n        JOIN RolePermissions p ON rc.RoleID=p.RoleID\n        WHERE p.IsActive=1\n\
    \        ORDER BY p.Resource, p.Action\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (user_id,))\n\
    \    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for\
    \ row in rows]\n"
- title: 92. 다중 집계 조건 분기 (동적 피벗 요약)
  sql: "CREATE PROCEDURE GetKpiSummary\n    @GroupBy   NVARCHAR(20),   -- 'DAILY','WEEKLY','MONTHLY'\n    @StartDate DATE,\n\
    \    @EndDate   DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n    IF @GroupBy = 'DAILY'\n        SELECT CAST(OrderDate AS DATE)\
    \ AS Period,\n               COUNT(*) AS Orders, SUM(TotalAmount) AS Revenue\n        FROM Orders WHERE OrderDate BETWEEN\
    \ @StartDate AND @EndDate\n        GROUP BY CAST(OrderDate AS DATE)\n        ORDER BY Period;\n    ELSE IF @GroupBy =\
    \ 'WEEKLY'\n        SELECT DATEPART(YEAR,OrderDate)*100+DATEPART(WEEK,OrderDate) AS Period,\n               COUNT(*) AS\
    \ Orders, SUM(TotalAmount) AS Revenue\n        FROM Orders WHERE OrderDate BETWEEN @StartDate AND @EndDate\n        GROUP\
    \ BY DATEPART(YEAR,OrderDate)*100+DATEPART(WEEK,OrderDate)\n        ORDER BY Period;\n    ELSE\n        SELECT DATEPART(YEAR,OrderDate)*100+DATEPART(MONTH,OrderDate)\
    \ AS Period,\n               COUNT(*) AS Orders, SUM(TotalAmount) AS Revenue\n        FROM Orders WHERE OrderDate BETWEEN\
    \ @StartDate AND @EndDate\n        GROUP BY DATEPART(YEAR,OrderDate)*100+DATEPART(MONTH,OrderDate)\n        ORDER BY Period;\n\
    END\n"
  python_code: "from datetime import date\nfrom typing import List, Dict, Any\n\ndef get_kpi_summary(\n    conn: conn,\n \
    \   group_by: str,\n    start_date: date,\n    end_date: date,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    KPI 요약 (일/주/월\
    \ 집계 선택).\n    원본 SP: GetKpiSummary\n    변환 규칙:\n      IF @GroupBy = '...' ELSE IF ... → Python dict 매핑 또는 if/elif\n \
    \     각 분기의 SQL → 딕셔너리로 선택\n    \"\"\"\n    _SQL_MAP = {\n        \"DAILY\": \"\"\"\n            SELECT CAST(OrderDate\
    \ AS DATE) AS Period,\n                   COUNT(*) AS Orders, SUM(TotalAmount) AS Revenue\n            FROM Orders WHERE\
    \ OrderDate BETWEEN ? AND ?\n            GROUP BY CAST(OrderDate AS DATE) ORDER BY Period\n        \"\"\",\n        \"\
    WEEKLY\": \"\"\"\n            SELECT DATEPART(YEAR,OrderDate)*100+DATEPART(WEEK,OrderDate) AS Period,\n              \
    \     COUNT(*) AS Orders, SUM(TotalAmount) AS Revenue\n            FROM Orders WHERE OrderDate BETWEEN ? AND ?\n     \
    \       GROUP BY DATEPART(YEAR,OrderDate)*100+DATEPART(WEEK,OrderDate)\n            ORDER BY Period\n        \"\"\",\n\
    \        \"MONTHLY\": \"\"\"\n            SELECT DATEPART(YEAR,OrderDate)*100+DATEPART(MONTH,OrderDate) AS Period,\n \
    \                  COUNT(*) AS Orders, SUM(TotalAmount) AS Revenue\n            FROM Orders WHERE OrderDate BETWEEN ?\
    \ AND ?\n            GROUP BY DATEPART(YEAR,OrderDate)*100+DATEPART(MONTH,OrderDate)\n            ORDER BY Period\n  \
    \      \"\"\",\n    }\n    sql = _SQL_MAP.get(group_by.upper())\n    if sql is None:\n        raise ValueError(f\"지원하지\
    \ 않는 group_by: {group_by}\")\n\n    cursor = conn.cursor()\n    cursor.execute(sql, (start_date, end_date))\n    rows\
    \ = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in\
    \ rows]\n"
- title: 93. MERGE OUTPUT ($action 분류)
  sql: "CREATE PROCEDURE UpsertAndTrack\n    @ProductID INT,\n    @Name      NVARCHAR(200),\n    @Price     DECIMAL(10,2)\n\
    AS\nBEGIN\n    SET NOCOUNT ON;\n    MERGE Products AS t\n    USING (SELECT @ProductID AS ProductID, @Name AS Name, @Price\
    \ AS Price) AS s\n    ON (t.ProductID = s.ProductID)\n    WHEN MATCHED THEN\n        UPDATE SET t.Name=s.Name, t.Price=s.Price,\
    \ t.UpdatedAt=GETDATE()\n    WHEN NOT MATCHED THEN\n        INSERT (ProductID,Name,Price,CreatedAt) VALUES (s.ProductID,s.Name,s.Price,GETDATE())\n\
    \    OUTPUT $action AS MergeAction, inserted.ProductID;\nEND\n"
  python_code: "from datetime import datetime\nfrom typing import Tuple\n\ndef upsert_and_track(\n    conn: conn,\n    product_id:\
    \ int,\n    name: str,\n    price: float,\n) -> Tuple[str, int]:\n    \"\"\"\n    UPSERT 후 수행 액션 반환.\n    반환: ('INSERT'|'UPDATE',\
    \ product_id)\n    원본 SP: UpsertAndTrack\n    변환 규칙:\n      MERGE OUTPUT $action → EXISTS 체크로 INSERT/UPDATE 결정 후 직접 반환\n\
    \      ($action은 Python에서 사전 조회로 대체)\n    \"\"\"\n    now    = datetime.now()\n    cursor = conn.cursor()\n    try:\n\
    \        cursor.execute(\"SELECT 1 FROM Products WHERE ProductID=?\", (product_id,))\n        exists = cursor.fetchone()\
    \ is not None\n\n        if exists:\n            cursor.execute(\n                \"UPDATE Products SET Name=?, Price=?,\
    \ UpdatedAt=? WHERE ProductID=?\",\n                (name, price, now, product_id),\n            )\n            action\
    \ = \"UPDATE\"\n        else:\n            cursor.execute(\n                \"INSERT INTO Products (ProductID,Name,Price,CreatedAt)\
    \ VALUES (?,?,?,?)\",\n                (product_id, name, price, now),\n            )\n            action = \"INSERT\"\
    \n\n        conn.commit()\n        return action, product_id\n    except Exception as exc:\n        conn.rollback()\n\
    \        raise RuntimeError(f\"UPSERT 실패: {exc}\") from exc\n"
- title: 94. 임시 데이터 비교 보고서 (전기 vs 당기)
  sql: "CREATE PROCEDURE GetPeriodComparison\n    @CurrentStart DATE,\n    @CurrentEnd   DATE,\n    @PriorStart   DATE,\n\
    \    @PriorEnd     DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n    WITH Current AS (\n        SELECT CategoryID, SUM(TotalAmount)\
    \ AS Revenue\n        FROM Orders WHERE OrderDate BETWEEN @CurrentStart AND @CurrentEnd\n          AND StatusCode='DONE'\n\
    \        GROUP BY CategoryID\n    ),\n    Prior AS (\n        SELECT CategoryID, SUM(TotalAmount) AS Revenue\n       \
    \ FROM Orders WHERE OrderDate BETWEEN @PriorStart AND @PriorEnd\n          AND StatusCode='DONE'\n        GROUP BY CategoryID\n\
    \    )\n    SELECT\n        COALESCE(c.CategoryID, p.CategoryID) AS CategoryID,\n        ISNULL(c.Revenue, 0)        \
    \          AS CurrentRevenue,\n        ISNULL(p.Revenue, 0)                  AS PriorRevenue,\n        ISNULL(c.Revenue,0)\
    \ - ISNULL(p.Revenue,0) AS Delta,\n        CASE WHEN ISNULL(p.Revenue,0) = 0 THEN NULL\n             ELSE (ISNULL(c.Revenue,0)-ISNULL(p.Revenue,0))/p.Revenue*100\n\
    \        END                                   AS GrowthPct\n    FROM Current c\n    FULL OUTER JOIN Prior p ON c.CategoryID\
    \ = p.CategoryID\n    ORDER BY CategoryID;\nEND\n"
  python_code: "from datetime import date\nfrom typing import List, Dict, Any\n\ndef get_period_comparison(\n    conn: conn,\n\
    \    current_start: date,\n    current_end: date,\n    prior_start: date,\n    prior_end: date,\n) -> List[Dict[str, Any]]:\n\
    \    \"\"\"\n    전기/당기 매출 비교 보고서.\n    원본 SP: GetPeriodComparison\n    변환 규칙:\n      다중 CTE + FULL OUTER JOIN + ISNULL\
    \ → SQL 그대로 유지\n      CASE WHEN / NULLIF 0나누기 방지 → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        WITH Current_ AS\
    \ (\n            SELECT CategoryID, SUM(TotalAmount) AS Revenue\n            FROM Orders WHERE OrderDate BETWEEN ? AND\
    \ ? AND StatusCode='DONE'\n            GROUP BY CategoryID\n        ),\n        Prior_ AS (\n            SELECT CategoryID,\
    \ SUM(TotalAmount) AS Revenue\n            FROM Orders WHERE OrderDate BETWEEN ? AND ? AND StatusCode='DONE'\n       \
    \     GROUP BY CategoryID\n        )\n        SELECT\n            COALESCE(c.CategoryID, p.CategoryID) AS CategoryID,\n\
    \            ISNULL(c.Revenue,0)                  AS CurrentRevenue,\n            ISNULL(p.Revenue,0)                \
    \  AS PriorRevenue,\n            ISNULL(c.Revenue,0)-ISNULL(p.Revenue,0) AS Delta,\n            CASE WHEN ISNULL(p.Revenue,0)=0\
    \ THEN NULL\n                 ELSE (ISNULL(c.Revenue,0)-ISNULL(p.Revenue,0))/p.Revenue*100\n            END AS GrowthPct\n\
    \        FROM Current_ c\n        FULL OUTER JOIN Prior_ p ON c.CategoryID=p.CategoryID\n        ORDER BY CategoryID\n\
    \    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (current_start, current_end, prior_start, prior_end))\n\
    \    rows = cursor.fetchall()\n    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for\
    \ row in rows]\n"
- title: 95. 조건부 아카이브 이동 (Archive + Delete)
  sql: "CREATE PROCEDURE ArchiveOldOrders\n    @ArchiveBefore  DATE,\n    @BatchSize      INT = 500,\n    @ArchivedCount \
    \ INT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET @ArchivedCount = 0;\n\n    WHILE 1 = 1\n    BEGIN\n        BEGIN\
    \ TRANSACTION;\n        BEGIN TRY\n            INSERT INTO OrdersArchive\n                SELECT TOP (@BatchSize) *\n\
    \                FROM   Orders\n                WHERE  OrderDate < @ArchiveBefore\n                  AND  StatusCode IN\
    \ ('DONE','CANCEL');\n\n            IF @@ROWCOUNT = 0\n            BEGIN\n                COMMIT TRANSACTION;\n      \
    \          BREAK;\n            END\n\n            SET @ArchivedCount = @ArchivedCount + @@ROWCOUNT;\n\n            DELETE\
    \ FROM Orders\n            WHERE OrderID IN (\n                SELECT TOP (@BatchSize) OrderID\n                FROM Orders\n\
    \                WHERE OrderDate < @ArchiveBefore\n                  AND StatusCode IN ('DONE','CANCEL')\n           \
    \ );\n\n            COMMIT TRANSACTION;\n        END TRY\n        BEGIN CATCH\n            ROLLBACK TRANSACTION;\n   \
    \         THROW;\n        END CATCH\n    END\nEND\n"
  python_code: "from datetime import date\n\ndef archive_old_orders(\n    conn: conn,\n    archive_before: date,\n    batch_size:\
    \ int = 500,\n) -> int:\n    \"\"\"\n    오래된 주문 아카이브 이동.\n    원본 SP: ArchiveOldOrders\n    변환 규칙:\n      WHILE 1=1 + BREAK\
    \ → Python while True + break\n      TOP N → TOP (?) 파라미터\n      INSERT SELECT + DELETE → 배치 루프\n      @@ROWCOUNT = 0\
    \ → rowcount == 0 → break\n    \"\"\"\n    archived_count = 0\n    cursor = conn.cursor()\n\n    while True:\n       \
    \ try:\n            cursor.execute(\n                \"\"\"\n                INSERT INTO OrdersArchive\n             \
    \   SELECT TOP (?) * FROM Orders\n                WHERE  OrderDate < ? AND StatusCode IN ('DONE','CANCEL')\n         \
    \       \"\"\",\n                (batch_size, archive_before),\n            )\n            inserted = cursor.rowcount\n\
    \            if inserted == 0:\n                conn.commit()\n                break\n\n            archived_count +=\
    \ inserted\n\n            cursor.execute(\n                \"\"\"\n                DELETE FROM Orders\n              \
    \  WHERE OrderID IN (\n                    SELECT TOP (?) OrderID FROM Orders\n                    WHERE OrderDate<? AND\
    \ StatusCode IN ('DONE','CANCEL')\n                )\n                \"\"\",\n                (batch_size, archive_before),\n\
    \            )\n            conn.commit()\n        except Exception as exc:\n            conn.rollback()\n           \
    \ raise RuntimeError(f\"아카이브 실패: {exc}\") from exc\n\n    return archived_count\n"
- title: 96. 다중 테넌트 집계 요약 (Tenant Rollup)
  sql: "CREATE PROCEDURE GetTenantRollupReport\n    @ReportDate DATE\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SELECT\n       \
    \ t.TenantID,\n        t.TenantName,\n        COUNT(DISTINCT u.UserID)   AS ActiveUsers,\n        COUNT(o.OrderID)   \
    \        AS TotalOrders,\n        SUM(o.TotalAmount)         AS TotalRevenue,\n        AVG(o.TotalAmount)         AS AvgOrderValue,\n\
    \        MAX(o.OrderDate)           AS LastOrderDate\n    FROM Tenants t\n    LEFT JOIN TenantUsers u  ON t.TenantID=u.TenantID\
    \ AND u.IsDeleted=0\n    LEFT JOIN Orders      o  ON t.TenantID=o.TenantID\n                             AND CAST(o.OrderDate\
    \ AS DATE)=@ReportDate\n                             AND o.StatusCode='DONE'\n    WHERE t.IsActive=1\n    GROUP BY t.TenantID,\
    \ t.TenantName\n    ORDER BY TotalRevenue DESC;\nEND\n"
  python_code: "from datetime import date\nfrom typing import List, Dict, Any\n\ndef get_tenant_rollup_report(\n    conn:\
    \ conn,\n    report_date: date,\n) -> List[Dict[str, Any]]:\n    \"\"\"\n    테넌트별 집계 보고서.\n    원본 SP: GetTenantRollupReport\n\
    \    변환 규칙:\n      LEFT JOIN 다중 + GROUP BY → SQL 그대로 유지\n      CAST(OrderDate AS DATE) = @Date → SQL 그대로 유지\n    \"\"\"\
    \n    sql = \"\"\"\n        SELECT\n            t.TenantID, t.TenantName,\n            COUNT(DISTINCT u.UserID) AS ActiveUsers,\n\
    \            COUNT(o.OrderID)         AS TotalOrders,\n            SUM(o.TotalAmount)       AS TotalRevenue,\n       \
    \     AVG(o.TotalAmount)       AS AvgOrderValue,\n            MAX(o.OrderDate)         AS LastOrderDate\n        FROM\
    \ Tenants t\n        LEFT JOIN TenantUsers u ON t.TenantID=u.TenantID AND u.IsDeleted=0\n        LEFT JOIN Orders    \
    \  o ON t.TenantID=o.TenantID\n                                AND CAST(o.OrderDate AS DATE)=?\n                     \
    \           AND o.StatusCode='DONE'\n        WHERE t.IsActive=1\n        GROUP BY t.TenantID, t.TenantName\n        ORDER\
    \ BY TotalRevenue DESC\n    \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (report_date,))\n    rows = cursor.fetchall()\n\
    \    cols = [col[0] for col in cursor.description]\n    return [dict(zip(cols, row)) for row in rows]\n"
- title: 97. 누적 합계로 목표 도달 감지 (Running Total Threshold)
  sql: "CREATE PROCEDURE FindBreakEvenPoint\n    @ProductID   INT,\n    @CostTarget  DECIMAL(18,2)\nAS\nBEGIN\n    SET NOCOUNT\
    \ ON;\n    WITH RunningTotal AS (\n        SELECT\n            SaleDate,\n            Revenue,\n            SUM(Revenue)\
    \ OVER (ORDER BY SaleDate\n                ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS CumRevenue,\n        \
    \    ROW_NUMBER() OVER (ORDER BY SaleDate) AS RowNum\n        FROM DailySalesData\n        WHERE ProductID = @ProductID\n\
    \    )\n    SELECT TOP 1\n        SaleDate,\n        Revenue,\n        CumRevenue,\n        RowNum AS DaysToBreakEven\n\
    \    FROM RunningTotal\n    WHERE CumRevenue >= @CostTarget\n    ORDER BY SaleDate;\nEND\n"
  python_code: "from typing import Optional, Dict, Any\n\ndef find_break_even_point(\n    conn: conn,\n    product_id: int,\n\
    \    cost_target: float,\n) -> Optional[Dict[str, Any]]:\n    \"\"\"\n    손익 분기점 도달 첫 번째 날 탐지.\n    원본 SP: FindBreakEvenPoint\n\
    \    변환 규칙:\n      SUM OVER (ROWS UNBOUNDED PRECEDING) + ROW_NUMBER → SQL 그대로 유지\n      WHERE CumRevenue >= @Target →\
    \ SQL 그대로 유지\n      TOP 1 → SQL 그대로 유지\n    \"\"\"\n    sql = \"\"\"\n        WITH RunningTotal AS (\n            SELECT\
    \ SaleDate, Revenue,\n                   SUM(Revenue) OVER (ORDER BY SaleDate\n                       ROWS BETWEEN UNBOUNDED\
    \ PRECEDING AND CURRENT ROW) AS CumRevenue,\n                   ROW_NUMBER() OVER (ORDER BY SaleDate) AS RowNum\n    \
    \        FROM DailySalesData\n            WHERE ProductID=?\n        )\n        SELECT TOP 1 SaleDate, Revenue, CumRevenue,\
    \ RowNum AS DaysToBreakEven\n        FROM RunningTotal\n        WHERE CumRevenue >= ?\n        ORDER BY SaleDate\n   \
    \ \"\"\"\n    cursor = conn.cursor()\n    cursor.execute(sql, (product_id, cost_target))\n    row = cursor.fetchone()\n\
    \    if row is None:\n        return None\n    cols = [col[0] for col in cursor.description]\n    return dict(zip(cols,\
    \ row))\n"
- title: 98. 외래 키 무결성 사전 검증
  sql: "CREATE PROCEDURE ValidateAndInsertOrderItem\n    @OrderID   INT,\n    @ProductID INT,\n    @Qty       INT,\n    @UnitPrice\
    \ DECIMAL(10,2),\n    @ErrorMsg  NVARCHAR(500) OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    SET @ErrorMsg = NULL;\n\n \
    \   IF NOT EXISTS (SELECT 1 FROM Orders   WHERE OrderID   = @OrderID)\n        SET @ErrorMsg = '주문이 존재하지 않습니다.';\n   \
    \ ELSE IF NOT EXISTS (SELECT 1 FROM Products WHERE ProductID = @ProductID AND IsActive=1)\n        SET @ErrorMsg = '상품이\
    \ 존재하지 않거나 비활성화 상태입니다.';\n    ELSE IF @Qty <= 0\n        SET @ErrorMsg = '수량은 1 이상이어야 합니다.';\n    ELSE IF @UnitPrice <=\
    \ 0\n        SET @ErrorMsg = '단가는 0보다 커야 합니다.';\n\n    IF @ErrorMsg IS NOT NULL RETURN;\n\n    INSERT INTO OrderItems\
    \ (OrderID, ProductID, Qty, UnitPrice)\n    VALUES (@OrderID, @ProductID, @Qty, @UnitPrice);\nEND\n"
  python_code: "from typing import Optional\n\ndef validate_and_insert_order_item(\n    conn: conn,\n    order_id: int,\n\
    \    product_id: int,\n    qty: int,\n    unit_price: float,\n) -> Optional[str]:\n    \"\"\"\n    외래 키 + 비즈니스 규칙 검증 후\
    \ INSERT.\n    반환: None=성공, str=오류 메시지\n    원본 SP: ValidateAndInsertOrderItem\n    변환 규칙:\n      IF NOT EXISTS → fetchone()\
    \ is None\n      OUTPUT @ErrorMsg → return Optional[str]\n      다단계 검증 → if/elif 순서 유지\n    \"\"\"\n    cursor = conn.cursor()\n\
    \n    cursor.execute(\"SELECT 1 FROM Orders WHERE OrderID=?\",   (order_id,))\n    if cursor.fetchone() is None:\n   \
    \     return \"주문이 존재하지 않습니다.\"\n\n    cursor.execute(\"SELECT 1 FROM Products WHERE ProductID=? AND IsActive=1\", (product_id,))\n\
    \    if cursor.fetchone() is None:\n        return \"상품이 존재하지 않거나 비활성화 상태입니다.\"\n\n    if qty <= 0:\n        return \"\
    수량은 1 이상이어야 합니다.\"\n    if unit_price <= 0:\n        return \"단가는 0보다 커야 합니다.\"\n\n    cursor.execute(\n        \"INSERT\
    \ INTO OrderItems (OrderID,ProductID,Qty,UnitPrice) VALUES (?,?,?,?)\",\n        (order_id, product_id, qty, unit_price),\n\
    \    )\n    conn.commit()\n    return None\n"
- title: 99. 분산 잠금 (Distributed Lock via DB)
  sql: "CREATE PROCEDURE AcquireDistributedLock\n    @LockName    NVARCHAR(200),\n    @OwnerID     NVARCHAR(100),\n    @TTLSeconds\
    \  INT = 30,\n    @Acquired    BIT OUTPUT\nAS\nBEGIN\n    SET NOCOUNT ON;\n    -- 만료된 잠금 정리\n    DELETE FROM DistributedLocks\n\
    \    WHERE LockName=@LockName AND ExpiresAt < GETDATE();\n\n    -- 잠금 획득 시도\n    BEGIN TRY\n        INSERT INTO DistributedLocks\
    \ (LockName, OwnerID, AcquiredAt, ExpiresAt)\n        VALUES (@LockName, @OwnerID, GETDATE(), DATEADD(SECOND,@TTLSeconds,GETDATE()));\n\
    \        SET @Acquired = 1;\n    END TRY\n    BEGIN CATCH\n        SET @Acquired = 0;  -- UNIQUE 제약 위반 = 이미 잠금 존재\n  \
    \  END CATCH\nEND\n"
  python_code: "from datetime import datetime, timedelta\n\ndef acquire_distributed_lock(\n    conn: conn,\n    lock_name:\
    \ str,\n    owner_id: str,\n    ttl_seconds: int = 30,\n) -> bool:\n    \"\"\"\n    DB 기반 분산 잠금 획득.\n    원본 SP: AcquireDistributedLock\n\
    \    변환 규칙:\n      DELETE (만료 정리) + INSERT (잠금 획득) → 순서 유지\n      UNIQUE 제약 위반 → except → False 반환\n      DATEADD(SECOND,N,...)\
    \ → timedelta(seconds=N)\n      OUTPUT BIT → return bool\n    \"\"\"\n    now     = datetime.now()\n    expires = now\
    \ + timedelta(seconds=ttl_seconds)\n    cursor  = conn.cursor()\n\n    # 만료 잠금 정리\n    cursor.execute(\n        \"DELETE\
    \ FROM DistributedLocks WHERE LockName=? AND ExpiresAt<?\",\n        (lock_name, now),\n    )\n    conn.commit()\n\n \
    \   # 잠금 획득 시도\n    try:\n        cursor.execute(\n            \"INSERT INTO DistributedLocks (LockName,OwnerID,AcquiredAt,ExpiresAt)\"\
    \n            \" VALUES (?,?,?,?)\",\n            (lock_name, owner_id, now, expires),\n        )\n        conn.commit()\n\
    \        return True\n    except Exception:\n        conn.rollback()\n        return False\n"
- title: 100. 최종 복합 — 전체 주문 마감 처리
  sql: "CREATE PROCEDURE FinalizeOrderBatch\n    @BatchDate     DATE,\n    @OperatorID    INT,\n    @ClosedCount   INT   \
    \       OUTPUT,\n    @TotalRevenue  DECIMAL(18,2) OUTPUT,\n    @FailedCount   INT          OUTPUT\nAS\nBEGIN\n    SET\
    \ NOCOUNT ON;\n    SET @ClosedCount  = 0;\n    SET @TotalRevenue = 0;\n    SET @FailedCount  = 0;\n\n    -- CTE: 마감 대상\
    \ 주문\n    WITH Eligible AS (\n        SELECT OrderID, TotalAmount\n        FROM   Orders\n        WHERE  CAST(OrderDate\
    \ AS DATE) = @BatchDate\n          AND  StatusCode IN ('PAID','PROCESSING')\n    )\n    -- 재고 차감 (아이템별)\n    UPDATE p\n\
    \    SET    p.StockQty = p.StockQty - oi.Qty\n    FROM   Products p\n    INNER  JOIN OrderItems oi ON p.ProductID=oi.ProductID\n\
    \    INNER  JOIN Eligible   e  ON oi.OrderID=e.OrderID\n    WHERE  p.StockQty >= oi.Qty;\n\n    -- 주문 마감\n    BEGIN TRY\n\
    \        UPDATE Orders\n        SET    StatusCode='DONE', ClosedAt=GETDATE(), ClosedBy=@OperatorID\n        WHERE  OrderID\
    \ IN (SELECT OrderID FROM Eligible);\n\n        SET @ClosedCount = @@ROWCOUNT;\n\n        SELECT @TotalRevenue = SUM(TotalAmount)\
    \ FROM Eligible;\n\n        -- 정산 이력 기록\n        INSERT INTO ClosingHistory\n            (BatchDate, OperatorID, ClosedCount,\
    \ TotalRevenue, ClosedAt)\n        VALUES\n            (@BatchDate, @OperatorID, @ClosedCount, @TotalRevenue, GETDATE());\n\
    \n    END TRY\n    BEGIN CATCH\n        SET @FailedCount = (SELECT COUNT(*) FROM Eligible);\n    END CATCH\nEND\n"
  python_code: "from datetime import date, datetime\nfrom typing import Tuple\n\ndef finalize_order_batch(\n    conn: conn,\n\
    \    batch_date: date,\n    operator_id: int,\n) -> Tuple[int, float, int]:\n    \"\"\"\n    전체 주문 배치 마감 처리.\n    반환:\
    \ (closed_count, total_revenue, failed_count)\n    원본 SP: FinalizeOrderBatch\n    변환 규칙:\n      CTE + UPDATE JOIN    →\
    \ SQL 그대로 유지\n      BEGIN TRY/CATCH      → try/except + rollback\n      다중 OUTPUT 파라미터 → Tuple[int, float, int]\n    \
    \  @@ROWCOUNT + SELECT  → cursor.rowcount + fetchone\n      CAST(date AS DATE) = @BatchDate → SQL 그대로 유지\n    \"\"\"\n\
    \    now    = datetime.now()\n    cursor = conn.cursor()\n\n    try:\n        # 1. 재고 차감\n        cursor.execute(\n  \
    \          \"\"\"\n            UPDATE p\n            SET    p.StockQty = p.StockQty - oi.Qty\n            FROM   Products\
    \ p\n            INNER  JOIN OrderItems oi ON p.ProductID=oi.ProductID\n            INNER  JOIN Orders     e  ON oi.OrderID=e.OrderID\n\
    \            WHERE  CAST(e.OrderDate AS DATE)=?\n              AND  e.StatusCode IN ('PAID','PROCESSING')\n          \
    \    AND  p.StockQty >= oi.Qty\n            \"\"\",\n            (batch_date,),\n        )\n\n        # 2. 주문 마감\n   \
    \     cursor.execute(\n            \"\"\"\n            UPDATE Orders\n            SET    StatusCode='DONE', ClosedAt=?,\
    \ ClosedBy=?\n            WHERE  CAST(OrderDate AS DATE)=?\n              AND  StatusCode IN ('PAID','PROCESSING')\n \
    \           \"\"\",\n            (now, operator_id, batch_date),\n        )\n        closed_count = cursor.rowcount\n\n\
    \        # 3. 매출 합계\n        cursor.execute(\n            \"\"\"\n            SELECT SUM(TotalAmount) FROM Orders\n  \
    \          WHERE  CAST(OrderDate AS DATE)=? AND StatusCode='DONE'\n              AND  ClosedAt=?\n            \"\"\",\n\
    \            (batch_date, now),\n        )\n        row           = cursor.fetchone()\n        total_revenue = float(row[0])\
    \ if row and row[0] else 0.0\n\n        # 4. 정산 이력\n        cursor.execute(\n            \"INSERT INTO ClosingHistory\"\
    \n            \" (BatchDate,OperatorID,ClosedCount,TotalRevenue,ClosedAt)\"\n            \" VALUES (?,?,?,?,?)\",\n  \
    \          (batch_date, operator_id, closed_count, total_revenue, now),\n        )\n        conn.commit()\n        return\
    \ closed_count, total_revenue, 0\n\n    except Exception as exc:\n        conn.rollback()\n        # 실패 건수 조회\n      \
